<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#27272a" />
    </linearGradient>
    <linearGradient id="eq" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      @keyframes wave {
        0% { transform: translateX(0); }
        100% { transform: translateX(-400px); }
      }
      @keyframes pulse {
        0%, 100% { height: 140px; y: 60px; }
        50% { height: 160px; y: 40px; }
      }
      @keyframes pulse-master {
        0%, 100% { height: 160px; y: 40px; }
        50% { height: 180px; y: 20px; }
      }

      @keyframes move-fader {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }
      .waveform {
        animation: wave 15s linear infinite;
        opacity: 0.15;
      }

      .fader {
        animation: move-fader 3s ease-in-out infinite;
      }
      .meter-left {
        animation: pulse 0.8s ease-in-out infinite alternate;
      }
      .meter-right {
        animation: pulse-master 0.7s ease-in-out infinite alternate;
      }

      .track-1 .fader { animation-delay: 0.2s; }
      .track-2 .fader { animation-delay: 0.8s; }
      .track-3 .fader { animation-delay: 0.4s; }
      .track-4 .fader { animation-delay: 1.1s; }
    </style>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)" />

  <!-- Waveform Background -->
  <g fill="none" stroke="#fff" stroke-width="2">
    <pattern id="waveform-pattern" x="0" y="0" width="1200" height="800" patternUnits="userSpaceOnUse">
      <path d="M 0,400 Q 150,200 300,400 T 600,400 T 900,400 T 1200,400" />
      <path d="M 0,400 Q 150,300 300,400 T 600,400 T 900,400 T 1200,400" />
      <path d="M 0,400 Q 150,100 300,400 T 600,400 T 900,400 T 1200,400" />
      <path d="M 0,400 Q 150,500 300,400 T 600,400 T 900,400 T 1200,400" />
      <path d="M 0,400 Q 150,600 300,400 T 600,400 T 900,400 T 1200,400" />
    </pattern>
    <rect width="1600" height="800" fill="url(#waveform-pattern)" class="waveform" />
  </g>

  <!-- Mixer Console -->
  <g transform="translate(200, 150)" filter="url(#shadow)">
    <!-- Console Base -->
    <rect width="800" height="500" rx="20" fill="#3f3f46" stroke="#52525b" stroke-width="2" />
    <rect x="20" y="20" width="760" height="460" rx="10" fill="#27272a" />
    
    <!-- Tracks -->
    <!-- Track 1 -->
    <g transform="translate(40, 40)" class="track-1">
      <rect x="0" y="0" width="80" height="420" rx="5" fill="#3f3f46" />
      <!-- EQ Knobs -->
      <g>
        <circle cx="40" cy="40" r="15" fill="#18181b" stroke="#71717a" stroke-width="2" />

      </g>
      <g>
        <circle cx="40" cy="80" r="15" fill="#18181b" stroke="#71717a" stroke-width="2" />

      </g>
      <g>
        <circle cx="40" cy="120" r="15" fill="#18181b" stroke="#71717a" stroke-width="2" />

      </g>
      <!-- Fader Track -->
      <rect x="35" y="160" width="10" height="200" rx="5" fill="#18181b" />
      <rect x="25" y="240" width="30" height="40" rx="5" fill="#e4e4e7" class="fader" />
      <!-- Solo/Mute -->
      <rect x="15" y="380" width="20" height="20" rx="3" fill="#ef4444" opacity="0.8" />
      <rect x="45" y="380" width="20" height="20" rx="3" fill="#eab308" opacity="0.3" />
    </g>

    <!-- Track 2 -->
    <g transform="translate(140, 40)" class="track-2">
      <rect x="0" y="0" width="80" height="420" rx="5" fill="#3f3f46" />
      <!-- EQ Knobs -->
      <g>
        <circle cx="40" cy="40" r="15" fill="#18181b" stroke="#71717a" stroke-width="2" />

      </g>
      <g>
        <circle cx="40" cy="80" r="15" fill="#18181b" stroke="#71717a" stroke-width="2" />

      </g>
      <g>
        <circle cx="40" cy="120" r="15" fill="#18181b" stroke="#71717a" stroke-width="2" />

      </g>
      <!-- Fader Track -->
      <rect x="35" y="160" width="10" height="200" rx="5" fill="#18181b" />
      <rect x="25" y="200" width="30" height="40" rx="5" fill="#e4e4e7" class="fader" />
      <!-- Solo/Mute -->
      <rect x="15" y="380" width="20" height="20" rx="3" fill="#ef4444" opacity="0.3" />
      <rect x="45" y="380" width="20" height="20" rx="3" fill="#eab308" opacity="0.8" />
    </g>

    <!-- Track 3 -->
    <g transform="translate(240, 40)" class="track-3">
      <rect x="0" y="0" width="80" height="420" rx="5" fill="#3f3f46" />
      <!-- Fader Track -->
      <rect x="35" y="160" width="10" height="200" rx="5" fill="#18181b" />
      <rect x="25" y="300" width="30" height="40" rx="5" fill="#e4e4e7" class="fader" />
    </g>

    <!-- Track 4 -->
    <g transform="translate(340, 40)" class="track-4">
      <rect x="0" y="0" width="80" height="420" rx="5" fill="#3f3f46" />
      <!-- Fader Track -->
      <rect x="35" y="160" width="10" height="200" rx="5" fill="#18181b" />
      <rect x="25" y="180" width="30" height="40" rx="5" fill="#e4e4e7" class="fader" />
    </g>

    <!-- Master Section -->
    <g transform="translate(500, 40)">
      <rect x="0" y="0" width="200" height="420" rx="10" fill="#18181b" />
      <!-- VU Meters -->
      <g transform="translate(40, 20)">
        <rect x="0" y="0" width="20" height="200" rx="2" fill="#3f3f46" />
        <rect x="30" y="0" width="20" height="200" rx="2" fill="#3f3f46" />
        
        <rect x="0" y="60" width="20" height="140" rx="2" fill="url(#eq)" class="meter-left" />
        <rect x="30" y="40" width="20" height="160" rx="2" fill="url(#eq)" class="meter-right" />
      </g>
      
      <!-- Master Fader -->
      <rect x="95" y="240" width="10" height="150" rx="5" fill="#000" />
      <rect x="75" y="280" width="50" height="40" rx="5" fill="#ef4444" />
    </g>
  </g>
</svg>