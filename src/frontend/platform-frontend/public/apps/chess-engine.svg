<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)" />
  
  <!-- Abstract Chessboard Pattern -->
  <g opacity="0.1">
    <path d="M0,0 h100 v100 h-100 v-100 z M200,0 h100 v100 h-100 v-100 z M400,0 h100 v100 h-100 v-100 z M600,0 h100 v100 h-100 v-100 z M800,0 h100 v100 h-100 v-100 z M1000,0 h100 v100 h-100 v-100 z" fill="#fff" />
    <path d="M100,100 h100 v100 h-100 v-100 z M300,100 h100 v100 h-100 v-100 z M500,100 h100 v100 h-100 v-100 z M700,100 h100 v100 h-100 v-100 z M900,100 h100 v100 h-100 v-100 z M1100,100 h100 v100 h-100 v-100 z" fill="#fff" />
    <path d="M0,200 h100 v100 h-100 v-100 z M200,200 h100 v100 h-100 v-100 z M400,200 h100 v100 h-100 v-100 z M600,200 h100 v100 h-100 v-100 z M800,200 h100 v100 h-100 v-100 z M1000,200 h100 v100 h-100 v-100 z" fill="#fff" />
    <path d="M100,300 h100 v100 h-100 v-100 z M300,300 h100 v100 h-100 v-100 z M500,300 h100 v100 h-100 v-100 z M700,300 h100 v100 h-100 v-100 z M900,300 h100 v100 h-100 v-100 z M1100,300 h100 v100 h-100 v-100 z" fill="#fff" />
    <path d="M0,400 h100 v100 h-100 v-100 z M200,400 h100 v100 h-100 v-100 z M400,400 h100 v100 h-100 v-100 z M600,400 h100 v100 h-100 v-100 z M800,400 h100 v100 h-100 v-100 z M1000,400 h100 v100 h-100 v-100 z" fill="#fff" />
    <path d="M100,500 h100 v100 h-100 v-100 z M300,500 h100 v100 h-100 v-100 z M500,500 h100 v100 h-100 v-100 z M700,500 h100 v100 h-100 v-100 z M900,500 h100 v100 h-100 v-100 z M1100,500 h100 v100 h-100 v-100 z" fill="#fff" />
    <path d="M0,600 h100 v100 h-100 v-100 z M200,600 h100 v100 h-100 v-100 z M400,600 h100 v100 h-100 v-100 z M600,600 h100 v100 h-100 v-100 z M800,600 h100 v100 h-100 v-100 z M1000,600 h100 v100 h-100 v-100 z" fill="#fff" />
    <path d="M100,700 h100 v100 h-100 v-100 z M300,700 h100 v100 h-100 v-100 z M500,700 h100 v100 h-100 v-100 z M700,700 h100 v100 h-100 v-100 z M900,700 h100 v100 h-100 v-100 z M1100,700 h100 v100 h-100 v-100 z" fill="#fff" />
  </g>

  <!-- Chess Knight Icon in Center -->
  <g transform="translate(600, 400) scale(4)" filter="url(#shadow)">
    <!-- Central Knight Path -->
    <path d="M -30,40 L 30,40 L 25,25 C 25,25 35,10 20,-10 C 25,-15 25,-30 15,-40 C 15,-40 -5,-35 -15,-20 C -25,-25 -30,-15 -25,-5 C -35,5 -30,20 -15,20 C -25,25 -25,40 -30,40 Z" fill="url(#glow)" />
    <!-- AI Eye Node -->
    <circle cx="5" cy="-15" r="4" fill="#60a5fa" />
    <!-- Connecting neural lines -->
    <path d="M 5,-15 L -10,0" stroke="#93c5fd" stroke-width="1.5" fill="none" opacity="0.8" />
    <path d="M 5,-15 L 15,0" stroke="#93c5fd" stroke-width="1.5" fill="none" opacity="0.8" />
    <circle cx="-10" cy="0" r="2" fill="#93c5fd" />
    <circle cx="15" cy="0" r="2" fill="#93c5fd" />
  </g>

  <!-- Glowing nodes -->
  <circle cx="200" cy="200" r="4" fill="#60a5fa" opacity="0.5" />
  <circle cx="1000" cy="600" r="6" fill="#8b5cf6" opacity="0.5" />
  <circle cx="300" cy="650" r="3" fill="#60a5fa" opacity="0.5" />
  <circle cx="900" cy="150" r="5" fill="#8b5cf6" opacity="0.5" />
  
  <path d="M 200,200 L 600,400 L 1000,600" stroke="url(#glow)" stroke-width="2" fill="none" opacity="0.3" stroke-dasharray="10, 10" />
  <path d="M 300,650 L 600,400 L 900,150" stroke="url(#glow)" stroke-width="2" fill="none" opacity="0.3" stroke-dasharray="10, 10" />
</svg>