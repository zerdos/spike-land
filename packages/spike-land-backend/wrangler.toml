# :schema node_modules/wrangler/config-schema.json

name = "spike-land"
main = "../../src/edge-api/backend/edge/chat.ts"
compatibility_flags = ["nodejs_compat"]
# chat.ts imports ./staticContent.mjs relative to its source location,
# but the file lives in this deploy shim directory.
alias = { "./staticContent.mjs" = "./staticContent.mjs" }

# SECURITY: Account ID should be set via environment variable, not hardcoded
# Wrangler automatically reads CLOUDFLARE_ACCOUNT_ID from environment
# See docs/SECRETS_SETUP.md for configuration instructions
# account_id = "your-account-id-here"
compatibility_date = "2025-07-12"

kv_namespaces = [
  { binding = "KV", id = "e05276b573af4afd905bc6ac1ed371d5", preview_id = "9db106837d4d437a962612dd04197581" },
]

[vars]
GA_MEASUREMENT_ID = "G-9WNEM9ZHE7"

[durable_objects]
bindings = [
  { name = "CODE", class_name = "Code" },
  { name = "LIMITERS", class_name = "CodeRateLimiter" },
]

[site]
bucket = "../../node_modules/@spike-land-ai/code/dist" # Resolved from installed package

[[r2_buckets]]
binding = "R2"
bucket_name = "npmprod"
preview_bucket_name = "npmprod"

[[r2_buckets]]
binding = "X9"
bucket_name = "code-chain"
preview_bucket_name = "code-chain"

[[migrations]]
tag = "v1"
new_classes = ["Users"]

[[migrations]]
tag = "v5"
deleted_classes = ["Users"]

[env.testing]
name = "testing-spike-land"
route = { pattern = "testing.spike.land", custom_domain = true }
kv_namespaces = [
  { binding = "KV", id = "7cafeba860c9485bbfca337099c82ce3", preview_id = "e2b898af453c46e2ac584745ea92424d" },
]

[env.testing.vars]
GA_MEASUREMENT_ID = "G-9WNEM9ZHE7"

[[env.testing.migrations]]
tag = "v1"
new_classes = ["Users"]

[[env.testing.migrations]]
tag = "v5"
deleted_classes = ["Users"]

[env.testing.durable_objects]
bindings = [
  { name = "CODE", class_name = "Code" },
  { name = "LIMITERS", class_name = "CodeRateLimiter" },
]

[[env.testing.r2_buckets]]
binding = "R2"
bucket_name = "npmprod"
preview_bucket_name = "npmprod"

[[env.testing.r2_buckets]]
binding = "X9"
bucket_name = "code-chain"
preview_bucket_name = "code-chain"

[env.staging]
name = "spike-land-backend-staging"
vars = { APP_ENV = "staging" }
