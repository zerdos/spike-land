name = "image-studio-mcp"
main = "../../src/edge-api/image-studio-worker/api-mcp/index.ts"

compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
logpush = true

[dev]
port = 3100

[[d1_databases]]
binding = "IMAGE_DB"
database_name = "pixel-studio"
database_id = "74991261-c270-45d2-ab40-e8955e43f93f"
migrations_dir = "migrations"

[[d1_databases]]
binding = "STATUS_DB"
database_name = "spike-edge-analytics"
database_id = "f7219e86-7dc6-4627-92ad-17fce49ae35a"

[[r2_buckets]]
binding = "IMAGE_R2"
bucket_name = "pixel-studio"

[[services]]
binding = "SPIKE_CHAT"
service = "spike-chat"

[[routes]]
pattern = "image-studio-mcp.spike.land"
custom_domain = true

[assets]
directory = "./frontend/dist"
not_found_handling = "none"
