name: Deploy to AWS ECS

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "CLAUDE.md"
      - ".github/**.md"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Target environment (staging or production)"
        required: false
        type: choice
        options: [staging, production]
        default: staging
      skip_smoke_tests:
        description: "Skip smoke tests after deployment"
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.event_name == 'pull_request' && format('staging-{0}', github.event.pull_request.number) || 'production' }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REPO_NEXTJS: spike-land-nextjs
  ECS_CLUSTER: production-spike-land
  ECS_SERVICE_NEXTJS: production-nextjs
  TASK_DEF_NEXTJS: production-spike-land-nextjs
  IMAGE_TAG: ${{ github.sha }}

permissions:
  contents: read
  packages: read
  id-token: write

# ==============================================================================
# PRODUCTION PIPELINE: push to main / workflow_dispatch
# ==============================================================================

jobs:
  # ----------------------------------------------------------------------------
  # Build: Docker images
  # NOTE: workerd build removed — workers/ directory no longer in this repo.
  # The workerd ECS service continues running with its existing image.
  # ----------------------------------------------------------------------------
  build-nextjs:
    name: Build Next.js image
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment == 'production')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      image: ${{ steps.set-image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Sync content from umbrella repo
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            https://x-access-token:${{ secrets.GH_PAT_TOKEN }}@github.com/spike-land-ai/spike-land-ai.git \
            /tmp/umbrella
          cd /tmp/umbrella
          git sparse-checkout set docs content
          cd -
          cp -r /tmp/umbrella/docs ./docs/
          cp -r /tmp/umbrella/content ./content/
          rm -rf /tmp/umbrella

      - name: Setup Depot
        uses: depot/setup-action@v1
        continue-on-error: true
        id: depot-setup

      - name: Build and push Next.js image via Depot
        if: steps.depot-setup.outcome == 'success'
        uses: depot/build-push-action@v1
        with:
          project: tccng0cpjr
          push: true
          platforms: linux/amd64
          target: production
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_NEXTJS }}:${{ env.IMAGE_TAG }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_NEXTJS }}:latest
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            NEXT_PUBLIC_GA_MEASUREMENT_ID=${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          secrets: |
            NODE_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }}
        env:
          DEPOT_TOKEN: ${{ secrets.DEPOT_TOKEN }}

      - name: Build and push Next.js image via Docker (fallback)
        if: steps.depot-setup.outcome != 'success'
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64
          target: production
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_NEXTJS }}:${{ env.IMAGE_TAG }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_NEXTJS }}:latest
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            NEXT_PUBLIC_GA_MEASUREMENT_ID=${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            NODE_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }}

      - name: Sync static assets to S3
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker pull ${ECR_REGISTRY}/${{ env.ECR_REPO_NEXTJS }}:${{ env.IMAGE_TAG }}
          docker create --name nextjs-extract ${ECR_REGISTRY}/${{ env.ECR_REPO_NEXTJS }}:${{ env.IMAGE_TAG }}
          docker cp nextjs-extract:/app/.next/static ./static-assets
          docker rm nextjs-extract
          aws s3 sync ./static-assets s3://production-spike-land-static-assets/_next/static/ \
            --cache-control "public, max-age=31536000, immutable"

      - name: Set image output
        id: set-image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: echo "image=${ECR_REGISTRY}/${ECR_REPO_NEXTJS}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

  # ----------------------------------------------------------------------------
  # Deploy: us-east-1 (single region, parallel service updates)
  # ----------------------------------------------------------------------------
  deploy-production:
    name: Deploy to production
    needs: [build-nextjs]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment == 'production')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production-us-east-1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn

      - name: Run Prisma migrations
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL || secrets.DATABASE_URL }}
        # Retry up to 3 times — Neon pooler sometimes holds an advisory lock
        # causing P1002 timeouts. Direct URL (DIRECT_URL secret) bypasses the
        # pooler; this retry loop handles transient failures when it is unset.
        run: |
          for i in 1 2 3; do
            yarn prisma migrate deploy && break
            echo "Migration attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: Download current task definitions
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_DEF_NEXTJS }} \
            --query taskDefinition \
            > nextjs-task-def.json

      - name: Update Next.js task definition with new image
        id: nextjs-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: nextjs-task-def.json
          container-name: ${{ env.ECR_REPO_NEXTJS }}
          image: ${{ needs.build-nextjs.outputs.image }}

      - name: Deploy Next.js to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.nextjs-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_NEXTJS }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false

      - name: Wait for Next.js service to stabilize
        run: |
          echo "Waiting for Next.js service to reach steady state..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE_NEXTJS }}
          echo "Next.js service is stable"

      - name: Verify ALB target health
        env:
          TG_NAME: production-nextjs-tg
        run: |
          echo "Verifying ALB target health..."
          NEXTJS_TG_ARN=$(aws elbv2 describe-target-groups \
            --names "$TG_NAME" \
            --query 'TargetGroups[0].TargetGroupArn' \
            --output text 2>/dev/null || echo "")

          if [ -z "$NEXTJS_TG_ARN" ] || [ "$NEXTJS_TG_ARN" = "None" ]; then
            echo "WARNING: Could not find target group, skipping health verification"
            exit 0
          fi

          HEALTHY_COUNT=$(aws elbv2 describe-target-health \
            --target-group-arn "$NEXTJS_TG_ARN" \
            --query 'TargetHealthDescriptions[?TargetHealth.State==`healthy`] | length(@)' \
            --output text)

          echo "Healthy targets: ${HEALTHY_COUNT}"

          if [ "$HEALTHY_COUNT" -lt 1 ]; then
            echo "ERROR: No healthy targets"
            aws elbv2 describe-target-health \
              --target-group-arn "$NEXTJS_TG_ARN" \
              --query 'TargetHealthDescriptions[].{Target:Target.Id,State:TargetHealth.State,Reason:TargetHealth.Reason}' \
              --output table
            exit 1
          fi

          echo "ALB target health verified: ${HEALTHY_COUNT} healthy targets"

  # ----------------------------------------------------------------------------
  # Smoke tests
  # ----------------------------------------------------------------------------
  smoke-test:
    name: Smoke tests
    needs: deploy-production
    if: github.event.inputs.skip_smoke_tests != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Health check - workerd
        run: |
          echo "Checking workerd health endpoint..."
          for i in $(seq 1 3); do
            if curl -sf --max-time 10 --retry 2 --retry-delay 3 https://workerd.spike.land/ping; then
              echo ""
              echo "workerd health check passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i failed, waiting 3s..."
            sleep 3
          done
          echo "workerd health check failed after 3 attempts"
          exit 1

      - name: Health check - Next.js
        run: |
          echo "Checking Next.js health endpoint..."
          for i in $(seq 1 3); do
            if curl -sf --max-time 10 --retry 2 --retry-delay 3 https://spike.land/api/health; then
              echo ""
              echo "Next.js health check passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i failed, waiting 3s..."
            sleep 3
          done
          echo "Next.js health check failed after 3 attempts"
          exit 1

      - name: Readiness check
        run: |
          echo "Checking readiness (DB + Redis)..."
          RESPONSE=$(curl -sf --max-time 10 https://spike.land/api/ready)
          echo "Readiness response: ${RESPONSE}"

          STATUS=$(echo "${RESPONSE}" | jq -r '.status')
          if [ "$STATUS" != "ready" ]; then
            echo "WARNING: Readiness check returned status=${STATUS}"
            echo "Checks: $(echo "${RESPONSE}" | jq -r '.checks')"
          fi

      - name: API smoke tests
        run: |
          echo "Testing transpiler endpoint..."
          RESPONSE=$(curl -sf -X POST https://workerd.spike.land/transpile \
            -H "Content-Type: text/plain" \
            -d "const x: number = 1;")
          echo "Transpiler response received (${#RESPONSE} bytes)"

          echo ""
          echo "Testing session API..."
          curl -sf https://workerd.spike.land/live/test-smoke/session.json > /dev/null
          echo "Session API responded successfully"

      - name: Verify HTTP response codes
        run: |
          echo "Verifying workerd returns 200..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://workerd.spike.land/ping)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Expected 200, got $HTTP_CODE"
            exit 1
          fi

          echo "Verifying Next.js returns 200..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://spike.land/)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Expected 200, got $HTTP_CODE"
            exit 1
          fi

          echo "All HTTP response code checks passed"

  # ----------------------------------------------------------------------------
  # Deployment summary
  # ----------------------------------------------------------------------------
  deployment-summary:
    name: Deployment summary
    needs: [
      build-nextjs,
      deploy-production,
      smoke-test,
    ]
    if: always() && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment == 'production'))
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Generate summary
        env:
          BUILD_NEXTJS_RESULT: ${{ needs.build-nextjs.result }}
          DEPLOY_RESULT: ${{ needs.deploy-production.result }}
          SMOKE_RESULT: ${{ needs.smoke-test.result }}
          COMMIT_SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build Next.js | ${BUILD_NEXTJS_RESULT} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy production | ${DEPLOY_RESULT} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke tests | ${SMOKE_RESULT} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${COMMIT_SHA}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${REF_NAME}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${ACTOR}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Images:**" >> $GITHUB_STEP_SUMMARY
          echo "- nextjs: \`${ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com/spike-land-nextjs:${COMMIT_SHA}\`" >> $GITHUB_STEP_SUMMARY

  # ==============================================================================
  # STAGING PIPELINE: pull_request only
  # ==============================================================================

  # NOTE: staging-build-workerd removed — workers/ directory no longer in this repo.

  staging-build-nextjs:
    name: "[Staging] Build Next.js"
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment != 'production')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      image: ${{ steps.set-image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Sync content from umbrella repo
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            https://x-access-token:${{ secrets.GH_PAT_TOKEN }}@github.com/spike-land-ai/spike-land-ai.git \
            /tmp/umbrella
          cd /tmp/umbrella
          git sparse-checkout set docs content
          cd -
          cp -r /tmp/umbrella/docs ./docs/
          cp -r /tmp/umbrella/content ./content/
          rm -rf /tmp/umbrella

      - name: Setup Depot
        uses: depot/setup-action@v1
        continue-on-error: true
        id: depot-setup

      - name: Build and push Next.js image via Depot (staging)
        if: steps.depot-setup.outcome == 'success'
        uses: depot/build-push-action@v1
        with:
          project: tccng0cpjr
          push: true
          platforms: linux/amd64
          target: production
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_NEXTJS }}:staging-${{ github.event.pull_request.number || github.run_id }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            NEXT_PUBLIC_GA_MEASUREMENT_ID=${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          secrets: |
            NODE_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }}
        env:
          DEPOT_TOKEN: ${{ secrets.DEPOT_TOKEN }}

      - name: Build and push Next.js image via Docker (staging fallback)
        if: steps.depot-setup.outcome != 'success'
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64
          target: production
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_NEXTJS }}:staging-${{ github.event.pull_request.number || github.run_id }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            NEXT_PUBLIC_GA_MEASUREMENT_ID=${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            NODE_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }}

      - name: Sync static assets to S3 (Staging)
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          STAGING_TAG: staging-${{ github.event.pull_request.number || github.run_id }}
        run: |
          docker pull ${ECR_REGISTRY}/${{ env.ECR_REPO_NEXTJS }}:${STAGING_TAG}
          docker create --name nextjs-extract ${ECR_REGISTRY}/${{ env.ECR_REPO_NEXTJS }}:${STAGING_TAG}
          docker cp nextjs-extract:/app/.next/static ./static-assets
          docker rm nextjs-extract
          aws s3 sync ./static-assets s3://staging-spike-land-static-assets/_next/static/ \
            --cache-control "public, max-age=31536000, immutable"

      - name: Set image output
        id: set-image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          STAGING_TAG: staging-${{ github.event.pull_request.number || github.run_id }}
        run: echo "image=${ECR_REGISTRY}/${ECR_REPO_NEXTJS}:${STAGING_TAG}" >> "$GITHUB_OUTPUT"

  staging-deploy:
    name: "[Staging] Deploy to staging ECS"
    needs: [staging-build-nextjs]
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment != 'production')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging
    env:
      STAGING_CLUSTER: staging-spike-land
      STAGING_SERVICE_NEXTJS: staging-nextjs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn

      - name: Run Prisma migrations
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL || secrets.DATABASE_URL }}
        # Retry up to 3 times — Neon pooler sometimes holds an advisory lock
        # causing P1002 timeouts. Direct URL (DIRECT_URL secret) bypasses the
        # pooler; this retry loop handles transient failures when it is unset.
        run: |
          for i in 1 2 3; do
            yarn prisma migrate deploy && break
            echo "Migration attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: Download staging Next.js task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition staging-spike-land-nextjs \
            --query taskDefinition \
            > nextjs-task-def.json

      - name: Patch task definition memory (hotfix)
        run: |
          # Patch memory/cpu to 2048/1024 to match production and prevent OOM
          jq '.cpu = "1024" | .memory = "2048" | .containerDefinitions |= map(if .name == "spike-land-nextjs" then .cpu = 1024 | .memory = 2048 else . end)' nextjs-task-def.json > nextjs-task-def-patched.json
          mv nextjs-task-def-patched.json nextjs-task-def.json

      - name: Update staging Next.js task definition
        id: nextjs-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: nextjs-task-def.json
          container-name: ${{ env.ECR_REPO_NEXTJS }}
          image: ${{ needs.staging-build-nextjs.outputs.image }}

      - name: Deploy Next.js to staging ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.nextjs-task-def.outputs.task-definition }}
          service: ${{ env.STAGING_SERVICE_NEXTJS }}
          cluster: ${{ env.STAGING_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 20

  staging-smoke-test:
    name: "[Staging] Smoke tests"
    needs: staging-deploy
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment != 'production')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
    steps:
      - name: Health check - staging workerd
        run: |
          echo "Checking staging workerd health..."
          curl -sf --max-time 10 --retry 5 --retry-delay 5 https://staging-workerd.spike.land/ping || exit 1
          echo "Staging workerd health check passed"

      - name: Health check - staging Next.js
        run: |
          echo "Checking staging Next.js health..."
          curl -sf --max-time 10 --retry 5 --retry-delay 5 https://staging.spike.land/api/health || exit 1
          echo "Staging Next.js health check passed"

      - name: API smoke tests
        run: |
          echo "Testing staging transpiler..."
          curl -sf -X POST https://staging-workerd.spike.land/transpile \
            -H "Content-Type: text/plain" \
            -d "const x: number = 1;" > /dev/null || exit 1
          echo "Transpiler test passed"

          echo "Testing staging session API..."
          curl -sf https://staging-workerd.spike.land/live/test-smoke/session.json > /dev/null || exit 1
          echo "Session API test passed"

      - name: Post staging status to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? 'passed' : 'failed';
            const icon = status === 'passed' ? 'white_check_mark' : 'x';
            const sha = context.sha.substring(0, 8);
            const body = [
              `### Staging Deployment :${icon}:`,
              '',
              `**Status:** Smoke tests ${status}`,
              `**Commit:** \`${sha}\``,
              `**Staging URLs:**`,
              `- workerd: https://staging-workerd.spike.land`,
              `- Next.js: https://staging.spike.land`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
