name = "mcp-auth"
main = "src/index.ts"
compatibility_date = "2025-02-28"
compatibility_flags = ["nodejs_compat"]

route = { pattern = "auth-mcp.spike.land", custom_domain = true }

[[d1_databases]]
binding = "AUTH_DB"
database_name = "spike-auth-production"
database_id = "fbe3ebd5-7d2d-4861-bd8c-fa090dff6c30" # We will need user to provision an actual ID later

[[r2_buckets]]
binding = "AUTH_R2"
bucket_name = "spike-auth-assets"

# Secrets (set via `wrangler secret put`):
# - DB_PASSWORD
# - BETTER_AUTH_SECRET
