name = "mcp-auth"
main = "../../src/edge-api/auth/db/index.ts"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[dev]
port = 8791

[[routes]]
pattern = "auth-mcp.spike.land"
custom_domain = true

[[d1_databases]]
binding = "AUTH_DB"
database_name = "spike-auth-production"
database_id = "2afd3ffd-0e4e-4b2d-b395-7510d54af8dc"

[[d1_databases]]
binding = "STATUS_DB"
database_name = "spike-edge-analytics"
database_id = "f7219e86-7dc6-4627-92ad-17fce49ae35a"

[[d1_databases]]
binding = "PLATFORM_DB"
database_name = "spike-land-mcp"
database_id = "52b72b0a-c0f8-4d7f-aaec-4f014594d0c1"

[[r2_buckets]]
binding = "AUTH_R2"
bucket_name = "spike-auth-assets"

[[services]]
binding = "SPIKE_CHAT"
service = "spike-chat"

# Secrets (set via `wrangler secret put`):
# - DB_PASSWORD
# - BETTER_AUTH_SECRET
