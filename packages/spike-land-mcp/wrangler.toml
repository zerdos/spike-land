# :schema node_modules/wrangler/config-schema.json

name = "spike-land-mcp"
main = "./index.ts"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
logpush = true

kv_namespaces = [
  { binding = "KV", id = "adf12f5b631b445086eb029abae41b24", preview_id = "dc475d2a8f3f4273af0ab533441071f6" },
]

[dev]
port = 8790

[[d1_databases]]
binding = "DB"
database_name = "spike-land-mcp"
database_id = "52b72b0a-c0f8-4d7f-aaec-4f014594d0c1"
migrations_dir = "../../src/edge-api/spike-land/db/migrations"

[[d1_databases]]
binding = "STATUS_DB"
database_name = "spike-edge-analytics"
database_id = "f7219e86-7dc6-4627-92ad-17fce49ae35a"

[[r2_buckets]]
binding = "SPA_ASSETS"
bucket_name = "spike-app-assets"

[[services]]
binding = "SPIKE_EDGE"
service = "spike-edge"

[[services]]
binding = "SPIKE_CHAT"
service = "spike-chat"

[vars]
APP_ENV = "development"
GA_MEASUREMENT_ID = "G-9WNEM9ZHE7"
# GA_API_SECRET must be set as a secret: wrangler secret put GA_API_SECRET
# BADGE_SIGNING_SECRET must be set as a secret: wrangler secret put BADGE_SIGNING_SECRET

[[routes]]
pattern = "mcp.spike.land/*"
zone_name = "spike.land"

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "spike_analytics"

[env.staging]
name = "spike-land-mcp-staging"
vars = { APP_ENV = "staging" }

[[env.staging.routes]]
pattern = "mcp-staging.spike.land/*"
zone_name = "spike.land"
