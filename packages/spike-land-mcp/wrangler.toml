# :schema node_modules/wrangler/config-schema.json

name = "spike-land-mcp"
main = "./index.ts"
compatibility_date = "2025-07-12"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

kv_namespaces = [
  { binding = "KV", id = "adf12f5b631b445086eb029abae41b24", preview_id = "dc475d2a8f3f4273af0ab533441071f6" },
]

[[d1_databases]]
binding = "DB"
database_name = "spike-land-mcp"
database_id = "52b72b0a-c0f8-4d7f-aaec-4f014594d0c1"
migrations_dir = "db/migrations"

[[r2_buckets]]
binding = "SPA_ASSETS"
bucket_name = "spike-app-assets"

[[services]]
binding = "SPIKE_EDGE"
service = "spike-edge"

[vars]
APP_ENV = "development"
GA_MEASUREMENT_ID = "G-9WNEM9ZHE7"
VITE_GOOGLE_ADS_ID = "GT-TQK4WH8K"
VITE_GTM_ID = "GT-TQK4WH8K"
# GA_API_SECRET must be set as a secret: wrangler secret put GA_API_SECRET

[[routes]]
pattern = "mcp.spike.land/*"
zone_name = "spike.land"

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "spike_analytics"

[env.staging]
name = "spike-land-mcp-staging"
vars = { APP_ENV = "staging" }

[[env.staging.routes]]
pattern = "mcp-staging.spike.land/*"
zone_name = "spike.land"
