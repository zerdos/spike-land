name = "spike-chat"
main = "index.ts"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]
logpush = true

[durable_objects]
bindings = [
  { name = "CHANNEL_DO", class_name = "ChannelDurableObject" },
  { name = "PRESENCE_DO", class_name = "PresenceDurableObject" }
]

[[migrations]]
tag = "v1"
new_classes = ["ChannelDurableObject", "PresenceDurableObject"]

[[d1_databases]]
binding = "DB"
database_name = "spike-chat"
database_id = "4e93ca4f-84d4-4c50-9e03-5356ee092981"
migrations_dir = "db/migrations"

[[services]]
binding = "AUTH_MCP"
service = "mcp-auth"

[[services]]
binding = "MCP_SERVICE"
service = "spike-land-mcp"

[[routes]]
pattern = "chat.spike.land/*"
zone_name = "spike.land"
