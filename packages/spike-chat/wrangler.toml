name = "spike-chat"
main = "index.ts"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [
  { name = "CHANNEL_DO", class_name = "ChannelDurableObject" },
  { name = "PRESENCE_DO", class_name = "PresenceDurableObject" }
]

[[migrations]]
tag = "v1"
new_classes = ["ChannelDurableObject", "PresenceDurableObject"]

# D1 binding for spike-chat. See db/SETUP.md for provisioning + migration steps.
# If the database needs to be re-created on a different Cloudflare account,
# replace `database_id` with the output of:
#   database_id = "RUN: wrangler d1 create spike-chat-db && copy id here"
[[d1_databases]]
binding = "DB"
database_name = "spike-chat"
database_id = "4e93ca4f-84d4-4c50-9e03-5356ee092981"
migrations_dir = "db/migrations"

[[services]]
binding = "AUTH_MCP"
service = "mcp-auth"

[[services]]
binding = "MCP_SERVICE"
service = "spike-land-mcp"

[[routes]]
pattern = "chat.spike.land/*"
zone_name = "spike.land"
