name = "spike-edge"
main = "./index.ts"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
logpush = true

[dev]
port = 8787

[[r2_buckets]]
binding = "R2"
bucket_name = "spike-platform"

[[r2_buckets]]
binding = "SPA_ASSETS"
bucket_name = "spike-app-assets"

[durable_objects]
bindings = [
  { name = "LIMITERS", class_name = "RateLimiter" },
  { name = "SPIKE_CHAT_SESSIONS", class_name = "SpikeChatSessionDO" }
]

[[migrations]]
tag = "v1"
new_classes = ["RateLimiter"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["SpikeChatSessionDO"]

# Custom domain — Cloudflare manages DNS automatically
# QUIZ_BADGE_SECRET moved to wrangler secrets (run: wrangler secret put QUIZ_BADGE_SECRET)
# GA_API_SECRET must be set via: wrangler secret put GA_API_SECRET
[[d1_databases]]
binding = "DB"
database_name = "spike-edge-analytics"
database_id = "f7219e86-7dc6-4627-92ad-17fce49ae35a"
migrations_dir = "db/migrations"

[[d1_databases]]
binding = "STATUS_DB"
database_name = "spike-edge-analytics"
database_id = "f7219e86-7dc6-4627-92ad-17fce49ae35a"

# Creem.io payment secrets — set via:
#   wrangler secret put CREEM_API_KEY
#   wrangler secret put CREEM_WEBHOOK_SECRET
#   wrangler secret put CREEM_PRO_PRODUCT_ID
#   wrangler secret put CREEM_BUSINESS_PRODUCT_ID
#
# GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, GOOGLE_REFRESH_TOKEN must be set via:
#   wrangler secret put GOOGLE_CLIENT_ID
#   wrangler secret put GOOGLE_CLIENT_SECRET
#   wrangler secret put GOOGLE_REFRESH_TOKEN
[vars]
GA_MEASUREMENT_ID = "G-9WNEM9ZHE7"
GA_PROPERTY_ID = "461757579"

[[services]]
binding = "AUTH_MCP"
service = "mcp-auth"

[[services]]
binding = "MCP_SERVICE"
service = "spike-land-mcp"

[[services]]
binding = "SPIKE_CHAT"
service = "spike-chat"

[[routes]]
pattern = "edge.spike.land"
custom_domain = true

[[routes]]
pattern = "spike.land/*"
zone_name = "spike.land"

[[routes]]
pattern = "www.spike.land/*"
zone_name = "spike.land"

[[routes]]
pattern = "analytics.spike.land"
custom_domain = true

[[routes]]
pattern = "*.spike.land/*"
zone_name = "spike.land"

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "spike_analytics"

# Scheduled error-rate + payment-health checks.
# Runs every 15 minutes; handleScheduled() queries error_logs and pages via
# Sentry when thresholds are breached. Activation of this trigger is what
# makes the existing handleScheduled dead-code become live-code.
[triggers]
crons = ["*/15 * * * *"]

[env.staging]
name = "spike-edge-staging"
vars = { APP_ENV = "staging" }

[[env.staging.routes]]
pattern = "staging-edge.spike.land/*"
zone_name = "spike.land"
