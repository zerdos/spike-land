<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a"/>
      <stop offset="100%" style="stop-color:#0f1a2e"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="60%" style="stop-color:#3b82f6;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="50%" style="stop-color:#10b981;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#064e3b;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow8">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#60a5fa" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/>
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
    <line x1="1200" y1="0" x2="1200" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/>
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="630" x2="1200" y2="630"/>
  </g>

  <!-- Connection lines between nodes -->
  <g stroke="#3b82f6" stroke-width="1" fill="none" opacity="0.4">
    <!-- Center to ring 1 -->
    <line x1="600" y1="280" x2="600" y2="140"/>
    <line x1="600" y1="280" x2="720" y2="210"/>
    <line x1="600" y1="280" x2="760" y2="310"/>
    <line x1="600" y1="280" x2="700" y2="410"/>
    <line x1="600" y1="280" x2="500" y2="410"/>
    <line x1="600" y1="280" x2="440" y2="310"/>
    <line x1="600" y1="280" x2="480" y2="210"/>
    <!-- Ring 1 cross-connections -->
    <line x1="600" y1="140" x2="720" y2="210"/>
    <line x1="720" y1="210" x2="760" y2="310"/>
    <line x1="760" y1="310" x2="700" y2="410"/>
    <line x1="700" y1="410" x2="500" y2="410"/>
    <line x1="500" y1="410" x2="440" y2="310"/>
    <line x1="440" y1="310" x2="480" y2="210"/>
    <line x1="480" y1="210" x2="600" y2="140"/>
    <!-- Outer ring connections -->
    <line x1="600" y1="60" x2="600" y2="140" stroke="#34d399"/>
    <line x1="820" y1="130" x2="720" y2="210" stroke="#34d399"/>
    <line x1="900" y1="310" x2="760" y2="310" stroke="#34d399"/>
    <line x1="850" y1="490" x2="700" y2="410" stroke="#34d399"/>
    <line x1="600" y1="520" x2="600" y2="140"/>
    <line x1="350" y1="490" x2="500" y2="410" stroke="#34d399"/>
    <line x1="300" y1="310" x2="440" y2="310" stroke="#34d399"/>
    <line x1="380" y1="130" x2="480" y2="210" stroke="#34d399"/>
  </g>

  <!-- Outer ring nodes (green) -->
  <g filter="url(#glow3)">
    <circle cx="600" cy="60" r="14" fill="url(#centerGlow)" stroke="#34d399" stroke-width="1.5"/>
    <circle cx="820" cy="130" r="12" fill="#0f2a20" stroke="#34d399" stroke-width="1.5"/>
    <circle cx="900" cy="310" r="14" fill="#0f2a20" stroke="#34d399" stroke-width="1.5"/>
    <circle cx="850" cy="490" r="12" fill="#0f2a20" stroke="#34d399" stroke-width="1.5"/>
    <circle cx="350" cy="490" r="12" fill="#0f2a20" stroke="#34d399" stroke-width="1.5"/>
    <circle cx="300" cy="310" r="14" fill="#0f2a20" stroke="#34d399" stroke-width="1.5"/>
    <circle cx="380" cy="130" r="12" fill="#0f2a20" stroke="#34d399" stroke-width="1.5"/>
  </g>

  <!-- Inner ring nodes (blue) -->
  <g filter="url(#glow3)">
    <circle cx="600" cy="140" r="16" fill="#0f172a" stroke="#60a5fa" stroke-width="2"/>
    <circle cx="720" cy="210" r="14" fill="#0f172a" stroke="#60a5fa" stroke-width="2"/>
    <circle cx="760" cy="310" r="14" fill="#0f172a" stroke="#60a5fa" stroke-width="2"/>
    <circle cx="700" cy="410" r="14" fill="#0f172a" stroke="#60a5fa" stroke-width="2"/>
    <circle cx="500" cy="410" r="14" fill="#0f172a" stroke="#60a5fa" stroke-width="2"/>
    <circle cx="440" cy="310" r="14" fill="#0f172a" stroke="#60a5fa" stroke-width="2"/>
    <circle cx="480" cy="210" r="14" fill="#0f172a" stroke="#60a5fa" stroke-width="2"/>
  </g>

  <!-- Center node -->
  <circle cx="600" cy="280" r="28" fill="#0f172a" stroke="#60a5fa" stroke-width="2.5" filter="url(#glow8)"/>
  <circle cx="600" cy="280" r="20" fill="url(#nodeGlow)"/>
  <circle cx="600" cy="280" r="8" fill="#93c5fd"/>

  <!-- Title -->
  <text x="600" y="575" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#93c5fd" text-anchor="middle" letter-spacing="1">Thinking in Systems, Continued</text>
  <text x="600" y="608" font-family="Georgia, serif" font-size="16" fill="#34d399" text-anchor="middle" letter-spacing="5" opacity="0.8">A DEDICATION</text>
</svg>
