<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="warmLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c27f;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#fc5c7d;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="windowGlow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d5b7;stop-opacity:0.9"/>
      <stop offset="40%" style="stop-color:#f0c27f;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#c9a96e;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="plantGreen" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#2d5a3f"/>
      <stop offset="100%" style="stop-color:#4a9e6b"/>
    </linearGradient>
    <linearGradient id="potBrown" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#8b6f47"/>
      <stop offset="100%" style="stop-color:#6b4f2f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="paperTexture">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="multiply"/>
    </filter>
    <clipPath id="windowClip">
      <rect x="420" y="80" width="360" height="470" rx="4"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle texture -->
  <rect width="1200" height="630" fill="url(#bg)" opacity="0.5" filter="url(#paperTexture)"/>

  <!-- Room — dark interior walls -->
  <rect x="100" y="60" width="1000" height="510" rx="2" fill="#12121f" opacity="0.6"/>

  <!-- Window frame outer -->
  <rect x="410" y="70" width="380" height="490" rx="6" fill="#3a3a4f" opacity="0.8"/>

  <!-- Window — morning light -->
  <rect x="420" y="80" width="360" height="470" rx="4" fill="url(#windowGlow)"/>

  <!-- Window light spill into room -->
  <ellipse cx="600" cy="560" rx="280" ry="60" fill="url(#warmLight)" opacity="0.3" filter="url(#softGlow)"/>

  <!-- Window divider — vertical -->
  <rect x="597" y="80" width="6" height="470" fill="#3a3a4f" opacity="0.7"/>

  <!-- Window divider — horizontal -->
  <rect x="420" y="300" width="360" height="5" fill="#3a3a4f" opacity="0.7"/>

  <!-- Outside scene through window — soft sky -->
  <g clip-path="url(#windowClip)" opacity="0.3">
    <!-- Distant buildings -->
    <rect x="430" y="200" width="40" height="180" fill="#2a2a40" rx="2"/>
    <rect x="480" y="240" width="35" height="140" fill="#252538" rx="2"/>
    <rect x="525" y="180" width="30" height="200" fill="#2d2d45" rx="2"/>
    <rect x="610" y="220" width="45" height="160" fill="#282840" rx="2"/>
    <rect x="665" y="190" width="35" height="190" fill="#2a2a42" rx="2"/>
    <rect x="710" y="250" width="40" height="130" fill="#262638" rx="2"/>
    <!-- Sky glow at horizon -->
    <rect x="420" y="320" width="360" height="230" fill="#c9a96e" opacity="0.15"/>
  </g>

  <!-- Windowsill -->
  <rect x="400" y="545" width="400" height="14" rx="3" fill="#4a4a5f"/>
  <rect x="400" y="545" width="400" height="4" rx="2" fill="#5a5a70"/>

  <!-- Plant pot -->
  <path d="M555,545 L560,500 L590,500 L595,545 Z" fill="url(#potBrown)"/>
  <rect x="553" y="497" width="44" height="6" rx="2" fill="#9a7a52"/>

  <!-- Plant — small, leaning toward light -->
  <g transform="rotate(-8, 575, 497)">
    <!-- Stem -->
    <path d="M575,497 Q573,470 570,445" stroke="#3d7a52" stroke-width="2.5" fill="none"/>
    <!-- Leaves reaching toward window -->
    <ellipse cx="565" cy="450" rx="12" ry="6" fill="url(#plantGreen)" transform="rotate(-25, 565, 450)" opacity="0.9"/>
    <ellipse cx="572" cy="460" rx="10" ry="5" fill="url(#plantGreen)" transform="rotate(15, 572, 460)" opacity="0.8"/>
    <ellipse cx="568" cy="440" rx="8" ry="4" fill="#5ab87a" transform="rotate(-40, 568, 440)" opacity="0.7"/>
    <!-- One small new leaf at top -->
    <ellipse cx="569" cy="443" rx="5" ry="3" fill="#6bc98a" transform="rotate(-30, 569, 443)" opacity="0.6"/>
  </g>

  <!-- Letter/envelope on the sill -->
  <g transform="rotate(5, 660, 538)">
    <rect x="640" y="528" width="50" height="32" rx="2" fill="#e8e0d0" opacity="0.85"/>
    <!-- Envelope flap -->
    <path d="M640,528 L665,542 L690,528" fill="none" stroke="#c8b8a0" stroke-width="1"/>
    <!-- Red marking -->
    <rect x="645" y="548" width="18" height="3" rx="1" fill="#c94040" opacity="0.6"/>
  </g>

  <!-- Left wall detail — shadow/depth -->
  <rect x="100" y="60" width="310" height="510" fill="#0d0d18" opacity="0.3"/>

  <!-- Right wall detail -->
  <rect x="790" y="60" width="310" height="510" fill="#0d0d18" opacity="0.3"/>

  <!-- Floor line -->
  <line x1="100" y1="570" x2="1100" y2="570" stroke="#2a2a3f" stroke-width="1"/>

  <!-- Light rays from window — subtle -->
  <g opacity="0.06">
    <polygon points="420,80 100,400 100,570 420,550" fill="#f0c27f"/>
    <polygon points="780,80 1100,400 1100,570 780,550" fill="#f0c27f"/>
  </g>

  <!-- Title text area — bottom -->
  <rect x="0" y="560" width="1200" height="70" fill="#0a0a18" opacity="0.7"/>

  <!-- Title -->
  <text x="600" y="602" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#d4c5a9" letter-spacing="3" filter="url(#glow)">
    WHY EVICT A RESIDENT IN MENTAL HEALTH CRISIS?
  </text>

  <!-- Subtitle -->
  <text x="600" y="622" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#8a7e6a" letter-spacing="5">
    A GENUINE QUESTION, ASKED WITHOUT ANGER
  </text>

  <!-- Warm dust particles in light -->
  <circle cx="500" cy="300" r="1.5" fill="#f0c27f" opacity="0.3"/>
  <circle cx="520" cy="250" r="1" fill="#f0c27f" opacity="0.25"/>
  <circle cx="550" cy="350" r="1.2" fill="#f0c27f" opacity="0.2"/>
  <circle cx="580" cy="200" r="1" fill="#f0c27f" opacity="0.35"/>
  <circle cx="650" cy="280" r="1.3" fill="#f0c27f" opacity="0.2"/>
  <circle cx="480" cy="400" r="1" fill="#f0c27f" opacity="0.15"/>
  <circle cx="620" cy="150" r="0.8" fill="#f0c27f" opacity="0.25"/>
  <circle cx="700" cy="350" r="1.1" fill="#f0c27f" opacity="0.18"/>
  <circle cx="540" cy="180" r="0.9" fill="#f0c27f" opacity="0.22"/>
  <circle cx="660" cy="420" r="1.2" fill="#f0c27f" opacity="0.12"/>
</svg>
