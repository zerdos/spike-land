    if (sixteenth === 0) zimmerBarsElapsed++;

    // ── Build/Drop every 64 bars ──
    const isInBuild = zimmerBarsElapsed % 64 >= 60; // last 4 bars before drop
    const isOnDrop  = zimmerBarsElapsed % 64 === 0 && zimmerBarsElapsed > 0;
    const buildIntensity = isInBuild ? ((zimmerBarsElapsed % 64 - 60) / 4) : 0;

    // ── Taiko: beats 0 and 2, ~60% chance, louder during builds ──
    if (sixteenth === 0) {
      const taikoChance = isInBuild ? 0.85 : 0.60;
      if (Math.random() < taikoChance) {
        const vel = isInBuild
          ? 0.75 + buildIntensity * 0.2 + Math.random() * 0.05
          : 0.55 + Math.random() * 0.2;
        playTaiko(t, vel);
      }
    }
    if (sixteenth === 8) {
      const taikoChance = isInBuild ? 0.75 : 0.55;
      if (Math.random() < taikoChance) {
        const vel = isInBuild
          ? 0.65 + buildIntensity * 0.15 + Math.random() * 0.05
          : 0.45 + Math.random() * 0.15;
        playTaiko(t, vel);
      }
    }
    // Extra taiko hits during build
    if (isInBuild && (sixteenth === 4 || sixteenth === 12) && Math.random() < buildIntensity * 0.6) {
      playTaiko(t, 0.35 + buildIntensity * 0.2);
    }

    // ── Hi-hats: sparser in Zimmer — only on beats ──
    if (sixteenth % 4 === 0 && Math.random() < 0.45) {
      playHihat(t, false, 0.1 + Math.random() * 0.12);
    }
    // 8th-note hats during builds
    if (isInBuild && sixteenth % 2 === 0 && Math.random() < buildIntensity * 0.7) {
      playHihat(t, false, 0.08 + buildIntensity * 0.08);
    }

    // ── Pulsing ostinato: every 8th note (constant drive) ──
    if (sixteenth % 2 === 0 && ostPattern.length > 0) {
      const midi = ostPattern[ostStep % ostPattern.length];
      const vel = isInBuild
        ? 0.5 + buildIntensity * 0.25 + Math.random() * 0.1
        : 0.35 + Math.random() * 0.2;
      const dur = quarterNote * 0.4; // staccato
      playOstinato(midi, t, dur, vel);
      ostStep++;

      // Double the ostinato at 16th notes during intense build
      if (isInBuild && buildIntensity > 0.5 && sixteenth % 2 === 1) {
        playOstinato(midi, t, dur * 0.8, vel * 0.6);
      }
    }

    // ── Brass stabs: every 16-32 bars (dramatic moments) ──
    if (sixteenth === 0 && bar - lastBrassBar >= 16 + Math.floor(Math.random() * 16)) {
      lastBrassBar = bar;
      const brassTones = getChordTones(chord, 0).slice(0, 3); // root, 3rd, 5th
      const vel = 0.8 + Math.random() * 0.15;
      playBrass(brassTones, t, quarterNote * 2, vel);
      // Follow-up stab half a bar later for that BRAAAM effect
      if (Math.random() < 0.6) {
        const brassTones2 = [chord.root - 5, chord.root, chord.root + 7];
        playBrass(brassTones2, t + halfNote, quarterNote * 1.5, vel * 0.75);
      }
    }

    // ── Brass during build/drop ──
    if (isOnDrop && sixteenth === 0) {
      const allTones = getChordTones(chord, 0);
      playBrass(allTones, t, quarterNote * 4, 0.95);
    }

    // ── String tremolo: layers in and out every ~8 bars ──
    if (sixteenth === 0 && bar % 8 === 0) {
      if (Math.random() < 0.55 || isInBuild) {
        const strTones = getChordTones(chord, 1).slice(0, 3);
        const dur = wholeNote * (3 + Math.random() * 4);
        const vel = isInBuild
          ? 0.5 + buildIntensity * 0.3
          : 0.3 + Math.random() * 0.25;
        playStringTremolo(strTones, t, dur, vel);
      }
    }

    // ── Melody: sparse, wide intervals, dramatic ──
    if (sixteenth === 0 && Math.random() < 0.4 && melodyNotes.length > 0) {
      const midi = melodyNotes[melodyStep % melodyNotes.length];
      if (midi !== null) {
        const vel = 0.35 + Math.random() * 0.25;
        // Longer notes for cinematic feel
        const dur = quarterNote * (1.0 + Math.random() * 3.0);
        playMelody(midi, t + 0.01, dur, vel);
      }
      melodyStep++;
      if (melodyStep >= melodyNotes.length) {
        melodyNotes = buildZimmerMelody(chord);
        melodyStep = 0;
      }
    }

  // ══════════════════════════════════════════════════════════════════
  // DAFT PUNK SCHEDULER — French disco house, 115 BPM
  // ══════════════════════════════════════════════════════════════════
  } else if (currentPersona === 'daftpunk') {

    // ── Four-on-the-floor kick — every beat ──
    if (sixteenth === 0 || sixteenth === 4 || sixteenth === 8 || sixteenth === 12) {
      playDiscoKick(t, 0.82 + Math.random() * 0.12);
    }

    // ── Open hi-hat on offbeats (8th note between kicks) ──
    if (sixteenth === 2 || sixteenth === 6 || sixteenth === 10 || sixteenth === 14) {
      playDiscoHat(t, true, 0.4 + Math.random() * 0.2);
    }
    // Closed hi-hat fills on 16ths occasionally
    if ((sixteenth % 2 === 1) && Math.random() < 0.22) {
      playDiscoHat(t, false, 0.15 + Math.random() * 0.12);
    }

    // ── Clap on beats 2 and 4 (sixteenth 4 and 12) ──
    if (sixteenth === 4 || sixteenth === 12) {
      playClap(t, 0.65 + Math.random() * 0.18);
    }
    // Occasional ghost clap
    if ((sixteenth === 6 || sixteenth === 14) && Math.random() < 0.15) {
      playClap(t, 0.22);
    }

    // ── Funky disco bass — syncopated 16th note pattern ──
    if (daftBassPattern.length > 0) {
      const bassNote = daftBassPattern[sixteenth % daftBassPattern.length];
      if (bassNote !== null) {
        const vel = 0.7 + Math.random() * 0.2;
        // Octave jump on certain beats for funk feel
        const octJump = (sixteenth === 7 || sixteenth === 15) ? 12 : 0;
        playDiscoBass(bassNote + octJump, t, quarterNote * 0.22, vel);
      }
    }

    // ── Filtered chord stabs — on beat + occasional syncopated hits ──
    if (sixteenth === 0 && Math.random() < 0.55) {
      const chordTones = getChordTones(chord, 0);
      playDiscoChord(chordTones, t, quarterNote * 0.5, 0.72 + Math.random() * 0.15);
    }
    if (sixteenth === 6 && Math.random() < 0.35) {
      const chordTones = getChordTones(chord, 0);
      playDiscoChord(chordTones, t, quarterNote * 0.35, 0.5 + Math.random() * 0.15);
    }
    if (sixteenth === 10 && Math.random() < 0.4) {
      const chordTones = getChordTones(chord, 0);
      playDiscoChord(chordTones, t, quarterNote * 0.4, 0.55 + Math.random() * 0.12);
    }

    // ── Dreamy arpeggio — 8th note pattern through major 7th tones ──
    if (sixteenth % 2 === 0 && daftArpPattern.length > 0) {
      const midi = daftArpPattern[daftArpStep % daftArpPattern.length];
      const vel = 0.35 + Math.random() * 0.3;
      playArp(midi, t + (Math.random() - 0.5) * 0.012, quarterNote * 0.4, vel);
      daftArpStep++;
    }

    // ── Phaser lead — pentatonic major melody runs ──
    if (sixteenth % 4 === 0 && Math.random() < 0.55 && daftPhaserPattern.length > 0) {
      const midi = daftPhaserPattern[daftPhaserStep % daftPhaserPattern.length];
      const vel = 0.45 + Math.random() * 0.3;
      const dur = quarterNote * (0.25 + Math.random() * 0.5);
      playPhaserLead(midi, t, dur, vel);
      daftPhaserStep++;
      if (daftPhaserStep >= daftPhaserPattern.length) {
        daftPhaserPattern = buildDaftPhaserLine(chord);
        daftPhaserStep = 0;
      }
    }

    // ── Vocoder pad: sustained — already playing from chord change init ──
    // Refresh every ~8 bars so it doesn't die out
    if (sixteenth === 0 && bar % 8 === 4) {
      const padTones = getChordTones(chord, 0);
      playVocoderPad(padTones, t, wholeNote * 4, 0.5 + Math.random() * 0.15);
    }

  // ══════════════════════════════════════════════════════════════════
  // INTERSTELLA 5555 SCHEDULER — Euphoric house, 126 BPM
  // ══════════════════════════════════════════════════════════════════
  } else {

    // Track bars for breakdown logic
    if (sixteenth === 0) stellaBarsElapsed++;

    // Every 32 bars: 4-bar breakdown, then drop back in
    const isBreakdown = stellaBarsElapsed % 32 >= 28;
    const isDrop      = stellaBarsElapsed % 32 === 0 && stellaBarsElapsed > 0;

    // ── Relentless four-on-the-floor kick ──
    if (!isBreakdown) {
      if (sixteenth === 0 || sixteenth === 4 || sixteenth === 8 || sixteenth === 12) {
        playHouseKick(t, 0.88 + Math.random() * 0.1);
      }
    }

    // ── 16th note hi-hats with accent pattern ──
    if (!isBreakdown) {
      const isAccented = sixteenth % 4 === 2; // upbeat accents
      const vel = isAccented ? 0.45 + Math.random() * 0.2 : 0.18 + Math.random() * 0.14;
      playDiscoHat(t, sixteenth === 14 && Math.random() < 0.3, vel);
    }

    // ── Ride cymbal on 8th notes for energy ──
    if (!isBreakdown && sixteenth % 2 === 0) {
      playRide(t, 0.25 + Math.random() * 0.12);
    }

    // ── Acid bass — 16th note TB-303 patterns ──
    if (stellaAcidPattern.length > 0) {
      const acidNote = stellaAcidPattern[stellaAcidStep % stellaAcidPattern.length];
      if (acidNote !== null) {
        const isAccent = sixteenth === 0 || sixteenth === 8;
        const isSlide  = sixteenth === 3 || sixteenth === 11;
        const vel = isBreakdown ? 0.5 : 0.78 + Math.random() * 0.15;
        playAcidBass(acidNote, t, quarterNote * (isSlide ? 0.3 : 0.18), vel, isSlide, isAccent);
      }
      stellaAcidStep++;
    }

    // ── Supersaw stabs with sidechain pumping — every 4 bars, refreshed ──
    if (sixteenth === 0 && bar % 4 === 0 && !isBreakdown) {
      const ssTones = getChordTones(chord, 0);
      const vel = isDrop ? 0.92 : 0.72 + Math.random() * 0.15;
      playSupersaw(ssTones, t, wholeNote * 4, vel);
    }

    // ── Fast arpeggio — "Aerodynamic" style, every 16th note ──
    if (stellaArpPattern2.length > 0) {
      const midi = stellaArpPattern2[stellaArpStep2 % stellaArpPattern2.length];
      const vel = isBreakdown ? 0.55 + Math.random() * 0.2 : 0.38 + Math.random() * 0.2;
      const dur = quarterNote * 0.18;
      playFastArp(midi, t, dur, vel);
      stellaArpStep2++;
      if (stellaArpStep2 >= stellaArpPattern2.length) {
        stellaArpPattern2 = buildStellaArpPattern(chord);
        stellaArpStep2 = 0;
      }
    }

    // ── Talkbox lead — melodic fragments every few beats ──
    if (sixteenth === 0 && Math.random() < 0.5 && stellaTbPattern.length > 0) {
      const midi = stellaTbPattern[stellaTbStep % stellaTbPattern.length];
      if (midi !== null) {
        const vel = 0.45 + Math.random() * 0.25;
        const dur = quarterNote * (0.35 + Math.random() * 0.6);
        playTalkbox(midi, t + 0.01, dur, vel);
      }
      stellaTbStep++;
      if (stellaTbStep >= stellaTbPattern.length) {
        stellaTbPattern = buildTalkboxLine(chord);
        stellaTbStep = 0;
      }
    }

    // ── Euphoric drop: full supersaw + acid burst ──
    if (isDrop && sixteenth === 0) {
      playHouseKick(t, 0.97);
      const ssTones = getChordTones(chord, 0);
      playSupersaw(ssTones, t, wholeNote * 8, 0.95);
    }
  }
}

// ─── VISUAL ENGINE ───────────────────────────────────────────────────────────

let particles = [];
let gradPhase = 0;
let gradSpeed = 0.0003;
let W, H;
let analyserData;

class Particle {
  constructor() { this.reset(true); }

  reset(initial = false) {
    this.x = Math.random() * W;
    this.y = initial ? Math.random() * H : H + 20;
    this.size = Math.random() * 2.5 + 0.3;
    this.speedY = -(Math.random() * 0.4 + 0.1);
    this.speedX = (Math.random() - 0.5) * 0.15;
    this.opacity = 0;
    this.maxOpacity = Math.random() * 0.45 + 0.05;
    this.fadeIn = 0.004 + Math.random() * 0.003;
    this.fadeOut = 0.001 + Math.random() * 0.002;
    this.life = Math.random() * 400 + 200;
    this.age = initial ? Math.random() * this.life : 0;
    this.hue = 200 + Math.random() * 80;
    this.phase = Math.random() * Math.PI * 2;
    this.wobble = Math.random() * 0.3;
  }

  update(energy) {
    this.age++;
    this.x += this.speedX + Math.sin(this.phase + this.age * 0.01) * this.wobble;
    this.y += this.speedY * (1 + energy * 0.5);
    this.phase += 0.02;

    if (this.age < 80) {
      this.opacity = Math.min(this.maxOpacity, this.opacity + this.fadeIn);
    } else if (this.age > this.life - 100) {
      this.opacity = Math.max(0, this.opacity - this.fadeOut);
    }

    return this.age < this.life && this.y > -20;
  }

  draw(ctx, energy) {
    ctx.save();
    const glow = this.size + energy * 3;
    const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glow * 2);
    gradient.addColorStop(0, `hsla(${this.hue}, 80%, 80%, ${this.opacity})`);
    gradient.addColorStop(1, `hsla(${this.hue}, 80%, 80%, 0)`);
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(this.x, this.y, glow * 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function initParticles() {
  particles = [];
  for (let i = 0; i < 120; i++) particles.push(new Particle());
}

function resizeCanvas() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

// Geometric wave renderer
let wavePhase = 0;

function drawWaves(energy, hue1, hue2, ampMult = 1.0) {
  const numWaves = 4;
  for (let w = 0; w < numWaves; w++) {
    ctx2d.beginPath();
    const amp = (30 + energy * 60) * (1 - w * 0.18) * ampMult;
    const freq = 0.008 + w * 0.003;
    const phaseOffset = wavePhase * (0.6 + w * 0.3) + w * Math.PI * 0.5;
    const yBase = H * (0.3 + w * 0.12);
    const opacity = (0.04 - w * 0.008) * (1 + energy);
    const waveHue = hue1 + (hue2 - hue1) * (w / numWaves);

    ctx2d.moveTo(0, yBase);
    for (let x = 0; x <= W; x += 4) {
      const y = yBase + Math.sin(x * freq + phaseOffset) * amp
                      + Math.sin(x * freq * 2.1 + phaseOffset * 1.3) * amp * 0.3;
      ctx2d.lineTo(x, y);
    }
    ctx2d.lineTo(W, H);
    ctx2d.lineTo(0, H);
    ctx2d.closePath();

    const grad = ctx2d.createLinearGradient(0, yBase - amp, 0, H);
    grad.addColorStop(0, `hsla(${waveHue}, 60%, 55%, ${opacity})`);
    grad.addColorStop(1, `hsla(${waveHue + 20}, 50%, 20%, 0)`);
    ctx2d.fillStyle = grad;
    ctx2d.fill();
  }
  wavePhase += 0.008;
}

function getAudioEnergy() {
  if (!analyserNode || !analyserData) return 0;
  analyserNode.getByteFrequencyData(analyserData);
  let sum = 0;
  for (let i = 0; i < analyserData.length; i++) sum += analyserData[i];
  return (sum / analyserData.length) / 255;
}

function animate() {
  animFrame = requestAnimationFrame(animate);

  const energy = isPlaying ? getAudioEnergy() : 0;
  const isZimmer      = currentPersona === 'zimmer';
  const isDaftPunk    = currentPersona === 'daftpunk';
  const isInterstella = currentPersona === 'interstella';

  const energyMult = isZimmer ? 5 : (isDaftPunk ? 6 : (isInterstella ? 7 : 3));
  gradPhase += gradSpeed * (1 + energy * energyMult);

  let hue1, hue2, satCenter, satEdge, lumBase;

  if (isZimmer) {
    // Deep amber/red/orange palette
    hue1 = (22 + Math.sin(gradPhase * 0.5) * 12) % 360;
    hue2 = (hue1 + 25 + Math.sin(gradPhase * 0.3) * 10) % 360;
    satCenter = 55 + energy * 20;
    satEdge   = 30;
    lumBase   = 5 + energy * 6;
  } else if (isDaftPunk) {
    // Electric blue / hot pink / neon purple cycling
    hue1 = (195 + Math.sin(gradPhase * 1.1) * 25) % 360; // cyan-blue range
    hue2 = (310 + Math.sin(gradPhase * 0.7) * 20) % 360; // pink-purple range
    satCenter = 70 + energy * 25;
    satEdge   = 45;
    lumBase   = 4 + energy * 9; // pulses more with energy
  } else if (isInterstella) {
    // Deep space: indigo / cosmic purple / gold flashes
    hue1 = (260 + Math.sin(gradPhase * 0.6) * 20) % 360; // indigo-purple
    hue2 = (280 + Math.sin(gradPhase * 0.4) * 30) % 360; // cosmic purple
    satCenter = 65 + energy * 22;
    satEdge   = 40;
    lumBase   = 3 + energy * 7;  // very dark space feel, pulses with drops
  } else {
    hue1 = (210 + Math.sin(gradPhase * 0.7) * 30) % 360;
    hue2 = (hue1 + 40 + Math.sin(gradPhase * 0.4) * 20) % 360;
    satCenter = 35;
    satEdge   = 20;
    lumBase   = 8 + energy * 4;
  }

  const bg = ctx2d.createRadialGradient(W * 0.5, H * 0.4, 0, W * 0.5, H * 0.5, Math.max(W, H));
  const center = `hsla(${hue1}, ${satCenter}%, ${lumBase}%, 1)`;
  const mid    = `hsla(${(hue1 + hue2) / 2}, ${Math.round(satCenter * 0.8)}%, ${Math.round(lumBase * 0.75)}%, 1)`;
  const edge   = `hsla(${hue2}, ${satEdge}%, ${Math.round(lumBase * 0.5)}%, 1)`;
  bg.addColorStop(0, center);
  bg.addColorStop(0.5, mid);
  bg.addColorStop(1, edge);

  ctx2d.fillStyle = bg;
  ctx2d.fillRect(0, 0, W, H);

  // Daft Punk: second neon accent overlay — pink sweep
  if (isDaftPunk && energy > 0.04) {
    const neonHue = (320 + Math.sin(gradPhase * 2.2) * 40) % 360;
    const neonGlow = ctx2d.createRadialGradient(W * 0.5, H * 0.6, 0, W * 0.5, H * 0.6, W * 0.6);
    neonGlow.addColorStop(0, `hsla(${neonHue}, 100%, 55%, ${energy * 0.06})`);
    neonGlow.addColorStop(1, 'transparent');
    ctx2d.fillStyle = neonGlow;
    ctx2d.fillRect(0, 0, W, H);
  }

  // Interstella: gold stardust shimmer across top
  if (isInterstella && energy > 0.03) {
    const goldGlow = ctx2d.createLinearGradient(0, 0, W, H * 0.4);
    goldGlow.addColorStop(0, `hsla(48, 100%, 60%, ${energy * 0.04})`);
    goldGlow.addColorStop(0.5, `hsla(285, 90%, 55%, ${energy * 0.06})`);
    goldGlow.addColorStop(1, 'transparent');
    ctx2d.fillStyle = goldGlow;
    ctx2d.fillRect(0, 0, W, H * 0.4);
  }

  const waveAmpMult = isZimmer ? 1.7 : (isDaftPunk ? 1.4 : (isInterstella ? 1.2 : 1.0));
  const waveEnergy  = isZimmer ? 1.4 : (isDaftPunk ? 1.8 : (isInterstella ? 1.6 : 1.0));
  drawWaves(energy * waveEnergy, hue1, hue2, waveAmpMult);

  // Central glow
  const glowThreshold = (isZimmer || isDaftPunk || isInterstella) ? 0.02 : 0.05;
  if (energy > glowThreshold) {
    const glowRMult = isZimmer ? 0.4 : (isDaftPunk ? 0.45 : (isInterstella ? 0.5 : 0.3));
    const glowR = Math.max(W, H) * (glowRMult + energy * 0.5);
    const centerGlow = ctx2d.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, glowR);
    let glowAlpha1, glowAlpha2;
    if (isDaftPunk) {
      glowAlpha1 = energy * 0.18;
      glowAlpha2 = energy * 0.08;
    } else if (isInterstella) {
      glowAlpha1 = energy * 0.16;
      glowAlpha2 = energy * 0.07;
    } else if (isZimmer) {
      glowAlpha1 = energy * 0.14;
      glowAlpha2 = energy * 0.06;
    } else {
      glowAlpha1 = energy * 0.08;
      glowAlpha2 = energy * 0.03;
    }
    centerGlow.addColorStop(0, `hsla(${hue1}, 85%, 65%, ${glowAlpha1})`);
    centerGlow.addColorStop(0.4, `hsla(${hue2}, 70%, 45%, ${glowAlpha2})`);
    centerGlow.addColorStop(1, 'transparent');
    ctx2d.fillStyle = centerGlow;
    ctx2d.fillRect(0, 0, W, H);
  }

  // Particles
  if (isPlaying) {
    let spawnRate, maxParticles;
    if (isDaftPunk) {
      spawnRate    = 0.7 + energy * 2.8;
      maxParticles = 320;
    } else if (isInterstella) {
      spawnRate    = 0.8 + energy * 3.5;
      maxParticles = 380; // star-field density
    } else if (isZimmer) {
      spawnRate    = 0.55 + energy * 2.0;
      maxParticles = 280;
    } else {
      spawnRate    = 0.35 + energy * 1.2;
      maxParticles = 200;
    }

    if (Math.random() < spawnRate) {
      if (particles.length < maxParticles) {
        const p = new Particle();
        if (isZimmer) {
          p.hue = 15 + Math.random() * 30; // orange-red
          p.speedY *= 1.5;
          p.size *= 1.4;
        } else if (isDaftPunk) {
          // Neon pink / electric blue / purple
          const hues = [195, 210, 310, 330, 280];
          p.hue = hues[Math.floor(Math.random() * hues.length)] + (Math.random() - 0.5) * 20;
          p.speedY *= 1.8; // faster, more energetic
          p.size *= 1.1;
          p.maxOpacity = Math.random() * 0.65 + 0.1; // brighter
        } else if (isInterstella) {
          // Star-like: small, bright, many colors
          const hues = [260, 48, 285, 330, 200];
          p.hue = hues[Math.floor(Math.random() * hues.length)] + (Math.random() - 0.5) * 15;
          p.speedY *= 0.9 + Math.random() * 1.4; // some slow, some fast
          p.size = Math.random() * 1.5 + 0.2; // smaller, star-like
          p.maxOpacity = Math.random() * 0.8 + 0.15; // bright stars
          p.life = Math.random() * 600 + 300; // live longer
        }
        particles.push(p);
      }
    }

    const energyScale = isDaftPunk ? 1.6 : (isInterstella ? 1.8 : (isZimmer ? 1.3 : 1.0));
    particles = particles.filter(p => {
      const alive = p.update(energy * energyScale);
      if (alive) p.draw(ctx2d, energy * energyScale);
      return alive;
    });
  } else {
    particles.forEach(p => {
      p.update(0);
      p.draw(ctx2d, 0);
    });
  }
}

// ─── START / STOP ─────────────────────────────────────────────────────────────

async function startMusic() {
  if (!audioCtx) {
    statusEl.textContent = 'initializing...';
    await initAudio();
    analyserData = new Uint8Array(analyserNode.frequencyBinCount);
  }

  if (audioCtx.state === 'suspended') {
    await audioCtx.resume();
  }

  // Set tempo and initial state based on persona
  if      (currentPersona === 'zimmer')      tempo = 63;
  else if (currentPersona === 'daftpunk')    tempo = 115;
  else if (currentPersona === 'interstella') tempo = 126;
  else                                       tempo = 74;

  isPlaying = true;
  beatCount = 0;
  nextNoteTime = audioCtx.currentTime + 0.1;
  currentChordIdx = 0;
  lastChordChange = 0;
  arpStep = 0; melodyStep = 0;
  ostStep = 0; zimmerBarsElapsed = 0; lastBrassBar = -32;
  daftBassStep = 0; daftArpStep = 0; daftPhaserStep = 0;
  stellaBarsElapsed = 0; stellaAcidStep = 0; stellaArpStep2 = 0;
  stellaTbStep = 0; stellaBreakdown = false;

  const chords = activeChords();
  if (currentPersona === 'ambient') {
    arpPattern = buildArpPattern(chords[0]);
    melodyNotes = buildMelodyLine(chords[0]);
  } else if (currentPersona === 'zimmer') {
    ostPattern = buildOstinatoPattern(chords[0]);
    melodyNotes = buildZimmerMelody(chords[0]);
  } else if (currentPersona === 'daftpunk') {
    daftBassPattern   = buildDaftBassPattern(chords[0]);
    daftArpPattern    = buildDaftArpPattern(chords[0]);
    daftPhaserPattern = buildDaftPhaserLine(chords[0]);
  } else {
    stellaAcidPattern = buildAcidPattern(chords[0]);
    stellaArpPattern2 = buildStellaArpPattern(chords[0]);
    stellaTbPattern   = buildTalkboxLine(chords[0]);
  }

  // Start scheduling
  schedulerInterval = setInterval(scheduler, SCHEDULE_INTERVAL);

  // Initial chord display
  let displayName;
  if      (currentPersona === 'zimmer')      displayName = `spike.land radio ∞ — ZIMMER  ·  ${chords[0].name}`;
  else if (currentPersona === 'daftpunk')    displayName = `spike.land radio ∞ — DAFT PUNK  ·  ${chords[0].name}`;
  else if (currentPersona === 'interstella') displayName = `spike.land radio ∞ — INTERSTELLA  ·  ${chords[0].name}`;
  else                                       displayName = chords[0].name;
  chordDisp.textContent = displayName;
  chordDisp.classList.add('active');

  statusEl.textContent = 'now playing';
  playBtn.classList.add('playing');
  btnIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
}

function stopMusic() {
  isPlaying = false;
  clearInterval(schedulerInterval);

  // Fade out
  if (masterGain) {
    const t = audioCtx.currentTime;
    masterGain.gain.setValueAtTime(masterGain.gain.value, t);
    masterGain.gain.linearRampToValueAtTime(0, t + 1.5);
    setTimeout(() => {
      if (masterGain) masterGain.gain.value = parseFloat(volSlider.value);
    }, 1600);
  }

  statusEl.textContent = 'paused';
  playBtn.classList.remove('playing');
  btnIcon.innerHTML = '<polygon points="5,3 19,12 5,21"/>';
  let idleChordText = 'spike.land radio ∞';
  if      (currentPersona === 'zimmer')      idleChordText = 'spike.land radio ∞ — ZIMMER';
  else if (currentPersona === 'daftpunk')    idleChordText = 'spike.land radio ∞ — DAFT PUNK';
  else if (currentPersona === 'interstella') idleChordText = 'spike.land radio ∞ — INTERSTELLA';
  chordDisp.textContent = idleChordText;
  chordDisp.classList.remove('active');
}

// ─── PERSONA SWITCH ───────────────────────────────────────────────────────────

async function switchPersona() {
  const wasPlaying = isPlaying;

  // Fade out current music
  if (wasPlaying) {
    isPlaying = false;
    clearInterval(schedulerInterval);
    if (masterGain) {
      const t = audioCtx.currentTime;
      masterGain.gain.setValueAtTime(masterGain.gain.value, t);
      masterGain.gain.linearRampToValueAtTime(0, t + 1.2);
    }
    await new Promise(r => setTimeout(r, 1300));
    if (masterGain) masterGain.gain.value = parseFloat(volSlider.value);
  }

  // Cycle through all 4 personas
  const idx = PERSONAS.indexOf(currentPersona);
  currentPersona = PERSONAS[(idx + 1) % PERSONAS.length];

  // Apply persona class to button and style play button
  personaBtn.classList.remove('zimmer', 'daftpunk', 'interstella');
  const titleEl = document.getElementById('title');

  if (currentPersona === 'ambient') {
    personaBtn.textContent = 'AMBIENT';
    playBtn.style.borderColor = '';
    playBtn.style.boxShadow   = '';
    titleEl.style.color = '';
  } else if (currentPersona === 'zimmer') {
    personaBtn.textContent = 'ZIMMER';
    personaBtn.classList.add('zimmer');
    playBtn.style.borderColor = 'rgba(204, 85, 0, 0.35)';
    playBtn.style.boxShadow   = '0 0 60px rgba(204, 85, 0, 0.15), inset 0 0 40px rgba(204, 85, 0, 0.07)';
    titleEl.style.color = 'rgba(255, 160, 60, 0.55)';
  } else if (currentPersona === 'daftpunk') {
    personaBtn.textContent = 'DAFT PUNK';
    personaBtn.classList.add('daftpunk');
    playBtn.style.borderColor = 'rgba(0, 212, 255, 0.4)';
    playBtn.style.boxShadow   = '0 0 60px rgba(0, 212, 255, 0.18), inset 0 0 40px rgba(255, 20, 147, 0.08)';
    titleEl.style.color = 'rgba(0, 212, 255, 0.65)';
  } else {
    personaBtn.textContent = 'INTERSTELLA';
    personaBtn.classList.add('interstella');
    playBtn.style.borderColor = 'rgba(255, 215, 0, 0.35)';
    playBtn.style.boxShadow   = '0 0 60px rgba(102, 0, 204, 0.2), inset 0 0 40px rgba(255, 215, 0, 0.06)';
    titleEl.style.color = 'rgba(255, 215, 0, 0.6)';
  }

  // Update chord display to idle state
  let idleText = 'spike.land radio ∞';
  if      (currentPersona === 'zimmer')      idleText = 'spike.land radio ∞ — ZIMMER';
  else if (currentPersona === 'daftpunk')    idleText = 'spike.land radio ∞ — DAFT PUNK';
  else if (currentPersona === 'interstella') idleText = 'spike.land radio ∞ — INTERSTELLA';
  chordDisp.textContent = idleText;
  chordDisp.classList.remove('active');

  // Restart if was playing
  if (wasPlaying) {
    await startMusic();
  }
}

// ─── EVENT LISTENERS ──────────────────────────────────────────────────────────

playBtn.addEventListener('click', () => {
  if (isPlaying) {
    stopMusic();
  } else {
    startMusic();
  }
});

personaBtn.addEventListener('click', () => {
  switchPersona();
});

volSlider.addEventListener('input', () => {
  if (masterGain) {
    masterGain.gain.setTargetAtTime(parseFloat(volSlider.value), audioCtx.currentTime, 0.05);
  }
});

window.addEventListener('resize', resizeCanvas);

// Keyboard shortcut
window.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    playBtn.click();
  }
});

// ─── INIT ─────────────────────────────────────────────────────────────────────

resizeCanvas();
initParticles();
animate();

// Add a gentle pulse animation to the button
let pulseDir = 1;
let pulseVal = 0;
setInterval(() => {
  if (!isPlaying) {
    pulseVal += pulseDir * 0.02;
    if (pulseVal >= 1) pulseDir = -1;
    if (pulseVal <= 0) pulseDir = 1;
    if (currentPersona === 'zimmer') {
      playBtn.style.boxShadow = `0 0 ${40 + pulseVal * 40}px rgba(204, 85, 0, ${0.08 + pulseVal * 0.12}), inset 0 0 40px rgba(204, 85, 0, ${0.04 + pulseVal * 0.08})`;
    } else if (currentPersona === 'daftpunk') {
      playBtn.style.boxShadow = `0 0 ${40 + pulseVal * 50}px rgba(0, 212, 255, ${0.1 + pulseVal * 0.16}), 0 0 ${20 + pulseVal * 30}px rgba(255, 20, 147, ${0.06 + pulseVal * 0.1}), inset 0 0 40px rgba(0, 212, 255, ${0.05 + pulseVal * 0.08})`;
    } else if (currentPersona === 'interstella') {
      playBtn.style.boxShadow = `0 0 ${40 + pulseVal * 50}px rgba(102, 0, 204, ${0.1 + pulseVal * 0.15}), 0 0 ${20 + pulseVal * 25}px rgba(255, 215, 0, ${0.08 + pulseVal * 0.12}), inset 0 0 40px rgba(102, 0, 204, ${0.05 + pulseVal * 0.08})`;
    } else {
      playBtn.style.boxShadow = `0 0 ${40 + pulseVal * 40}px rgba(80, 140, 255, ${0.05 + pulseVal * 0.1}), inset 0 0 40px rgba(80, 140, 255, ${0.03 + pulseVal * 0.07})`;
    }
  }
}, 50);

</script>
