<script>
// ─────────────────────────────────────────────────────────────────────────────
// spike.land radio ∞ — Generative Ambient Music Engine
// Brian Eno / Tycho inspired ambient synthesis
// ─────────────────────────────────────────────────────────────────────────────

const playBtn     = document.getElementById('play-btn');
const btnIcon     = document.getElementById('btn-icon');
const statusEl    = document.getElementById('status');
const volSlider   = document.getElementById('vol-slider');
const chordDisp   = document.getElementById('chord-display');
const canvas      = document.getElementById('canvas');
const ctx2d       = canvas.getContext('2d');
const personaBtn  = document.getElementById('persona-btn');

let audioCtx, masterGain, reverbNode, delayL, delayR, analyserNode;
let isPlaying = false;
let scheduledEvents = [];
let animFrame;
let currentChordIdx = 0;
let beatCount = 0;
let nextNoteTime = 0;
let tempo = 74; // BPM — relaxed groove
let schedulerInterval = null;

// ─── Persona ──────────────────────────────────────────────────────────────────
let currentPersona = 'ambient'; // 'ambient' | 'zimmer' | 'daftpunk' | 'interstella'
const PERSONAS = ['ambient', 'zimmer', 'daftpunk', 'interstella'];

// ─── Music Theory ────────────────────────────────────────────────────────────

const NOTE_FREQ = {};
const noteNames = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
for (let octave = 0; octave <= 8; octave++) {
  for (let i = 0; i < 12; i++) {
    const midi = octave * 12 + i;
    NOTE_FREQ[noteNames[i] + octave] = 440 * Math.pow(2, (midi - 69) / 12);
  }
}

function midiToHz(midi) {
  return 440 * Math.pow(2, (midi - 69) / 12);
}

function noteHz(name, oct) {
  return NOTE_FREQ[name + oct] || midiToHz(60);
}

// Chord definitions: [root, third, fifth, seventh] as MIDI offsets from C4 (60)
const CHORDS = [
  { name: 'Am7',  root: 57, tones: [57, 60, 64, 67],  color: [80, 120, 200]  },
  { name: 'Cmaj7',root: 60, tones: [60, 64, 67, 71],  color: [100, 180, 220] },
  { name: 'Fmaj7',root: 53, tones: [53, 57, 60, 64],  color: [120, 160, 240] },
  { name: 'G',    root: 55, tones: [55, 59, 62, 65],  color: [90, 200, 180]  },
  { name: 'Em7',  root: 52, tones: [52, 55, 59, 62],  color: [140, 120, 220] },
  { name: 'Dm7',  root: 50, tones: [50, 53, 57, 60],  color: [80, 140, 200]  },
];

// Pentatonic scale MIDI offsets from root
const PENTATONIC = [0, 2, 4, 7, 9, 12, 14, 16, 19, 21];

// ─── Zimmer Chord Progressions (cinematic minor) ──────────────────────────────
// Cm → Ab → Eb → Bb → Fm → G — epic minor (Inception/Interstellar style)
const ZIMMER_CHORDS = [
  { name: 'Cm',  root: 48, tones: [48, 51, 55, 58],  color: [180, 40, 10]   }, // dark red
  { name: 'Ab',  root: 44, tones: [44, 48, 51, 55],  color: [200, 80, 0]    }, // burnt orange
  { name: 'Eb',  root: 51, tones: [51, 55, 58, 62],  color: [160, 50, 10]   }, // deep amber
  { name: 'Bb',  root: 46, tones: [46, 50, 53, 57],  color: [190, 60, 0]    }, // amber-red
  { name: 'Fm',  root: 41, tones: [41, 44, 48, 51],  color: [140, 30, 20]   }, // dark crimson
  { name: 'G',   root: 55, tones: [55, 59, 62, 66],  color: [210, 90, 0]    }, // orange
];

// ─── Daft Punk Chord Progressions (French disco major 7ths) ──────────────────
// Fmaj7 → Gm7 → Am7 → Bbmaj7 — Digital Love / Discovery vibes
const DAFTPUNK_CHORDS = [
  { name: 'Fmaj7', root: 53, tones: [53, 57, 60, 64],  color: [0, 212, 255]   }, // electric blue
  { name: 'Gm7',  root: 55, tones: [55, 58, 62, 65],   color: [255, 20, 147]  }, // hot pink
  { name: 'Am7',  root: 57, tones: [57, 60, 64, 67],   color: [148, 0, 211]   }, // purple
  { name: 'Bbmaj7',root: 58, tones: [58, 62, 65, 69],  color: [0, 255, 210]   }, // cyan
  { name: 'Em7',  root: 52, tones: [52, 55, 59, 62],   color: [255, 60, 200]  }, // neon pink
  { name: 'Dm7',  root: 50, tones: [50, 53, 57, 60],   color: [60, 100, 255]  }, // blue-purple
];

// ─── Interstella 5555 Chord Progressions (euphoric house) ────────────────────
// Bbm → Gb → Ab → Eb — One More Time / euphoric rave energy
const INTERSTELLA_CHORDS = [
  { name: 'Bbm',  root: 46, tones: [46, 49, 53, 56],   color: [26, 0, 51]     }, // deep indigo
  { name: 'Gb',   root: 42, tones: [42, 46, 49, 53],   color: [255, 215, 0]   }, // stardust gold
  { name: 'Ab',   root: 44, tones: [44, 48, 51, 55],   color: [102, 0, 204]   }, // cosmic purple
  { name: 'Eb',   root: 51, tones: [51, 55, 58, 62],   color: [255, 105, 180] }, // nebula pink
  { name: 'Fm',   root: 41, tones: [41, 44, 48, 51],   color: [0, 180, 255]   }, // space blue
  { name: 'Cm',   root: 48, tones: [48, 51, 55, 58],   color: [200, 0, 255]   }, // ultraviolet
];

// ─── Web Audio Setup ─────────────────────────────────────────────────────────

async function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });

  masterGain = audioCtx.createGain();
  masterGain.gain.value = parseFloat(volSlider.value);

  // Analyser for visualization
  analyserNode = audioCtx.createAnalyser();
  analyserNode.fftSize = 256;
  analyserNode.smoothingTimeConstant = 0.85;

  // Reverb (convolver with synthesized IR)
  reverbNode = audioCtx.createConvolver();
  reverbNode.buffer = makeReverbIR(4.5, 3);

  // Ping-pong delay
  const delayTime = (60 / tempo) * 0.375; // dotted eighth
  delayL = audioCtx.createDelay(2.0);
  delayR = audioCtx.createDelay(2.0);
  delayL.delayTime.value = delayTime;
  delayR.delayTime.value = delayTime * 1.33;

  const delayFeedL = audioCtx.createGain(); delayFeedL.gain.value = 0.38;
  const delayFeedR = audioCtx.createGain(); delayFeedR.gain.value = 0.33;
  const delayGain  = audioCtx.createGain(); delayGain.gain.value  = 0.22;

  const panL = audioCtx.createStereoPanner(); panL.pan.value = -0.7;
  const panR = audioCtx.createStereoPanner(); panR.pan.value =  0.7;

  // Delay feedback network
  delayL.connect(delayFeedL); delayFeedL.connect(delayR);
  delayR.connect(delayFeedR); delayFeedR.connect(delayL);
  delayL.connect(panL); delayR.connect(panR);
  panL.connect(delayGain); panR.connect(delayGain);
  delayGain.connect(masterGain);

  // Reverb tail
  const reverbGain = audioCtx.createGain(); reverbGain.gain.value = 0.35;
  reverbNode.connect(reverbGain);
  reverbGain.connect(masterGain);

  masterGain.connect(analyserNode);
  analyserNode.connect(audioCtx.destination);

  return { delayL, delayR, reverbNode };
}

function makeReverbIR(duration, decay) {
  const sampleRate = audioCtx.sampleRate;
  const length = sampleRate * duration;
  const ir = audioCtx.createBuffer(2, length, sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const data = ir.getChannelData(ch);
    for (let i = 0; i < length; i++) {
      const t = i / sampleRate;
      // Modulated noise decay with early reflections
      const reflection = i < sampleRate * 0.02
        ? (Math.random() * 2 - 1) * 0.3
        : 0;
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t / duration, decay) * 0.5
              + reflection;
    }
  }
  return ir;
}

// ─── Synthesis Utilities ─────────────────────────────────────────────────────

function createEnvelope(gainNode, t, attack, decay, sustain, release, peakGain) {
  const g = gainNode.gain;
  g.cancelScheduledValues(t);
  g.setValueAtTime(0, t);
  g.linearRampToValueAtTime(peakGain, t + attack);
  g.exponentialRampToValueAtTime(peakGain * sustain, t + attack + decay);
  return t + attack + decay;
}

function releaseEnvelope(gainNode, t, release) {
  const g = gainNode.gain;
  g.cancelScheduledValues(t);
  const cur = gainNode.gain.value;
  g.setValueAtTime(Math.max(cur, 0.0001), t);
  g.exponentialRampToValueAtTime(0.0001, t + release);
}

function connectToMix(node) {
  node.connect(reverbNode);
  node.connect(delayL);
  node.connect(masterGain);
}

// ─── PAD SYNTHESIZER ─────────────────────────────────────────────────────────

function playPad(midiNotes, startTime, duration, velocity = 0.7) {
  const padGain = audioCtx.createGain();
  padGain.gain.value = 0;

  // Two detuned oscillator banks for lush pad
  const numVoices = 3;
  const detunes = [-8, 0, 8];
  const types = ['sawtooth', 'sine', 'sawtooth'];

  midiNotes.forEach(midi => {
    const freq = midiToHz(midi);
    for (let v = 0; v < numVoices; v++) {
      const osc = audioCtx.createOscillator();
      const oscGain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();

      osc.type = types[v];
      osc.frequency.value = freq;
      osc.detune.value = detunes[v] + (Math.random() - 0.5) * 4;

      filter.type = 'lowpass';
      filter.frequency.value = 1200 + Math.random() * 800;
      filter.Q.value = 0.5;

      oscGain.gain.value = v === 1 ? 0.15 : 0.08;

      osc.connect(filter);
      filter.connect(oscGain);
      oscGain.connect(padGain);

      osc.start(startTime);
      osc.stop(startTime + duration + 2.5);
    }

    // Sub-octave sine for warmth
    const sub = audioCtx.createOscillator();
    const subGain = audioCtx.createGain();
    sub.type = 'sine';
    sub.frequency.value = freq / 2;
    subGain.gain.value = 0.06;
    sub.connect(subGain);
    subGain.connect(padGain);
    sub.start(startTime);
    sub.stop(startTime + duration + 2.5);
  });

  // ADSR
  const attack  = 1.8 + Math.random() * 0.6;
  const decay   = 0.8;
  const sustain = 0.75;
  const release = 3.0 + Math.random() * 1.0;
  const peak    = velocity * 0.18;

  createEnvelope(padGain, startTime, attack, decay, sustain, release, peak);
  releaseEnvelope(padGain, startTime + duration, release);
  padGain.gain.setValueAtTime(0.0001, startTime + duration + release);

  // Warm filter on whole pad
  const masterFilter = audioCtx.createBiquadFilter();
  masterFilter.type = 'lowpass';
  masterFilter.frequency.value = 2800;
  masterFilter.Q.value = 0.3;

  padGain.connect(masterFilter);
  connectToMix(masterFilter);

  scheduledEvents.push({ node: padGain, time: startTime + duration + release + 0.5 });
}

// ─── BASS SYNTHESIZER ────────────────────────────────────────────────────────

function playBass(midi, startTime, duration, velocity = 0.75) {
  const bassFreq = midiToHz(midi - 24); // two octaves down
  const bassGain = audioCtx.createGain();

  const osc1 = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  osc1.type = 'sine';
  osc2.type = 'triangle';
  osc1.frequency.value = bassFreq;
  osc2.frequency.value = bassFreq;
  osc2.detune.value = 4;

  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 280;
  filter.Q.value = 0.8;

  const g1 = audioCtx.createGain(); g1.gain.value = 0.55;
  const g2 = audioCtx.createGain(); g2.gain.value = 0.25;

  osc1.connect(g1); osc2.connect(g2);
  g1.connect(filter); g2.connect(filter);
  filter.connect(bassGain);

  const attack = 0.04;
  const decay  = 0.3;
  const sustain = 0.6;
  const release = 0.8;
  const peak = velocity * 0.28;

  createEnvelope(bassGain, startTime, attack, decay, sustain, release, peak);
  releaseEnvelope(bassGain, startTime + duration, release);

  osc1.start(startTime); osc1.stop(startTime + duration + release + 0.1);
  osc2.start(startTime); osc2.stop(startTime + duration + release + 0.1);

  bassGain.connect(masterGain);
  scheduledEvents.push({ node: bassGain, time: startTime + duration + release + 0.2 });
}

// ─── ARPEGGIO SYNTHESIZER ────────────────────────────────────────────────────

function playArp(midi, startTime, duration, velocity = 0.55) {
  const freq = midiToHz(midi);
  const arpGain = audioCtx.createGain();

  const osc = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  osc.type = 'triangle';
  osc2.type = 'sine';
  osc.frequency.value = freq;
  osc2.frequency.value = freq;
  osc2.detune.value = 1200; // octave up, soft

  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = freq * 2.5;
  filter.Q.value = 1.2;

  const g1 = audioCtx.createGain(); g1.gain.value = 0.6;
  const g2 = audioCtx.createGain(); g2.gain.value = 0.2;

  osc.connect(g1); osc2.connect(g2);
  g1.connect(filter); g2.connect(filter);
  filter.connect(arpGain);

  const attack  = 0.008 + Math.random() * 0.012;
  const decay   = 0.15;
  const sustain = 0.4;
  const release = duration * 1.2;
  const peak    = velocity * 0.12;

  createEnvelope(arpGain, startTime, attack, decay, sustain, release, peak);
  releaseEnvelope(arpGain, startTime + duration, release);

  osc.start(startTime); osc.stop(startTime + duration + release + 0.1);
  osc2.start(startTime); osc2.stop(startTime + duration + release + 0.1);

  connectToMix(arpGain);
  scheduledEvents.push({ node: arpGain, time: startTime + duration + release + 0.2 });
}

// ─── SOFT LEAD MELODY ────────────────────────────────────────────────────────

function playMelody(midi, startTime, duration, velocity = 0.45) {
  const freq = midiToHz(midi);
  const melGain = audioCtx.createGain();

  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.value = freq;

  // Gentle pitch drift (vibrato)
  const lfo = audioCtx.createOscillator();
  const lfoGain = audioCtx.createGain();
  lfo.frequency.value = 5.5;
  lfoGain.gain.value = 3;
  lfo.connect(lfoGain);
  lfoGain.connect(osc.frequency);

  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 3000;

  osc.connect(filter);
  filter.connect(melGain);

  const attack  = 0.12 + Math.random() * 0.08;
  const decay   = 0.3;
  const sustain = 0.6;
  const release = 1.2;
  const peak    = velocity * 0.1;

  createEnvelope(melGain, startTime, attack, decay, sustain, release, peak);
  releaseEnvelope(melGain, startTime + duration, release);

  osc.start(startTime); osc.stop(startTime + duration + release + 0.1);
  lfo.start(startTime); lfo.stop(startTime + duration + release + 0.1);

  connectToMix(melGain);
  scheduledEvents.push({ node: melGain, time: startTime + duration + release + 0.2 });
}

// ─── PERCUSSION ──────────────────────────────────────────────────────────────

function playHihat(startTime, open = false, velocity = 0.3) {
  const hhGain = audioCtx.createGain();
  const bufSize = audioCtx.sampleRate * (open ? 0.3 : 0.05);
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;

  const source = audioCtx.createBufferSource();
  source.buffer = buf;

  const hpf = audioCtx.createBiquadFilter();
  hpf.type = 'highpass';
  hpf.frequency.value = 8000;

  const bpf = audioCtx.createBiquadFilter();
  bpf.type = 'bandpass';
  bpf.frequency.value = 12000;
  bpf.Q.value = 0.8;

  source.connect(hpf);
  hpf.connect(bpf);
  bpf.connect(hhGain);

  const attack  = 0.001;
  const release = open ? 0.25 : 0.04;
  const peak    = velocity * 0.08;

  hhGain.gain.setValueAtTime(0, startTime);
  hhGain.gain.linearRampToValueAtTime(peak, startTime + attack);
  hhGain.gain.exponentialRampToValueAtTime(0.0001, startTime + attack + release);

  const panNode = audioCtx.createStereoPanner();
  panNode.pan.value = (Math.random() - 0.5) * 0.4;
  hhGain.connect(panNode);
  panNode.connect(masterGain);

  source.start(startTime);
  source.stop(startTime + release + 0.1);
}

function playSoftKick(startTime, velocity = 0.5) {
  const kickGain = audioCtx.createGain();

  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(140, startTime);
  osc.frequency.exponentialRampToValueAtTime(28, startTime + 0.35);

  // Click transient
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.01, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) {
    data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
  }
  const clickSrc = audioCtx.createBufferSource();
  clickSrc.buffer = buf;
  const clickGain = audioCtx.createGain();
  clickGain.gain.value = velocity * 0.15;

  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 200;

  osc.connect(filter);
  filter.connect(kickGain);
  clickSrc.connect(clickGain);
  clickGain.connect(kickGain);

  const peak = velocity * 0.3;
  kickGain.gain.setValueAtTime(peak, startTime);
  kickGain.gain.exponentialRampToValueAtTime(0.0001, startTime + 0.5);

  kickGain.connect(masterGain);

  osc.start(startTime); osc.stop(startTime + 0.55);
  clickSrc.start(startTime); clickSrc.stop(startTime + 0.015);
}

// ─── SHIMMER / TEXTURE ───────────────────────────────────────────────────────

function playShimmer(midi, startTime) {
  const freq = midiToHz(midi + 24);
  const shimGain = audioCtx.createGain();

  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.value = freq;

  // Ring modulator effect
  const ringFreq = audioCtx.createOscillator();
  const ringGain = audioCtx.createGain();
  ringFreq.frequency.value = freq * (1 + Math.random() * 0.008);
  ringGain.gain.value = 0;

  // Tremolo
  const trem = audioCtx.createOscillator();
  const tremGain = audioCtx.createGain();
  trem.frequency.value = 6 + Math.random() * 4;
  tremGain.gain.value = 0.3;
  trem.connect(tremGain);
  tremGain.connect(ringGain.gain);

  osc.connect(ringGain);
  ringFreq.connect(ringGain);
  ringGain.connect(shimGain);

  const duration = 2.5 + Math.random() * 2;
  const peak = 0.05;
  shimGain.gain.setValueAtTime(0, startTime);
  shimGain.gain.linearRampToValueAtTime(peak, startTime + 0.8);
  shimGain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

  connectToMix(shimGain);

  osc.start(startTime); osc.stop(startTime + duration + 0.1);
  ringFreq.start(startTime); ringFreq.stop(startTime + duration + 0.1);
  trem.start(startTime); trem.stop(startTime + duration + 0.1);
}

// ─── ZIMMER SYNTHESIS ────────────────────────────────────────────────────────

// Deep sub-bass drone — 2-3 detuned sines at 30-60Hz with slow LFO on filter
function playDrone(midiRoot, startTime, duration, velocity = 0.85) {
  const baseFreq = midiToHz(midiRoot - 24); // two octaves down, sub territory
  const droneGain = audioCtx.createGain();

  const detunes = [0, -7, 5];
  const types = ['sine', 'sine', 'triangle'];

  detunes.forEach((detCents, i) => {
    const osc = audioCtx.createOscillator();
    const oscGain = audioCtx.createGain();
    osc.type = types[i];
    osc.frequency.value = baseFreq * (i === 2 ? 0.5 : 1); // third osc half-freq for ultra-sub
    osc.detune.value = detCents;
    oscGain.gain.value = i === 2 ? 0.4 : 0.55;
    osc.connect(oscGain);
    oscGain.connect(droneGain);
    osc.start(startTime);
    osc.stop(startTime + duration + 5);
  });

  // Slow LFO on filter cutoff — the rumble breathes
  const droneFilter = audioCtx.createBiquadFilter();
  droneFilter.type = 'lowpass';
  droneFilter.frequency.value = 120;
  droneFilter.Q.value = 1.2;

  const lfo = audioCtx.createOscillator();
  const lfoGain = audioCtx.createGain();
  lfo.frequency.value = 0.08;
  lfoGain.gain.value = 60;
  lfo.connect(lfoGain);
  lfoGain.connect(droneFilter.frequency);
  lfo.start(startTime);
  lfo.stop(startTime + duration + 5);

  droneGain.connect(droneFilter);

  const attack  = 4.0;
  const sustain = 0.85;
  const release = 4.0;
  const peak    = velocity * 0.32;

  createEnvelope(droneGain, startTime, attack, 0.5, sustain, release, peak);
  releaseEnvelope(droneGain, startTime + duration, release);

  droneFilter.connect(masterGain);
  scheduledEvents.push({ node: droneGain, time: startTime + duration + release + 0.5 });
}

// Brass stabs — "BRAAAM" — square + sawtooth with aggressive filter sweep
function playBrass(midiNotes, startTime, duration, velocity = 0.9) {
  const brassGain = audioCtx.createGain();

  midiNotes.forEach(midi => {
    const freq = midiToHz(midi);

    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    osc1.type = 'square';
    osc2.type = 'sawtooth';
    osc1.frequency.value = freq;
    osc2.frequency.value = freq;
    osc2.detune.value = -12; // slight detuning for width

    const g1 = audioCtx.createGain(); g1.gain.value = 0.4;
    const g2 = audioCtx.createGain(); g2.gain.value = 0.3;

    osc1.connect(g1); osc2.connect(g2);
    g1.connect(brassGain); g2.connect(brassGain);
    osc1.start(startTime); osc1.stop(startTime + duration + 2);
    osc2.start(startTime); osc2.stop(startTime + duration + 2);
  });

  // Aggressive filter envelope: 800 → 4000 → 1200 Hz
  const brassFilter = audioCtx.createBiquadFilter();
  brassFilter.type = 'lowpass';
  brassFilter.frequency.setValueAtTime(800, startTime);
  brassFilter.frequency.linearRampToValueAtTime(4200, startTime + 0.08);
  brassFilter.frequency.exponentialRampToValueAtTime(1200, startTime + duration * 0.7);
  brassFilter.Q.value = 2.5;

  // Envelope: sharp attack, medium sustain, long tail
  const attack  = 0.02;
  const sustain = 0.7;
  const release = 1.8;
  const peak    = velocity * 0.22;

  createEnvelope(brassGain, startTime, attack, 0.12, sustain, release, peak);
  releaseEnvelope(brassGain, startTime + duration, release);

  brassGain.connect(brassFilter);
  brassFilter.connect(reverbNode);
  brassFilter.connect(masterGain);
  scheduledEvents.push({ node: brassGain, time: startTime + duration + release + 0.5 });
}

// Pulsing ostinato — rapid repeated staccato notes, the Dunkirk/Interstellar tick
function playOstinato(midi, startTime, duration, velocity = 0.6) {
  const freq = midiToHz(midi);
  const ostGain = audioCtx.createGain();

  osc.connect(g1); osc2.connect(g2);
  g1.connect(ostGain); g2.connect(ostGain);

  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = freq * 1.8;

  const attack  = 0.006;
  const decay   = 0.04;
  const sustain = 0.3;
  const release = duration * 0.7;

  createEnvelope(ostGain, startTime, attack, decay, sustain, release, peak);

  osc.connect(filter);
  osc2.connect(filter);
  filter.connect(ostGain);
  osc.start(startTime); osc.stop(startTime + duration + release + 0.1);
  osc2.start(startTime); osc2.stop(startTime + duration + release + 0.1);

  ostGain.connect(delayL);
  ostGain.connect(masterGain);
  scheduledEvents.push({ node: ostGain, time: startTime + duration + release + 0.2 });
}

// Taiko / epic percussion — sine pitch sweep + noise burst, very impactful
function playTaiko(startTime, velocity = 0.85) {
  const taikoGain = audioCtx.createGain();

  // Pitched sine sweep: 200 → 40 Hz
  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(200, startTime);
  osc.frequency.exponentialRampToValueAtTime(40, startTime + 1.5);

  const oscGain = audioCtx.createGain();
  oscGain.gain.value = 0.7;
  osc.connect(oscGain);
  oscGain.connect(taikoGain);
  osc.start(startTime); osc.stop(startTime + 1.8);

  // Noise burst for attack transient
  const bufLen = audioCtx.sampleRate * 0.08;
  const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) {
    data[i] = (Math.random() * 2 - 1) * (1 - i / bufLen);
  }
  const noiseSrc = audioCtx.createBufferSource();
  noiseSrc.buffer = buf;

  const noiseFilter = audioCtx.createBiquadFilter();
  noiseFilter.type = 'lowpass';
  noiseFilter.frequency.value = 800;

  const noiseGain = audioCtx.createGain();
  noiseGain.gain.value = velocity * 0.5;
  noiseSrc.connect(noiseFilter);
  noiseFilter.connect(noiseGain);
  noiseGain.connect(taikoGain);
  noiseSrc.start(startTime); noiseSrc.stop(startTime + 0.1);

  // Envelope: instant attack, long decay
  const peak = velocity * 0.55;
  taikoGain.gain.setValueAtTime(peak, startTime);
  taikoGain.gain.exponentialRampToValueAtTime(0.0001, startTime + 1.8);

  taikoGain.connect(masterGain);
  taikoGain.connect(reverbNode);
  scheduledEvents.push({ node: taikoGain, time: startTime + 2.0 });
}

// String tremolo — sawtooth with fast LFO amplitude mod, bandpass filtered
function playStringTremolo(midiNotes, startTime, duration, velocity = 0.6) {
  const strGain = audioCtx.createGain();

  midiNotes.forEach(midi => {
    const freq = midiToHz(midi + 12); // up an octave for string register
    const osc = audioCtx.createOscillator();
    const oscGain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.value = freq;
    osc.detune.value = (Math.random() - 0.5) * 10;

    // Fast tremolo LFO: 8-12Hz
    const tremoloLFO = audioCtx.createOscillator();
    const tremoloGain = audioCtx.createGain();
    tremoloLFO.frequency.value = 9 + Math.random() * 3;
    tremoloGain.gain.value = 0.4;
    tremoloLFO.connect(tremoloGain);

    // LFO modulates the oscGain (amplitude tremolo)
    oscGain.gain.value = 0.18;
    tremoloGain.connect(oscGain.gain);

    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = freq * 1.5;
    filter.Q.value = 0.8;

    osc.connect(filter);
    filter.connect(oscGain);
    oscGain.connect(strGain);

    osc.start(startTime); osc.stop(startTime + duration + 2);
    tremoloLFO.start(startTime); tremoloLFO.stop(startTime + duration + 2);
  });

  const attack  = 0.4;
  const sustain = 0.72;
  const release = 2.5;
  const peak    = velocity * 0.14;

  createEnvelope(strGain, startTime, attack, 0.3, sustain, release, peak);
  releaseEnvelope(strGain, startTime + duration, release);

  strGain.connect(reverbNode);
  strGain.connect(masterGain);
  scheduledEvents.push({ node: strGain, time: startTime + duration + release + 0.5 });
}

// Organ pad — multiple sine harmonics, Interstellar-style
function playOrganPad(midiNotes, startTime, duration, velocity = 0.65) {
  const organGain = audioCtx.createGain();
  const harmonics = [1, 2, 3, 4, 6, 8];
  const harmonicGains = [0.5, 0.25, 0.15, 0.1, 0.06, 0.04];

  midiNotes.forEach(midi => {
    const fundamental = midiToHz(midi);
    harmonics.forEach((h, idx) => {
      const osc = audioCtx.createOscillator();
      const hGain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = fundamental * h;
      osc.detune.value = (Math.random() - 0.5) * 6; // slight detuning for chorus
      hGain.gain.value = harmonicGains[idx];
      osc.connect(hGain);
      hGain.connect(organGain);
      osc.start(startTime);
      osc.stop(startTime + duration + 4);
    });
  });

  // Warm lowpass
  const warmFilter = audioCtx.createBiquadFilter();
  warmFilter.type = 'lowpass';
  warmFilter.frequency.value = 2200;
  warmFilter.Q.value = 0.4;

  organGain.connect(warmFilter);

  const attack  = 0.8;
  const sustain = 0.8;
  const release = 4.0;
  const peak    = velocity * 0.15;

  createEnvelope(organGain, startTime, attack, 0.5, sustain, release, peak);
  releaseEnvelope(organGain, startTime + duration, release);

  warmFilter.connect(reverbNode);
  warmFilter.connect(masterGain);
  scheduledEvents.push({ node: organGain, time: startTime + duration + release + 0.5 });
}

// ─── DAFT PUNK SYNTHESIS ─────────────────────────────────────────────────────

// Vocoder pad — multiple detuned sawtooth oscillators through formant bandpass banks
function playVocoderPad(midiNotes, startTime, duration, velocity = 0.55) {
  const padGain = audioCtx.createGain();

  // Formant center frequencies: vocal tract approximation
  const formants = [270, 730, 2300, 3000];
  const formantGains = [0.5, 0.35, 0.2, 0.12];

  midiNotes.forEach(midi => {
    const freq = midiToHz(midi);
    // 4 detuned sawtooth oscillators
    const detunes = [-14, -5, 0, 7, 14];
    detunes.forEach(det => {
      const osc = audioCtx.createOscillator();
      const oscGain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.value = freq;
      osc.detune.value = det;
      oscGain.gain.value = 0.06;
      osc.connect(oscGain);

      // Run through formant filters
      formants.forEach((ffreq, fi) => {
        const bpf = audioCtx.createBiquadFilter();
        bpf.type = 'bandpass';
        bpf.frequency.value = ffreq;
        bpf.Q.value = 8 + fi * 2;
        const fgain = audioCtx.createGain();
        fgain.gain.value = formantGains[fi];
        oscGain.connect(bpf);
        bpf.connect(fgain);
        fgain.connect(padGain);
      });

      // Slow LFO sweeps the first formant for that robotic breathing quality
      const lfo = audioCtx.createOscillator();
      const lfoGain = audioCtx.createGain();
      lfo.frequency.value = 0.15 + Math.random() * 0.1;
      lfoGain.gain.value = 120;
      lfo.connect(lfoGain);

      osc.start(startTime); osc.stop(startTime + duration + 3);
      lfo.start(startTime); lfo.stop(startTime + duration + 3);
    });
  });

  const attack  = 1.2 + Math.random() * 0.4;
  const sustain = 0.7;
  const release = 2.5;
  const peak    = velocity * 0.14;

  createEnvelope(padGain, startTime, attack, 0.6, sustain, release, peak);
  releaseEnvelope(padGain, startTime + duration, release);
  padGain.gain.setValueAtTime(0.0001, startTime + duration + release + 0.1);

  padGain.connect(reverbNode);
  padGain.connect(masterGain);
  scheduledEvents.push({ node: padGain, time: startTime + duration + release + 0.5 });
}

// Phaser lead — square wave with allpass chain (LFO modulated) for Daft Punk phaser
function playPhaserLead(midi, startTime, duration, velocity = 0.6) {
  const freq = midiToHz(midi);
  const leadGain = audioCtx.createGain();

  const osc = audioCtx.createOscillator();
  osc.type = 'square';
  osc.frequency.value = freq;

  // Allpass chain — 4 stages approximates a phaser
  let lastNode = osc;
  const lfo = audioCtx.createOscillator();
  const lfoGain = audioCtx.createGain();
  lfo.frequency.value = 0.5 + Math.random() * 0.3;
  lfoGain.gain.value = 800;

  for (let i = 0; i < 4; i++) {
    const ap = audioCtx.createBiquadFilter();
    ap.type = 'allpass';
    ap.frequency.value = 800 + i * 400;
    ap.Q.value = 0.5;
    lfoGain.connect(ap.frequency);
    lastNode.connect(ap);
    lastNode = ap;
  }

  lastNode.connect(leadGain);

  lfo.connect(lfoGain);
  lfo.start(startTime); lfo.stop(startTime + duration + 0.2);

  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 4000;
  leadGain.connect(filter);

  const attack  = 0.015;
  const decay   = 0.1;
  const sustain = 0.6;
  const release = 0.35;
  const peak    = velocity * 0.1;

  createEnvelope(leadGain, startTime, attack, decay, sustain, release, peak);
  releaseEnvelope(leadGain, startTime + duration, release);

  osc.start(startTime); osc.stop(startTime + duration + release + 0.1);

  filter.connect(reverbNode);
  filter.connect(masterGain);
  scheduledEvents.push({ node: leadGain, time: startTime + duration + release + 0.2 });
}

// Four-on-the-floor kick — punchy sine sweep 160→50Hz
function playDiscoKick(startTime, velocity = 0.85) {
  const kickGain = audioCtx.createGain();
  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(160, startTime);
  osc.frequency.exponentialRampToValueAtTime(50, startTime + 0.06);
  osc.frequency.exponentialRampToValueAtTime(28, startTime + 0.25);

  // Punchy click
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.008, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
  const clickSrc = audioCtx.createBufferSource();
  clickSrc.buffer = buf;
  const clickGain = audioCtx.createGain();
  clickGain.gain.value = velocity * 0.25;
  clickSrc.connect(clickGain);
  clickGain.connect(kickGain);

  osc.connect(kickGain);
  const peak = velocity * 0.45;
  kickGain.gain.setValueAtTime(peak, startTime);
  kickGain.gain.exponentialRampToValueAtTime(0.0001, startTime + 0.38);

  kickGain.connect(masterGain);
  osc.start(startTime); osc.stop(startTime + 0.4);
  clickSrc.start(startTime); clickSrc.stop(startTime + 0.01);
}

// Clap — noise burst with tight bandpass
function playClap(startTime, velocity = 0.55) {
  const clapGain = audioCtx.createGain();
  const bufLen = audioCtx.sampleRate * 0.04;
  const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  // Two noise bursts slightly offset (hand clap layering)
  for (let i = 0; i < bufLen; i++) {
    const t2 = i / audioCtx.sampleRate;
    const env = Math.exp(-t2 * 60);
    const env2 = i > bufLen * 0.35 ? Math.exp(-(t2 - 0.014) * 80) : 0;
    data[i] = (Math.random() * 2 - 1) * (env + env2 * 0.7);
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buf;

  const bpf = audioCtx.createBiquadFilter();
  bpf.type = 'bandpass';
  bpf.frequency.value = 1100;
  bpf.Q.value = 0.9;
  const hpf = audioCtx.createBiquadFilter();
  hpf.type = 'highpass';
  hpf.frequency.value = 700;

  src.connect(bpf);
  bpf.connect(hpf);
  hpf.connect(clapGain);

  clapGain.gain.setValueAtTime(velocity * 0.22, startTime);
  clapGain.gain.exponentialRampToValueAtTime(0.0001, startTime + 0.06);

  const pan = audioCtx.createStereoPanner();
  pan.pan.value = (Math.random() - 0.5) * 0.35;
  clapGain.connect(pan);
  pan.connect(masterGain);
  pan.connect(reverbNode);

  src.start(startTime);
  src.stop(startTime + 0.08);
}

// Disco open hi-hat — offbeat, bright
function playDiscoHat(startTime, open = false, velocity = 0.35) {
  const hhGain = audioCtx.createGain();
  const bufSize = audioCtx.sampleRate * (open ? 0.18 : 0.025);
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;

  const hpf = audioCtx.createBiquadFilter();
  hpf.type = 'highpass';
  hpf.frequency.value = 9000;

  src.connect(hpf);
  hpf.connect(hhGain);

  const rel = open ? 0.15 : 0.022;
  hhGain.gain.setValueAtTime(0, startTime);
  hhGain.gain.linearRampToValueAtTime(velocity * 0.12, startTime + 0.001);
  hhGain.gain.exponentialRampToValueAtTime(0.0001, startTime + rel);

  const pan = audioCtx.createStereoPanner();
  pan.pan.value = (Math.random() - 0.5) * 0.5;
  hhGain.connect(pan);
  pan.connect(masterGain);

  src.start(startTime);
  src.stop(startTime + rel + 0.05);
}

// ─── INTERSTELLA 5555 SYNTHESIS ──────────────────────────────────────────────

// Supersaw — 6+ detuned sawtooth oscillators, euphoric house unison
function playSupersaw(midiNotes, startTime, duration, velocity = 0.8) {
  const ssGain = audioCtx.createGain();

  const detunes = [-24, -16, -8, -2, 0, 2, 8, 16, 24];
  const hpf = audioCtx.createBiquadFilter();
  hpf.type = 'highpass';
  hpf.frequency.value = 200;

  midiNotes.forEach(midi => {
    const freq = midiToHz(midi);
    detunes.forEach(det => {
      const osc = audioCtx.createOscillator();
      const oGain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.value = freq;
      osc.detune.value = det;
      oGain.gain.value = 0.065;
      osc.connect(oGain);
      oGain.connect(hpf);
      osc.start(startTime);
      osc.stop(startTime + duration + 1.5);
    });
  });

  hpf.connect(ssGain);

  // Sidechain-like pumping: volume dips on kick hits (every beat = quarterNote)
  const beatSec = 60 / (currentPersona === 'interstella' ? 126 : 115);
  // Schedule gain pumping for the duration
  let pumpTime = startTime;
  while (pumpTime < startTime + duration) {
    ssGain.gain.setValueAtTime(0.0001, pumpTime);
    ssGain.gain.linearRampToValueAtTime(velocity * 0.2, pumpTime + beatSec * 0.25);
    ssGain.gain.linearRampToValueAtTime(velocity * 0.2, pumpTime + beatSec * 0.85);
    ssGain.gain.linearRampToValueAtTime(0.0001, pumpTime + beatSec);
    pumpTime += beatSec;
  }

  ssGain.connect(reverbNode);
  ssGain.connect(masterGain);
  scheduledEvents.push({ node: ssGain, time: startTime + duration + 1.5 });
}

// Acid bass — square wave + resonant filter sweep (TB-303 style)
function playAcidBass(midi, startTime, duration, velocity = 0.82, slide = false, accent = false) {
  const freq = midiToHz(midi - 12);
  const acidGain = audioCtx.createGain();

  const osc = audioCtx.createOscillator();
  osc.type = 'square';
  osc.frequency.value = freq;

  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  const accentMult = accent ? 1.6 : 1.0;
  filter.frequency.setValueAtTime(accent ? 2200 : 800, startTime);
  filter.frequency.exponentialRampToValueAtTime(200 + Math.random() * 150, startTime + duration * 0.7);
  filter.Q.value = accent ? 18 : 12;

  osc.connect(filter);
  filter.connect(acidGain);

  const attack  = slide ? 0.04 : 0.003;
  const sustain = 0.55;
  const release = 0.08;
  const peak    = velocity * 0.42 * accentMult;

  createEnvelope(acidGain, startTime, attack, 0.04, sustain, release, peak);
  releaseEnvelope(acidGain, startTime + duration, release);

  osc.start(startTime); osc.stop(startTime + duration + release + 0.1);

  acidGain.connect(masterGain);
  scheduledEvents.push({ node: acidGain, time: startTime + duration + release + 0.2 });
}

// Talkbox lead — formant-filtered square wave that morphs between vowels
function playTalkbox(midi, startTime, duration, velocity = 0.55) {
  const freq = midiToHz(midi);
  const tbGain = audioCtx.createGain();

  const osc = audioCtx.createOscillator();
  osc.type = 'square';
  osc.frequency.value = freq;

  // Vowel formant pairs [F1, F2]: a=700/1220, e=400/2000, i=270/2400, o=500/800, u=300/600
  const vowelFormants = [
    [700, 1220],  // a
    [400, 2000],  // e
    [270, 2400],  // i
    [500, 800],   // o
    [300, 600],   // u
  ];

  const vowelDuration = duration / vowelFormants.length;
  const vowelGain = audioCtx.createGain();
  vowelGain.gain.value = 0.35;
  osc.connect(vowelGain);

  vowelFormants.forEach(([f1, f2], idx) => {
    const bpf1 = audioCtx.createBiquadFilter();
    const bpf2 = audioCtx.createBiquadFilter();
    bpf1.type = 'bandpass'; bpf1.frequency.value = f1; bpf1.Q.value = 6;
    bpf2.type = 'bandpass'; bpf2.frequency.value = f2; bpf2.Q.value = 4;

    const vGain1 = audioCtx.createGain(); vGain1.gain.value = 0.5;
    const vGain2 = audioCtx.createGain(); vGain2.gain.value = 0.3;

    vowelGain.connect(bpf1); bpf1.connect(vGain1); vGain1.connect(tbGain);
    vowelGain.connect(bpf2); bpf2.connect(vGain2); vGain2.connect(tbGain);
  });

  const attack  = 0.02;
  const sustain = 0.65;
  const release = 0.4;
  const peak    = velocity * 0.12;

  createEnvelope(tbGain, startTime, attack, 0.05, sustain, release, peak);
  releaseEnvelope(tbGain, startTime + duration, release);

  osc.start(startTime); osc.stop(startTime + duration + release + 0.1);

  tbGain.connect(reverbNode);
  tbGain.connect(masterGain);
  scheduledEvents.push({ node: tbGain, time: startTime + duration + release + 0.2 });
}

// Arpeggiator synth — fast 16th note sawtooth through resonant LPF
function playFastArp(midi, startTime, duration, velocity = 0.5) {
  const freq = midiToHz(midi);
  const arpGain = audioCtx.createGain();

  const osc = audioCtx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.value = freq;
  osc.detune.value = (Math.random() - 0.5) * 8;

  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 3000 + Math.random() * 2000;
  filter.Q.value = 2.0;

  osc.connect(filter);
  filter.connect(arpGain);

  const attack  = 0.004;
  const sustain = 0.5;
  const release = duration * 0.8;
  const peak    = velocity * 0.1;

  createEnvelope(arpGain, startTime, attack, 0.03, sustain, release, peak);
  releaseEnvelope(arpGain, startTime + duration, release);

  osc.start(startTime); osc.stop(startTime + duration + release + 0.1);

  arpGain.connect(delayL);
  arpGain.connect(masterGain);
  scheduledEvents.push({ node: arpGain, time: startTime + duration + release + 0.2 });
}

// Hard four-on-the-floor kick — more punch than disco kick
function playHouseKick(startTime, velocity = 0.92) {
  const kickGain = audioCtx.createGain();
  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(220, startTime);
  osc.frequency.exponentialRampToValueAtTime(55, startTime + 0.04);
  osc.frequency.exponentialRampToValueAtTime(30, startTime + 0.22);

  const distBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.006, audioCtx.sampleRate);
  const distData = distBuf.getChannelData(0);
  for (let i = 0; i < distData.length; i++) distData[i] = (Math.random() * 2 - 1) * (1 - i / distData.length);
  const distSrc = audioCtx.createBufferSource();
  distSrc.buffer = distBuf;
  const distGain = audioCtx.createGain();
  distGain.gain.value = velocity * 0.35;
  distSrc.connect(distGain);
  distGain.connect(kickGain);

  osc.connect(kickGain);
  const peak = velocity * 0.52;
  kickGain.gain.setValueAtTime(peak, startTime);
  kickGain.gain.exponentialRampToValueAtTime(0.0001, startTime + 0.32);

  const comp = audioCtx.createDynamicsCompressor();
  comp.threshold.value = -6;
  comp.ratio.value = 8;
  comp.attack.value = 0.001;
  comp.release.value = 0.12;
  kickGain.connect(comp);
  comp.connect(masterGain);

  osc.start(startTime); osc.stop(startTime + 0.35);
  distSrc.start(startTime); distSrc.stop(startTime + 0.008);
}

// Ride cymbal — 8th note energy driver
function playRide(startTime, velocity = 0.28) {
  const rideGain = audioCtx.createGain();
  const bufLen = audioCtx.sampleRate * 0.35;
  const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) {
    const t2 = i / audioCtx.sampleRate;
    data[i] = (Math.random() * 2 - 1) * Math.exp(-t2 * 12);
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buf;

  const hpf = audioCtx.createBiquadFilter();
  hpf.type = 'highpass';
  hpf.frequency.value = 6000;
  const bpf = audioCtx.createBiquadFilter();
  bpf.type = 'bandpass';
  bpf.frequency.value = 8500;
  bpf.Q.value = 0.5;

  src.connect(hpf); hpf.connect(bpf); bpf.connect(rideGain);
  rideGain.gain.setValueAtTime(velocity * 0.18, startTime);
  rideGain.gain.exponentialRampToValueAtTime(0.0001, startTime + 0.32);

  const pan = audioCtx.createStereoPanner();
  pan.pan.value = 0.4;
  rideGain.connect(pan);
  pan.connect(masterGain);

  src.start(startTime);
  src.stop(startTime + 0.38);
}

// ─── SCHEDULER ───────────────────────────────────────────────────────────────

const LOOK_AHEAD = 0.15;   // seconds to schedule ahead
const SCHEDULE_INTERVAL = 80; // ms

let arpStep = 0;
let arpPattern = [];
let melodyStep = 0;
let melodyNotes = [];
let lastChordChange = 0;
const CHORD_DURATION_BEATS = 8; // bars (4 beats each = 32 beats)
let beatsPerChord = 16 + Math.floor(Math.random() * 8); // vary

// Zimmer-specific scheduler state
let zimmerBuildPhase = 0;   // counts up to 64 bars before a build/drop
let zimmerBuildActive = false;
let zimmerBarsElapsed = 0;
let lastBrassBar = -32;
let ostStep = 0;
let ostPattern = [];

// Daft Punk scheduler state
let daftBassStep = 0;
let daftBassPattern = [];
let daftArpStep = 0;
let daftArpPattern = [];
let daftPhaserStep = 0;
let daftPhaserPattern = [];

// Interstella scheduler state
let stellaBarsElapsed = 0;
let stellaAcidStep = 0;
let stellaAcidPattern = [];
let stellaArpStep2 = 0;
let stellaArpPattern2 = [];
let stellaTbStep = 0;
let stellaTbPattern = [];
let stellaBreakdown = false;

function activeChords() {
  if (currentPersona === 'zimmer')      return ZIMMER_CHORDS;
  if (currentPersona === 'daftpunk')    return DAFTPUNK_CHORDS;
  if (currentPersona === 'interstella') return INTERSTELLA_CHORDS;
  return CHORDS;
}

function getChordTones(chord, octaveOffset = 0) {
  return chord.tones.map(m => m + octaveOffset * 12);
}

function getPentatonicInKey(rootMidi) {
  // A minor pentatonic: A C D E G
  const scale = [0, 3, 5, 7, 10]; // semitones from root A
  const notes = [];
  for (let oct = -1; oct <= 2; oct++) {
    scale.forEach(s => notes.push(rootMidi + s + oct * 12));
  }
  return notes.filter(n => n >= 48 && n <= 84);
}

function buildOstinatoPattern(chord) {
  // Pulsing repeated root + fifth for that driving Zimmer tick
  const root = chord.root;
  const fifth = root + 7;
  // Eighth-note pattern: root root root fifth root root fifth root
  return [root, root, root, fifth, root, root, fifth, root,
          root, root, fifth, root, root, fifth, root, root];
}

function buildZimmerMelody(chord) {
  // Sparse, wide intervals — octave leaps, fifths, dramatic phrasing
  const root = chord.root;
  const intervals = [0, 7, 12, 5, 10, 7, 0, 12, 19, 12, 7, 5]; // fifths, octaves, etc.
  const line = [];
  for (let i = 0; i < 6; i++) {
    const interval = intervals[Math.floor(Math.random() * intervals.length)];
    line.push(root + interval + 12); // up an octave for melody register
    // More rests than ambient — sparse and dramatic
    if (Math.random() < 0.45) line.push(null);
    if (Math.random() < 0.2)  line.push(null);
  }
  return line;
}

function buildArpPattern(chord) {
  const tones = getChordTones(chord, 0);
  const tonesHigh = getChordTones(chord, 1);
  const base = [...tones, ...tonesHigh, ...tones.reverse()];
  // Humanize: randomly reorder some notes
  const shuffled = [...base];
  for (let i = shuffled.length - 1; i > 0; i--) {
    if (Math.random() < 0.2) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
  }
  return shuffled;
}

function buildMelodyLine(chord) {
  const rootA = 57; // A3
  const penta = getPentatonicInKey(rootA);
  // Weight toward chord tones
  const line = [];
  const chordMidi = getChordTones(chord, 1);
  for (let i = 0; i < 8; i++) {
    if (Math.random() < 0.6) {
      line.push(chordMidi[Math.floor(Math.random() * chordMidi.length)]);
    } else {
      const filtered = penta.filter(n => n >= 57 && n <= 79);
      line.push(filtered[Math.floor(Math.random() * filtered.length)]);
    }
    // Occasional rest
    if (Math.random() < 0.25) line.push(null);
  }
  return line;
}

// ─── Daft Punk pattern builders ───────────────────────────────────────────────

function buildDaftBassPattern(chord) {
  // Funky syncopated 16th note bass: mix of root, 5th, octave with rests (null)
  const r = chord.root;
  const f = r + 7;    // fifth
  const o = r + 12;   // octave
  // Classic disco/funk bass pattern with syncopation
  return [
    r,    null, r,    null, f,    r,    null, o,
    r,    null, null, r,    f,    null, r,    null,
  ];
}

function buildDaftArpPattern(chord) {
  const tones = chord.tones;
  // Major 7th chord tones + upper octave for dreamy arpeggio
  const up = tones.map(m => m + 12);
  const sequence = [...tones, ...up, ...tones.slice().reverse()];
  return sequence;
}

function buildDaftPhaserLine(chord) {
  // Pentatonic major runs — more active than ambient
  const root = chord.root;
  const majorPenta = [0, 2, 4, 7, 9]; // major pentatonic offsets
  const line = [];
  for (let oct = 0; oct <= 1; oct++) {
    majorPenta.forEach(s => line.push(root + s + oct * 12 + 12));
  }
  // Shuffle slightly for variation
  return line.sort(() => Math.random() * 0.6 - 0.3);
}

// ─── Interstella pattern builders ─────────────────────────────────────────────

function buildAcidPattern(chord) {
  const r = chord.root;
  const f = r + 7;
  const m3 = r + chord.tones[1] - chord.root;
  // 16-step acid pattern with slides (represented as negative = slide in)
  return [
    r,    r,    null, r,    f,    null, r,    m3,
    r,    null, f,    r,    null, r,    f,    r,
  ];
}

function buildStellaArpPattern(chord) {
  const tones = chord.tones;
  const up1 = tones.map(m => m + 12);
  const up2 = tones.map(m => m + 24);
  // Fast ascending arpeggio — "Aerodynamic" style
  return [...tones, ...up1, ...up2, ...up1.slice().reverse()];
}

function buildTalkboxLine(chord) {
  const root = chord.root;
  const tones = chord.tones;
  // Simple but catchy melodic fragments
  const line = [];
  tones.forEach(t => {
    line.push(t + 12);
    if (Math.random() < 0.4) line.push(t + 14);
    if (Math.random() < 0.3) line.push(null);
  });
  return line;
}

function scheduler() {
  if (!isPlaying) return;

  const now = audioCtx.currentTime;

  while (nextNoteTime < now + LOOK_AHEAD) {
    scheduleBeat(nextNoteTime);
    advanceBeat();
  }

  // Clean up past scheduled nodes
  const currentTime = audioCtx.currentTime;
  scheduledEvents = scheduledEvents.filter(e => e.time > currentTime);
}

function advanceBeat() {
  const secondsPerBeat = 60 / tempo;
  nextNoteTime += secondsPerBeat * 0.25; // 16th note resolution
  beatCount++;
}

function scheduleBeat(t) {
  const sixteenth = beatCount % 16;   // 16th within bar
  const beat      = Math.floor(beatCount / 4) % 4; // beat 0-3
  const bar       = Math.floor(beatCount / 16);

  const chords    = activeChords();
  const chord     = chords[currentChordIdx];
  const secondsPerBeat = 60 / tempo;
  const quarterNote = secondsPerBeat;
  const halfNote    = secondsPerBeat * 2;
  const wholeNote   = secondsPerBeat * 4;

  // ── Chord change logic ──
  if (beatCount - lastChordChange >= beatsPerChord * 4) {
    lastChordChange = beatCount;
    beatsPerChord = 12 + Math.floor(Math.random() * 12);

    // Transition to next chord (with occasional skip)
    const chordJumps = [1, 1, 1, 2, -1, 3];
    const jump = chordJumps[Math.floor(Math.random() * chordJumps.length)];
    currentChordIdx = ((currentChordIdx + jump) + chords.length) % chords.length;

    const nextChord = chords[currentChordIdx];

    if (currentPersona === 'ambient') {
      // Rebuild ambient patterns for new chord
      arpPattern = buildArpPattern(nextChord);
      arpStep = 0;
      melodyNotes = buildMelodyLine(nextChord);
      melodyStep = 0;

      // Play pad on chord change
      const padTones = getChordTones(nextChord, 0);
      const velocity = 0.55 + Math.random() * 0.25;
      playPad(padTones, t, wholeNote * (beatsPerChord / 4) * 0.9, velocity);
    } else if (currentPersona === 'zimmer') {
      // Rebuild Zimmer patterns
      ostPattern = buildOstinatoPattern(nextChord);
      ostStep = 0;
      melodyNotes = buildZimmerMelody(nextChord);
      melodyStep = 0;
      zimmerBarsElapsed = 0;

      // Play organ pad on chord change
      const organTones = getChordTones(nextChord, 0);
      const velocity = 0.65 + Math.random() * 0.2;
      playOrganPad(organTones, t, wholeNote * (beatsPerChord / 4) * 0.92, velocity);

      // Deep drone on chord root
      playDrone(nextChord.root, t, wholeNote * (beatsPerChord / 4) * 0.95, 0.8);
    } else if (currentPersona === 'daftpunk') {
      // Rebuild Daft Punk patterns
      daftBassPattern = buildDaftBassPattern(nextChord);
      daftBassStep = 0;
      daftArpPattern = buildDaftArpPattern(nextChord);
      daftArpStep = 0;
      daftPhaserPattern = buildDaftPhaserLine(nextChord);
      daftPhaserStep = 0;

      // Vocoder pad on chord change
      const padTones = getChordTones(nextChord, 0);
      const velocity = 0.6 + Math.random() * 0.2;
      playVocoderPad(padTones, t, wholeNote * (beatsPerChord / 4) * 0.88, velocity);
      // Filtered disco chord stab on change
      playDiscoChord(getChordTones(nextChord, 0), t, quarterNote * 2, 0.8);
    } else {
      // Interstella: rebuild
      stellaAcidPattern = buildAcidPattern(nextChord);
      stellaAcidStep = 0;
      stellaArpPattern2 = buildStellaArpPattern(nextChord);
      stellaArpStep2 = 0;
      stellaTbPattern = buildTalkboxLine(nextChord);
      stellaTbStep = 0;
      stellaBarsElapsed = 0;
      stellaBreakdown = false;

      // Supersaw stabs on drop
      const ssTones = getChordTones(nextChord, 0);
      const velocity = 0.75 + Math.random() * 0.2;
      playSupersaw(ssTones, t, wholeNote * (beatsPerChord / 4) * 0.9, velocity);
    }

    // Update chord display
    let displayName;
    if (currentPersona === 'zimmer')      displayName = `spike.land radio ∞ — ZIMMER  ·  ${nextChord.name}`;
    else if (currentPersona === 'daftpunk')    displayName = `spike.land radio ∞ — DAFT PUNK  ·  ${nextChord.name}`;
    else if (currentPersona === 'interstella') displayName = `spike.land radio ∞ — INTERSTELLA  ·  ${nextChord.name}`;
    else displayName = nextChord.name;

    setTimeout(() => {
      chordDisp.textContent = displayName;
      chordDisp.classList.add('active');
      setTimeout(() => chordDisp.classList.remove('active'), 2000);
    }, (t - audioCtx.currentTime) * 1000);
  }

  // ── Initial setup ──
  if (beatCount === 0) {
    if (currentPersona === 'ambient') {
      arpPattern = buildArpPattern(chord);
      melodyNotes = buildMelodyLine(chord);
      playPad(getChordTones(chord, 0), t, wholeNote * 4, 0.7);
    } else if (currentPersona === 'zimmer') {
      ostPattern = buildOstinatoPattern(chord);
      melodyNotes = buildZimmerMelody(chord);
      playOrganPad(getChordTones(chord, 0), t, wholeNote * 4, 0.7);
      playDrone(chord.root, t, wholeNote * 4, 0.85);
    } else if (currentPersona === 'daftpunk') {
      daftBassPattern = buildDaftBassPattern(chord);
      daftArpPattern = buildDaftArpPattern(chord);
      daftPhaserPattern = buildDaftPhaserLine(chord);
      playVocoderPad(getChordTones(chord, 0), t, wholeNote * 4, 0.65);
      playDiscoChord(getChordTones(chord, 0), t, quarterNote * 2, 0.75);
    } else {
      stellaAcidPattern = buildAcidPattern(chord);
      stellaArpPattern2 = buildStellaArpPattern(chord);
      stellaTbPattern = buildTalkboxLine(chord);
      playSupersaw(getChordTones(chord, 0), t, wholeNote * 4, 0.8);
    }
  }

  // ══════════════════════════════════════════════════════════════════
  // AMBIENT SCHEDULER
  // ══════════════════════════════════════════════════════════════════
  if (currentPersona === 'ambient') {

    // ── Kick: beats 0 and 2 (+ variation) ──
    if (sixteenth === 0) {
      playSoftKick(t, 0.45 + Math.random() * 0.15);
    }
    if (sixteenth === 8 && Math.random() < 0.75) {
      playSoftKick(t, 0.3 + Math.random() * 0.1);
    }
    // Ghost notes
    if ((sixteenth === 6 || sixteenth === 14) && Math.random() < 0.2) {
      playSoftKick(t, 0.12);
    }

    // ── Hi-hats: 8th notes with variation ──
    if (sixteenth % 2 === 0) {
      const vel = 0.15 + Math.random() * 0.25;
      const isOpen = sixteenth === 12 && Math.random() < 0.3;
      playHihat(t, isOpen, vel);
    }
    // 16th note hi-hat rolls occasionally
    if (sixteenth % 2 === 1 && Math.random() < 0.18) {
      playHihat(t, false, 0.08 + Math.random() * 0.1);
    }

    // ── Bass: root on beat 0, passing on beat 2, occasional fills ──
    if (sixteenth === 0) {
      const vel = 0.65 + Math.random() * 0.2;
      playBass(chord.root, t, quarterNote * 1.8, vel);
    }
    if (sixteenth === 8 && Math.random() < 0.7) {
      const options = [chord.root, chord.root + 7, chord.root + 12];
      const bassNote = options[Math.floor(Math.random() * options.length)];
      playBass(bassNote, t, quarterNote * 0.9, 0.45 + Math.random() * 0.2);
    }
    if ((sixteenth === 12 || sixteenth === 4) && Math.random() < 0.25) {
      playBass(chord.root + (Math.random() < 0.5 ? 5 : 7), t, quarterNote * 0.5, 0.35);
    }

    // ── Arpeggios: 8th note pattern ──
    if (sixteenth % 2 === 0 && arpPattern.length > 0) {
      const midi = arpPattern[arpStep % arpPattern.length];
      const humanize = (Math.random() - 0.5) * 0.018;
      const vel = 0.3 + Math.random() * 0.35;
      playArp(midi, t + Math.max(0, humanize), quarterNote * 0.45, vel);
      arpStep++;

      // Occasional shimmering high note
      if (Math.random() < 0.06) {
        playShimmer(midi, t + quarterNote * 0.5);
      }
    }

    // ── Melody: sparse, every few beats ──
    if (sixteenth === 0 && Math.random() < 0.65 && melodyNotes.length > 0) {
      const midi = melodyNotes[melodyStep % melodyNotes.length];
      if (midi !== null) {
        const vel = 0.3 + Math.random() * 0.25;
        const dur = quarterNote * (0.5 + Math.random() * 1.5);
        playMelody(midi, t + 0.01, dur, vel);
      }
      melodyStep++;
      if (melodyStep >= melodyNotes.length) {
        melodyNotes = buildMelodyLine(chord);
        melodyStep = 0;
      }
    }

    // ── Atmospheric shimmer ──
    if (Math.random() < 0.012 && sixteenth === 0) {
      const tones = getChordTones(chord, 1);
      const midi = tones[Math.floor(Math.random() * tones.length)];
      playShimmer(midi, t + quarterNote * Math.random());
    }

  // ══════════════════════════════════════════════════════════════════
  // ZIMMER SCHEDULER
  // ══════════════════════════════════════════════════════════════════
  } else if (currentPersona === 'zimmer') {
