# spike-land-ai Central Package Manifest
# Package configs live in packages/, TypeScript source in src/.
# Used by MCP tools for build, publish, deploy, and deploy operations.

defaults:
  scope: "@spike-land-ai"
  registry: https://npm.pkg.github.com
  license: MIT
  type: module

packages:
  # ─── Libraries ──────────────────────────────────────────────────────────────
  block-website:
    kind: library
    version: 1.0.0
    description: Isomorphic Hyper-Block for spike.land marketing and blog
    entry: index.ts
    exports:
      "./core": ./core/index.ts
      "./ui": ./ui/index.ts
      "./mcp": ./mcp/index.ts
    deps: [shared]
    publish:
      registries: [github]

  block-sdk:
    kind: library
    version: 0.1.0
    description: Full-stack block SDK — defineBlock(), StorageAdapter, React bindings, MCP integration
    entry: index.ts
    exports:
      ".": ./index.ts
      "./storage": ./storage/index.ts
      "./adapters/d1": ./adapters/d1.ts
      "./adapters/idb": ./adapters/idb.ts
      "./react": ./react/index.ts
      "./mcp": ./mcp/index.ts
    deps: [shared, mcp-server-base]
    publish:
      registries: [github]

  block-tasks:
    kind: block
    version: 0.1.0
    description: Proof-of-concept full-stack block — task queue with CRUD, claim workflow, and React UI
    entry: index.ts
    exports:
      ".": ./index.ts
      "./worker": ./worker.ts
      "./browser": ./browser.ts
    deps: [block-sdk, shared]
    publish:
      registries: [github]
    block:
      storage: d1
      ui: true
      tools: auto

  shared:
    kind: library
    version: 2.0.0
    description: Shared types, validations, constants, utilities
    entry: index.ts
    exports:
      ".": ./index.ts
      "./types": ./types/index.ts
      "./constants": ./constants/index.ts
      "./utils": ./utils/index.ts
      "./validators": ./validators/index.ts
      "./schemas": ./schemas/index.ts
    publish:
      registries: [github, npm]

  mcp-server-base:
    kind: library
    version: 1.0.0
    description: Shared base utilities for MCP servers
    entry: core-logic/index.ts
    deps: []
    publish:
      registries: [github, npm]

  react-ts-worker:
    kind: library
    version: 1.0.0
    description: From-scratch React (Fiber reconciler, scheduler, multi-target rendering)
    entry: react/index.ts
    exports:
      ".": ./react/index.ts
      "./jsx-runtime": ./react/jsx-runtime.ts
      "./jsx-dev-runtime": ./react/jsx-dev-runtime.ts
      "./react-dom": ./react-dom/index.ts
      "./react-dom/client": ./react-dom/client.ts
      "./react-dom/server": ./react-dom/server.ts
      "./scheduler": ./scheduler/index.ts
    publish:
      registries: [github, npm]

  # ─── MCP Servers ────────────────────────────────────────────────────────────
  google-analytics-mcp:
    kind: mcp-server
    version: 0.1.0
    description: MCP server for Google Analytics 4 read access
    entry: index.ts
    bin: index.js
    deps: [mcp-server-base]
    publish:
      registries: [github]

  google-ads-mcp:
    kind: mcp-server
    version: 0.1.0
    description: MCP server for Google Ads campaign management and reporting
    entry: index.ts
    bin: index.js
    deps: [mcp-server-base]
    publish:
      registries: [github]

  stripe-analytics-mcp:
    kind: mcp-server
    version: 0.1.0
    description: MCP server for Stripe revenue analytics and reporting
    entry: index.ts
    bin: index.js
    deps: [mcp-server-base]
    publish:
      registries: [github]

  docker-compose-mcp:
    kind: mcp-server
    version: 0.1.0
    description: Docker Compose service manager with Caddy subdomain routing
    entry: index.ts
    bin: index.js
    deps: [mcp-server-base]
    publish:
      registries: [github]

  bazdmeg-mcp:
    kind: mcp-server
    version: 1.0.0
    description: BAZDMEG MCP server — workspace isolation, quality gates, monorepo tools
    entry: index.ts
    bin: index.js
    deps: [mcp-server-base]
    publish:
      registries: [github]

  esbuild-wasm-mcp:
    kind: mcp-server
    version: 1.0.0
    description: MCP server wrapping esbuild-wasm
    entry: index.ts
    bin: index.js
    deps: [mcp-server-base]
    publish:
      registries: [github, npm]

  hackernews-mcp:
    kind: mcp-server
    version: 1.0.0
    description: MCP server for HackerNews read/write
    entry: index.ts
    bin: index.js
    deps: [mcp-server-base]
    publish:
      registries: [github, npm]

  mcp-image-studio:
    kind: mcp-server
    version: 2.0.0
    description: AI image generation, enhancement, albums & pipelines
    entry: index.ts
    bin: cli-server.js
    deps: [mcp-server-base, shared]
    publish:
      registries: [github, npm]

  openclaw-mcp:
    kind: mcp-server
    version: 1.0.0
    description: MCP bridge for OpenClaw gateway
    entry: index.ts
    bin: cli.js
    publish:
      registries: [github, npm]

  spike-review:
    kind: mcp-server
    version: 1.0.0
    description: AI code review bot with GitHub integration (BAZDMEG gates)
    entry: index.ts
    bin: cli.js
    exports:
      ".": ./index.ts
      "./worker": ./worker/index.ts
    publish:
      registries: [github]
    worker:
      name: spike-review
      entry: worker/index.ts
      compatibility_date: "2025-07-12"
      compatibility_flags: [nodejs_compat]

  # ─── CLIs ───────────────────────────────────────────────────────────────────
  spike-cli:
    kind: cli
    version: 1.0.0
    description: MCP multiplexer CLI with Claude chat integration
    entry: index.ts
    bin: index.js
    binName: spike
    deps: []
    publish:
      registries: [github, npm]

  vibe-dev:
    kind: cli
    version: 1.0.0
    description: Docker-based dev workflow tool
    entry: core-logic/cli.ts
    bin: cli.js
    binName: vibe-dev
    publish:
      registries: [github]

  # ─── Domain Packages ────────────────────────────────────────────────────────
  chess-engine:
    kind: library
    version: 1.0.0
    description: Chess engine with ELO, game/player/challenge managers
    entry: index.ts
    publish:
      registries: [github, npm]

  qa-studio:
    kind: library
    version: 1.0.0
    description: QA Studio browser automation (Playwright)
    entry: index.ts
    publish:
      registries: [github]

  state-machine:
    kind: library
    version: 1.0.0
    description: Statechart engine with guard expression parser
    entry: index.ts
    bin: cli.js
    binName: state-machine-cli
    exports:
      ".": ./index.ts
      "./persistence": ./persistence/index.ts
    publish:
      registries: [github, npm]

  # ─── Cloudflare Workers ─────────────────────────────────────────────────────
  spike-edge:
    kind: worker
    version: 1.0.0
    description: Edge API service (Cloudflare Workers + Hono)
    entry: index.ts
    worker:
      name: spike-edge
      compatibility_date: "2025-01-01"
      compatibility_flags: [nodejs_compat]
      r2_buckets:
        - binding: R2
          bucket_name: spike-platform
        - binding: SPA_ASSETS
          bucket_name: spike-app-assets
      durable_objects:
        - name: LIMITERS
          class_name: RateLimiter
      routes:
        - pattern: edge.spike.land
          custom_domain: true

  spike-land-backend:
    kind: worker
    version: 1.0.0
    description: Main backend (Durable Objects, Hono, real-time collaboration)
    entry: cf-workers.ts
    deps: [code, esbuild-wasm, esbuild-wasm-mcp]
    worker:
      name: spike-land
      compatibility_date: "2025-07-12"
      compatibility_flags: [nodejs_compat]
      kv_namespaces:
        - binding: KV
          id: e05276b573af4afd905bc6ac1ed371d5
          preview_id: 9db106837d4d437a962612dd04197581
      durable_objects:
        - name: CODE
          class_name: Code
        - name: LIMITERS
          class_name: CodeRateLimiter
      r2_buckets:
        - binding: R2
          bucket_name: npmprod
        - binding: X9
          bucket_name: code-chain
      site:
        bucket: node_modules/@spike-land-ai/code/dist

  transpile:
    kind: worker
    version: 1.0.0
    description: On-demand JS/TS transpilation via esbuild-wasm
    entry: index.ts
    deps: [code, esbuild-wasm]
    worker:
      name: esbuild
      compatibility_date: "2024-12-01"
      compatibility_flags: [nodejs_compat]
      rules:
        - type: CompiledWasm
          globs: ["**/*.wasm"]

  spike-land-mcp:
    kind: worker
    version: 1.0.0
    description: MCP registry with 80+ tools (Cloudflare Workers + D1)
    entry: index.ts
    deps: [mcp-server-base, shared]
    worker:
      name: spike-land-mcp
      compatibility_date: "2025-07-12"
      compatibility_flags: [nodejs_compat]
      kv_namespaces:
        - binding: KV
          id: adf12f5b631b445086eb029abae41b24
      d1_databases:
        - binding: DB
          database_name: spike-land-mcp
          database_id: 52b72b0a-c0f8-4d7f-aaec-4f014594d0c1
          migrations_dir: db/migrations
      routes:
        - pattern: "mcp.spike.land/*"
          zone_name: spike.land

  mcp-auth:
    kind: worker
    version: 2.0.0
    description: Auth MCP server (Better Auth on Cloudflare Workers + Drizzle)
    entry: index.ts
    worker:
      name: mcp-auth
      compatibility_date: "2025-02-28"
      compatibility_flags: [nodejs_compat]
      d1_databases:
        - binding: AUTH_DB
          database_name: spike-auth-production
          database_id: 2afd3ffd-0e4e-4b2d-b395-7510d54af8dc
      r2_buckets:
        - binding: AUTH_R2
          bucket_name: spike-auth-assets
      routes:
        - pattern: auth-mcp.spike.land
          custom_domain: true


  code:
    kind: browser
    version: 1.0.0
    description: Monaco Editor-based code editor with live preview
    entry: modules.ts
    deps: [esbuild-wasm, esbuild-wasm-mcp]
    publish:
      registries: [github]
    worker:
      name: spike-land-frontend
      entry: worker.ts
      compatibility_date: "2025-11-11"
      assets:
        directory: ./dist-vite/client
        not_found_handling: single-page-application
      routes:
        - pattern: testing.spike.land
          custom_domain: true

  # ─── Apps ───────────────────────────────────────────────────────────────────
  image-studio-worker:
    kind: worker
    version: 1.0.0
    description: Image Studio — Cloudflare Worker with React frontend
    entry: index.ts
    private: true
    deps: [mcp-image-studio, shared]
    worker:
      name: image-studio-mcp
      compatibility_date: "2025-02-28"
      compatibility_flags: [nodejs_compat]
      d1_databases:
        - binding: IMAGE_DB
          database_name: pixel-studio
          database_id: 74991261-c270-45d2-ab40-e8955e43f93f
      r2_buckets:
        - binding: IMAGE_R2
          bucket_name: pixel-studio
      assets:
        directory: ./frontend/dist
        not_found_handling: none
      routes:
        - pattern: image-studio-mcp.spike.land
          custom_domain: true

  spike-app:
    kind: browser
    version: 1.0.0
    description: Frontend SPA (Vite + TanStack Router)
    entry: main.tsx
    private: true

  # ─── Media ──────────────────────────────────────────────────────────────────
  video:
    kind: video
    version: 2.0.0
    description: Educational video compositions (Remotion)
    entry: index.ts
    private: true
