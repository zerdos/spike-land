name: CI

on:
  push:
    branches: [main, consolidate]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        run: bash scripts/scan-secrets.sh --all

  # Shared install: runs yarn install once, saves node_modules to GHA cache.
  # All downstream jobs (typecheck, lint, test, build) restore from this cache
  # rather than each running their own install. This shaves ~60-90 s per job
  # on a cold run, and ~30-45 s on cache-hit runs where yarn validate-deps
  # skips the network entirely.
  install:
    runs-on: ubuntu-latest
    outputs:
      # Surface the exact cache key so downstream jobs can use restore-keys
      # with the identical primary key and avoid a redundant yarn install.
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # The built-in yarn cache from setup-node caches the Yarn global
          # cache (~/.yarn/berry/cache). We add a separate node_modules cache
          # below so downstream jobs can skip yarn install entirely.
          cache: yarn

      - id: cache-key
        run: echo "key=node-modules-${{ runner.os }}-${{ hashFiles('yarn.lock') }}" >> $GITHUB_OUTPUT

      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: node-modules-${{ runner.os }}-

      # Only run install when node_modules cache missed. On a hit, the
      # node_modules directory is already fully populated.
      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: yarn install --immutable

      # Explicitly save even if the primary key was restored (in case
      # restore-keys matched a stale key and yarn install updated modules).
      - name: Save node_modules cache
        if: steps.nm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: ${{ steps.cache-key.outputs.key }}

  # typecheck, lint, test, and build all fan out from install in parallel.
  # None of them need to wait for each other — only for deps to be installed.

  typecheck:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      # Restore the shared node_modules written by the install job.
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.install.outputs.cache-key }}
          restore-keys: node-modules-${{ runner.os }}-

      # .tsbuildinfo is per-job because the TypeScript incremental build
      # state is not safe to share across concurrent writers.
      - uses: actions/cache@v4
        with:
          path: .tsbuildinfo
          key: tsbuildinfo-${{ runner.os }}-${{ hashFiles('tsconfig.json', 'src/**/*.ts', 'src/**/*.tsx') }}
          restore-keys: tsbuildinfo-${{ runner.os }}-

      - run: yarn install --immutable
      - run: yarn typecheck

  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.install.outputs.cache-key }}
          restore-keys: node-modules-${{ runner.os }}-

      - uses: actions/cache@v4
        with:
          path: .eslintcache
          key: eslintcache-${{ runner.os }}-${{ hashFiles('eslint.config.mjs') }}
          restore-keys: eslintcache-${{ runner.os }}-

      - run: yarn install --immutable
      - run: yarn lint:check
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
      - name: Check formatting for changed files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bash scripts/format-changed.sh --base origin/main --head HEAD
          else
            bash scripts/format-changed.sh --base HEAD~1 --head HEAD
          fi

  test:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.install.outputs.cache-key }}
          restore-keys: node-modules-${{ runner.os }}-

      - run: yarn install --immutable
      - name: Run changed tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bash scripts/test-changed.sh --base origin/main --head HEAD
          else
            bash scripts/test-changed.sh --base HEAD~1 --head HEAD
          fi

  # Build starts as soon as install finishes — in parallel with the three check
  # jobs. This means build wall-clock time is hidden behind check wall-clock
  # time. If a check fails, the gate job blocks deploy from running. The build
  # artifact is still uploaded; it is simply never consumed by deploy-workers.
  build:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.install.outputs.cache-key }}
          restore-keys: node-modules-${{ runner.os }}-

      - run: yarn install --immutable
      - run: yarn build:src

      # esbuild.config.ts outputs to dist/<packageName>/.
      # publish-changed.js reads from this same dist/ directory.
      # Workers don't need these artifacts — wrangler compiles src/ directly.
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 1

  # Gate: all three quality checks AND the build must pass before any deploy
  # job runs. This replaces the old pattern of build needing [typecheck, lint,
  # test]. Using a separate gate job means we can clearly express: "we need
  # clean code AND a successful build before deploying."
  gate:
    needs: [typecheck, lint, test, build]
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        run: echo "typecheck, lint, test, and build all succeeded — gate open"

  publish:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          registry-url: https://npm.pkg.github.com

      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: node-modules-${{ runner.os }}-

      - run: yarn install --immutable

      # publish-changed.js reads from dist/<packageName>/ (line: const DIST = join(ROOT, "dist"))
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist/

      - run: node scripts/publish-changed.js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npmjs.org
        continue-on-error: true
        run: node scripts/publish-changed.js --registry=npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy-workers:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: gate
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: node-modules-${{ runner.os }}-

      - run: yarn install --immutable

      # No artifact download needed — wrangler compiles TypeScript directly
      # from src/ via the main field in each packages/*/wrangler.toml.

      # D3: Validate migration SQL for zero-downtime risks
      - name: Validate D1 migrations
        run: bash .github/scripts/validate-migrations.sh

      - name: Validate Cloudflare token
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is empty or not set"
            exit 1
          fi
          echo "Cloudflare token is set (length: ${#CLOUDFLARE_API_TOKEN})"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # D6: Run D1 migrations BEFORE deploying workers
      - name: Apply D1 migrations
        run: |
          echo "Applying D1 migrations..."
          cd packages/spike-land-mcp
          npx wrangler d1 migrations apply spike-land-mcp --remote
          echo "D1 migrations applied."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # Sync blog MDX content → D1 + R2 (runs on every push to main)
      - name: Seed blog posts to D1 and upload images to R2
        run: npx tsx scripts/seed-blog.ts --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Capture pre-deploy state
        id: pre-deploy
        run: echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      # D10: Parallelize independent worker deploys (wave 1: no deps)
      - name: "Deploy wave 1: independent workers"
        run: |
          echo "--- Wave 1: transpile, mcp-auth, spike-land-mcp, spike-review, image-studio-worker, status (parallel) ---"
          (cd packages/transpile && npm run deploy) &
          PID_TRANSPILE=$!
          (cd packages/mcp-auth && npm run deploy) &
          PID_AUTH=$!
          (cd packages/spike-land-mcp && npm run deploy) &
          PID_MCP=$!
          (cd packages/spike-review && npm run deploy) &
          PID_REVIEW=$!
          (cd packages/image-studio-worker && npm run deploy) &
          PID_IMAGE=$!
          (cd packages/status && npm run deploy) &
          PID_STATUS=$!

          wait $PID_TRANSPILE || { echo "FATAL: transpile deploy failed"; exit 1; }
          wait $PID_AUTH || { echo "FATAL: mcp-auth deploy failed"; exit 1; }
          wait $PID_MCP || { echo "FATAL: spike-land-mcp deploy failed"; exit 1; }
          wait $PID_REVIEW || { echo "FATAL: spike-review deploy failed"; exit 1; }
          wait $PID_IMAGE || { echo "FATAL: image-studio-worker deploy failed"; exit 1; }
          wait $PID_STATUS || { echo "FATAL: status deploy failed"; exit 1; }
          echo "Wave 1 complete."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # spike-land-backend uses Workers Sites pointing to the code editor's
      # dist/. In CI this isn't built (spike-app is the primary SPA now).
      # Create a minimal placeholder so wrangler doesn't fail.
      - name: Prepare spike-land-backend site assets
        run: mkdir -p node_modules/@spike-land-ai/code/dist && echo '{}' > node_modules/@spike-land-ai/code/dist/.gitkeep

      # Wave 2: workers that depend on wave 1
      - name: "Deploy wave 2: dependent workers"
        run: |
          echo "--- Wave 2: spike-land-backend, spike-edge (parallel) ---"
          (cd packages/spike-land-backend && npm run deploy) &
          PID_BACKEND=$!
          SHORT_SHA=$(git rev-parse --short HEAD)
          (cd packages/spike-edge && npx wrangler deploy --minify) &
          PID_EDGE=$!

          wait $PID_BACKEND || { echo "FATAL: spike-land-backend deploy failed"; exit 1; }
          wait $PID_EDGE || { echo "FATAL: spike-edge deploy failed"; exit 1; }
          echo "Wave 2 complete."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Warm prompt-driven blog hero images
        continue-on-error: true
        timeout-minutes: 5
        run: node --import tsx scripts/warm-blog-heroes.ts --base https://spike-edge.spikeland.workers.dev

      - name: Purge Cloudflare cache after worker deploys
        run: bash scripts/purge-cache.sh
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Build spike-app SPA
        run: cd packages/spike-app && npm run build

      - name: Deploy spike-app SPA
        run: bash packages/spike-app/deploy.sh
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # D7: Smoke test failures now BLOCK the pipeline (no more || echo swallow)
      - name: Smoke test
        run: |
          sleep 5
          echo "Running smoke tests (failures are blocking)..."

          smoke_check() {
            local url="$1" label="$2"
            for i in 1 2 3; do
              RES=$(curl -sf --max-time 15 "$url" || echo "")
              if [ -n "$RES" ]; then
                if echo "$RES" | jq -e '.status == "ok" or .ok == true' > /dev/null; then
                  SVC=$(echo "$RES" | jq -r '.service // "unknown"')
                  TS=$(echo "$RES" | jq -r '.timestamp // "none"')
                  echo "  OK $label (service: $SVC, timestamp: $TS)"
                  return 0
                fi
              fi
              [ "$i" -lt 3 ] && sleep 10
            done
            echo "  FAIL $label FAILED after 3 attempts"
            return 1
          }

          # Use workers.dev URLs to bypass zone-level Bot Fight Mode / managed challenge.
          # Custom domain URLs (*.spike.land) return 403 to automated clients.
          WORKERS_DEV="spikeland.workers.dev"
          FAIL_COUNT=0
          smoke_check "https://spike-edge.${WORKERS_DEV}/health" "spike-edge healthy" || ((FAIL_COUNT++))
          smoke_check "https://esbuild.${WORKERS_DEV}/health" "transpile healthy" || ((FAIL_COUNT++))
          smoke_check "https://spike-land-mcp.${WORKERS_DEV}/health" "spike-land-mcp healthy" || ((FAIL_COUNT++))
          smoke_check "https://mcp-auth.${WORKERS_DEV}/health" "mcp-auth healthy" || ((FAIL_COUNT++))
          smoke_check "https://image-studio-mcp.${WORKERS_DEV}/health" "image-studio-mcp healthy" || ((FAIL_COUNT++))
          smoke_check "https://spike-status.${WORKERS_DEV}/health" "status healthy" || ((FAIL_COUNT++))

          # SPA check uses custom domain (may be behind challenge, non-blocking)
          SPA_OK=false
          for i in 1 2 3; do
            SPA_CODE=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 15 "https://spike.land/" 2>/dev/null)
            if [ "$SPA_CODE" = "200" ] || [ "$SPA_CODE" = "403" ]; then
              echo "  OK SPA serving (HTTP $SPA_CODE)"
              SPA_OK=true
              break
            fi
            [ "$i" -lt 3 ] && sleep 10
          done
          if [ "$SPA_OK" = "false" ]; then
            echo "  FAIL SPA serving FAILED after 3 attempts"
            ((FAIL_COUNT++))
          fi

          if [ $FAIL_COUNT -gt 0 ]; then
            echo "$FAIL_COUNT smoke tests failed."
            exit 1
          fi
          echo "All smoke tests passed."

      - name: Verify deployed version
        run: |
          sleep 5
          DEPLOYED_SHA=$(curl -sf https://spike-edge.spikeland.workers.dev/api/version | jq -r '.sha // ""' 2>/dev/null || echo "")
          HEAD_SHA=$(git rev-parse HEAD)
          if [ "$DEPLOYED_SHA" != "$HEAD_SHA" ]; then
            echo "WARNING: Deployed SHA ($DEPLOYED_SHA) does not match HEAD ($HEAD_SHA)"
          else
            echo "Verified: deployed SHA matches HEAD ($HEAD_SHA)"
          fi

      - name: Rollback on failure
        if: failure()
        run: bash .github/scripts/rollback-workers.sh all
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
