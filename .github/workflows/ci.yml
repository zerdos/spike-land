name: CI

on:
  push:
    branches: [main, consolidate]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - uses: actions/cache@v4
        with:
          path: .tsbuildinfo
          key: tsbuildinfo-${{ runner.os }}-${{ hashFiles('tsconfig.json', 'src/**/*.ts', 'src/**/*.tsx') }}
          restore-keys: tsbuildinfo-${{ runner.os }}-

      - run: yarn install
      - run: yarn typecheck

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - uses: actions/cache@v4
        with:
          path: .eslintcache
          key: eslintcache-${{ runner.os }}-${{ hashFiles('eslint.config.mjs') }}-${{ github.sha }}
          restore-keys: eslintcache-${{ runner.os }}-${{ hashFiles('eslint.config.mjs') }}-

      - run: yarn install
      - run: yarn lint

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - run: yarn install
      - run: yarn test:src -- --shard=${{ matrix.shard }}/4

  build:
    needs: [typecheck, lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - run: yarn install
      - run: yarn build:src

      # esbuild.config.ts outputs to dist/<packageName>/.
      # publish-changed.js reads from this same dist/ directory.
      # Workers don't need these artifacts — wrangler compiles src/ directly.
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 1

  publish:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          registry-url: https://npm.pkg.github.com

      - run: yarn install

      # publish-changed.js reads from dist/<packageName>/ (line: const DIST = join(ROOT, "dist"))
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist/

      - run: node scripts/publish-changed.js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npmjs.org
        run: node scripts/publish-changed.js --registry=npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy-workers:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - run: yarn install

      # No artifact download needed — wrangler compiles TypeScript directly
      # from src/ via the main field in each packages/*/wrangler.toml.

      # D3: Validate migration SQL for zero-downtime risks
      - name: Validate D1 migrations
        run: bash .github/scripts/validate-migrations.sh

      # D6: Run D1 migrations BEFORE deploying workers
      - name: Apply D1 migrations
        run: |
          echo "Applying D1 migrations..."
          cd packages/spike-land-mcp && npx wrangler d1 migrations apply spike-land-mcp --remote && cd ../..
          echo "D1 migrations applied."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Capture pre-deploy state
        id: pre-deploy
        run: echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      # D10: Parallelize independent worker deploys (wave 1: no deps)
      - name: "Deploy wave 1: independent workers"
        run: |
          echo "--- Wave 1: transpile, mcp-auth, spike-land-mcp, spike-review, image-studio-worker, spike-agent (parallel) ---"
          (cd packages/transpile && npm run deploy) &
          PID_TRANSPILE=$!
          (cd packages/mcp-auth && npm run deploy) &
          PID_AUTH=$!
          (cd packages/spike-land-mcp && npm run deploy) &
          PID_MCP=$!
          (cd packages/spike-review && npm run deploy) &
          PID_REVIEW=$!
          (cd packages/image-studio-worker && npm run deploy) &
          PID_IMAGE=$!
          (cd packages/spike-agent && npm run deploy) &
          PID_AGENT=$!

          wait $PID_TRANSPILE || { echo "FATAL: transpile deploy failed"; exit 1; }
          wait $PID_AUTH || { echo "FATAL: mcp-auth deploy failed"; exit 1; }
          wait $PID_MCP || { echo "FATAL: spike-land-mcp deploy failed"; exit 1; }
          wait $PID_REVIEW || { echo "FATAL: spike-review deploy failed"; exit 1; }
          wait $PID_IMAGE || { echo "FATAL: image-studio-worker deploy failed"; exit 1; }
          wait $PID_AGENT || { echo "FATAL: spike-agent deploy failed"; exit 1; }
          echo "Wave 1 complete."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # Wave 2: workers that depend on wave 1
      - name: "Deploy wave 2: dependent workers"
        run: |
          echo "--- Wave 2: spike-land-backend, spike-edge (parallel) ---"
          (cd packages/spike-land-backend && npm run deploy) &
          PID_BACKEND=$!
          SHORT_SHA=$(git rev-parse --short HEAD)
          (cd packages/spike-edge && npx wrangler deploy --minify) &
          PID_EDGE=$!

          wait $PID_BACKEND || { echo "FATAL: spike-land-backend deploy failed"; exit 1; }
          wait $PID_EDGE || { echo "FATAL: spike-edge deploy failed"; exit 1; }
          echo "Wave 2 complete."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Build spike-app SPA
        run: cd packages/spike-app && npm run build

      - name: Deploy spike-app SPA
        run: bash packages/spike-app/deploy.sh
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # D7: Smoke test failures now BLOCK the pipeline (no more || echo swallow)
      - name: Smoke test
        run: |
          sleep 5
          echo "Running smoke tests (failures are blocking)..."

          smoke_check() {
            local url="$1" label="$2"
            for i in 1 2 3; do
              RES=$(curl -sf --max-time 15 "$url" || echo "")
              if [ -n "$RES" ]; then
                if echo "$RES" | jq -e '.status == "ok" or .ok == true' > /dev/null; then
                  SVC=$(echo "$RES" | jq -r '.service // "unknown"')
                  TS=$(echo "$RES" | jq -r '.timestamp // "none"')
                  echo "  ✓ $label (service: $SVC, timestamp: $TS)"
                  return 0
                fi
              fi
              [ "$i" -lt 3 ] && sleep 10
            done
            echo "  ✗ $label FAILED after 3 attempts"
            return 1
          }

          FAIL_COUNT=0
          smoke_check "https://edge.spike.land/health" "spike-edge healthy" || ((FAIL_COUNT++))
          smoke_check "https://js.spike.land/health" "transpile healthy" || ((FAIL_COUNT++))
          smoke_check "https://mcp.spike.land/health" "spike-land-mcp healthy" || ((FAIL_COUNT++))
          smoke_check "https://auth-mcp.spike.land/health" "mcp-auth healthy" || ((FAIL_COUNT++))
          smoke_check "https://image-studio-mcp.spike.land/health" "image-studio-mcp healthy" || ((FAIL_COUNT++))
          
          # SPA test check
          for i in 1 2 3; do
            if curl -sf --max-time 15 "https://spike.land/" > /dev/null 2>&1; then
              echo "  ✓ SPA serving"
              break
            fi
            if [ "$i" -eq 3 ]; then
              echo "  ✗ SPA serving FAILED after 3 attempts"
              ((FAIL_COUNT++))
            fi
            sleep 10
          done

          if [ $FAIL_COUNT -gt 0 ]; then
            echo "$FAIL_COUNT smoke tests failed."
            exit 1
          fi
          echo "All smoke tests passed."

      - name: Verify deployed version
        run: |
          sleep 5
          DEPLOYED_SHA=$(curl -sf https://spike.land/api/version | jq -r '.sha // ""' 2>/dev/null || echo "")
          HEAD_SHA=$(git rev-parse HEAD)
          if [ "$DEPLOYED_SHA" != "$HEAD_SHA" ]; then
            echo "WARNING: Deployed SHA ($DEPLOYED_SHA) does not match HEAD ($HEAD_SHA)"
          else
            echo "Verified: deployed SHA matches HEAD ($HEAD_SHA)"
          fi

      - name: Rollback on failure
        if: failure()
        run: bash .github/scripts/rollback-workers.sh all
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
