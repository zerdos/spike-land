name: Mirror Sync

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      package:
        description: "Package name to sync (empty = all with mirrors)"
        required: false

concurrency:
  group: mirror-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: yarn

      - run: yarn install

      - name: Detect affected mirrors
        id: mirrors
        run: |
          if [ -n "${{ github.event.inputs.package }}" ]; then
            echo "packages=[\"${{ github.event.inputs.package }}\"]" >> "$GITHUB_OUTPUT"
          else
            # Detect changed packages and filter those with mirror field
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- src/ | cut -d/ -f2 | sort -u)
            # Use node to cross-reference with packages.yaml mirrors
            node -e "
              const yaml = require('yaml');
              const fs = require('fs');
              const manifest = yaml.parse(fs.readFileSync('packages.yaml', 'utf-8'));
              const changed = '${CHANGED}'.split('\n').filter(Boolean);
              const mirrors = changed.filter(p => manifest.packages[p]?.mirror);
              console.log('packages=' + JSON.stringify(mirrors));
            " >> "$GITHUB_OUTPUT"
          fi

      - name: Sync mirrors
        if: steps.mirrors.outputs.packages != '[]'
        run: node scripts/mirror-sync.js '${{ steps.mirrors.outputs.packages }}'
        env:
          GITHUB_TOKEN: ${{ secrets.MIRROR_SYNC_TOKEN }}
