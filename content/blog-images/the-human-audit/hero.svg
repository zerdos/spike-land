<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e63946"/>
      <stop offset="40%" style="stop-color:#e63946"/>
      <stop offset="50%" style="stop-color:#f1faee"/>
      <stop offset="60%" style="stop-color:#e63946"/>
      <stop offset="100%" style="stop-color:#e63946"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines (subtle, like graph paper) -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="40" y1="0" x2="40" y2="630"/>
    <line x1="80" y1="0" x2="80" y2="630"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="160" y1="0" x2="160" y2="630"/><line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="280" y1="0" x2="280" y2="630"/>
    <line x1="320" y1="0" x2="320" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/><line x1="440" y1="0" x2="440" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="520" y1="0" x2="520" y2="630"/>
    <line x1="560" y1="0" x2="560" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="640" y1="0" x2="640" y2="630"/><line x1="680" y1="0" x2="680" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="760" y1="0" x2="760" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/><line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="880" y1="0" x2="880" y2="630"/><line x1="920" y1="0" x2="920" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1040" y1="0" x2="1040" y2="630"/><line x1="1080" y1="0" x2="1080" y2="630"/>
    <line x1="1120" y1="0" x2="1120" y2="630"/><line x1="1160" y1="0" x2="1160" y2="630"/>
    <line x1="0" y1="40" x2="1200" y2="40"/><line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/><line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="440" x2="1200" y2="440"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="520" x2="1200" y2="520"/><line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Heart rate line (EKG/stress monitor) -->
  <g filter="url(#glow)">
    <polyline fill="none" stroke="#e63946" stroke-width="2.5" opacity="0.9"
      points="0,315 80,315 120,315 160,315 200,312 220,310 240,315 280,315
              320,315 360,310 380,290 390,250 400,180 410,350 420,400 430,280
              440,315 480,315 520,315 560,312 580,310 600,315 640,315
              680,315 720,310 740,290 750,250 760,180 770,350 780,400 790,280
              800,315 840,315 880,315 920,312 940,310 960,315 1000,315
              1040,315 1080,310 1100,290 1110,250 1120,180 1130,350 1140,400 1150,280
              1160,315 1200,315"/>
  </g>

  <!-- The number 42 — large, central, glowing -->
  <text x="600" y="340" font-family="'Courier New', monospace" font-size="220"
        font-weight="bold" fill="#e63946" opacity="0.12" text-anchor="middle"
        filter="url(#glow-strong)">42</text>

  <!-- Title -->
  <text x="600" y="200" font-family="'Helvetica Neue', Arial, sans-serif" font-size="52"
        font-weight="700" fill="#f1faee" text-anchor="middle" letter-spacing="2">
    THE HUMAN AUDIT
  </text>

  <!-- Subtitle -->
  <text x="600" y="250" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20"
        fill="#a8dadc" text-anchor="middle" opacity="0.8" letter-spacing="4">
    UX-REVIEWING YOUR OWN LIFE
  </text>

  <!-- Bottom status bar -->
  <rect x="0" y="560" width="1200" height="70" fill="#0a0a0a" opacity="0.7"/>

  <!-- Status items -->
  <g font-family="'Courier New', monospace" font-size="14" fill="#457b9d">
    <!-- Stress -->
    <text x="80" y="600">STRESS</text>
    <text x="80" y="618" fill="#e63946" font-size="18" font-weight="bold">42</text>

    <!-- HRV -->
    <text x="240" y="600">STATUS</text>
    <text x="240" y="618" fill="#e63946" font-size="13">SECTIONED</text>

    <!-- Location -->
    <text x="430" y="600">LOC</text>
    <text x="430" y="618" fill="#a8dadc" font-size="13">BEXHILL 91 DE LA WARR</text>

    <!-- Day -->
    <text x="720" y="600">DAY</text>
    <text x="720" y="618" fill="#f1faee" font-size="18" font-weight="bold">1 / 28</text>

    <!-- Dogs -->
    <text x="900" y="600">DOGS</text>
    <text x="900" y="618" fill="#2a9d8f" font-size="13">PIXEL + MAD MAX: SAFE</text>
  </g>

  <!-- Thin red line at bottom -->
  <rect x="0" y="628" width="1200" height="2" fill="#e63946" opacity="0.8"/>
</svg>
