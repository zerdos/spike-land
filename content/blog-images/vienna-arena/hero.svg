<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.8" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Generative shapes -->
  <ellipse cx="763.0" cy="477.8" rx="278.5" ry="109.3" transform="rotate(307 763.0 477.8)" fill="#475569" opacity="0.18" />
<ellipse cx="403.3" cy="127.9" rx="258.8" ry="204.3" transform="rotate(298 403.3 127.9)" fill="#64748b" opacity="0.19" />
<ellipse cx="880.8" cy="307.6" rx="176.3" ry="146.0" transform="rotate(348 880.8 307.6)" fill="#64748b" opacity="0.20" />
<ellipse cx="102.6" cy="259.4" rx="231.6" ry="102.0" transform="rotate(249 102.6 259.4)" fill="#94a3b8" opacity="0.18" />
<ellipse cx="608.9" cy="101.6" rx="164.0" ry="187.5" transform="rotate(187 608.9 101.6)" fill="#475569" opacity="0.11" />
<ellipse cx="699.2" cy="18.7" rx="100.3" ry="181.6" transform="rotate(101 699.2 18.7)" fill="#cbd5e1" opacity="0.11" />


  <!-- Vignette -->
  <rect width="1200" height="630" fill="url(#bg)" opacity="0.3" />

  <!-- Category badge -->
  <rect x="48" y="40" width="174" height="28" rx="14" fill="#475569" opacity="0.9" />
  <text x="60" y="59" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5" text-transform="uppercase" fill="white">SCIENCE &amp; ARENA</text>

  <!-- Title -->
  <text x="48" y="550" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="white" filter="url(#textShadow)" letter-spacing="-1">
    <tspan x="48" dy="0">Vienna Waits for You: The Resolution</tspan>
    <tspan x="48" dy="50">Arena</tspan>
  </text>

  <!-- spike.land watermark -->
  <text x="1152" y="606" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#94a3b8" opacity="0.6" text-anchor="end">spike.land</text>
</svg>