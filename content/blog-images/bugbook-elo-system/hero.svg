<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1917" />
      <stop offset="100%" stop-color="#27272a" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#1c1917" flood-opacity="0.8" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Generative shapes -->
  <circle cx="371.7" cy="504.2" r="97.7" fill="#fda4af" opacity="0.12" />
<circle cx="829.5" cy="202.9" r="176.2" fill="#e11d48" opacity="0.12" />
<circle cx="1097.5" cy="355.7" r="192.9" fill="#e11d48" opacity="0.18" />
<circle cx="529.3" cy="76.8" r="40.6" fill="#fb7185" opacity="0.27" />
<circle cx="1040.2" cy="201.2" r="32.8" fill="#e11d48" opacity="0.26" />
<circle cx="749.3" cy="475.3" r="162.6" fill="#fda4af" opacity="0.16" />
<circle cx="1167.5" cy="147.0" r="43.3" fill="#fb7185" opacity="0.17" />
<circle cx="755.1" cy="408.4" r="49.6" fill="#fda4af" opacity="0.15" />
<circle cx="549.6" cy="540.8" r="172.4" fill="#fb7185" opacity="0.18" />
<circle cx="259.0" cy="118.1" r="36.1" fill="#e11d48" opacity="0.27" />
<circle cx="456.8" cy="90.0" r="104.5" fill="#e11d48" opacity="0.25" />
<circle cx="260.1" cy="22.6" r="208.5" fill="#e11d48" opacity="0.12" />
<circle cx="385.2" cy="334.8" r="63.3" fill="none" stroke="#f43f5e" stroke-width="2.9" opacity="0.33" />
<circle cx="1180.6" cy="54.4" r="148.2" fill="none" stroke="#f43f5e" stroke-width="1.5" opacity="0.25" />
<circle cx="977.9" cy="591.9" r="145.0" fill="none" stroke="#f43f5e" stroke-width="1.0" opacity="0.25" />
<circle cx="773.5" cy="160.5" r="137.5" fill="none" stroke="#f43f5e" stroke-width="1.8" opacity="0.44" />
<circle cx="509.6" cy="123.1" r="150.2" fill="none" stroke="#f43f5e" stroke-width="1.3" opacity="0.17" />


  <!-- Vignette -->
  <rect width="1200" height="630" fill="url(#bg)" opacity="0.3" />

  <!-- Category badge -->
  <rect x="48" y="40" width="134" height="28" rx="14" fill="#e11d48" opacity="0.9" />
  <text x="60" y="59" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5" text-transform="uppercase" fill="white">ENGINEERING</text>

  <!-- Title -->
  <text x="48" y="550" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="white" filter="url(#textShadow)" letter-spacing="-1">
    <tspan x="48" dy="0">Why We Gave Bugs an ELO Rating</tspan>
  </text>

  <!-- spike.land watermark -->
  <text x="1152" y="606" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#fb7185" opacity="0.6" text-anchor="end">spike.land</text>
</svg>