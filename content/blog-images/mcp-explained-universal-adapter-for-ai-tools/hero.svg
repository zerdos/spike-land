<circle cx="684.0" cy="616.9" r="111.3" fill="#fda4af" opacity="0.27" />
<circle cx="193.8" cy="317.5" r="180.0" fill="#f43f5e" opacity="0.15" />
<circle cx="900.9" cy="134.1" r="104.1" fill="none" stroke="#f43f5e" stroke-width="2.6" opacity="0.34" />
<circle cx="1079.0" cy="156.0" r="64.6" fill="none" stroke="#f43f5e" stroke-width="1.5" opacity="0.40" />
<circle cx="329.2" cy="246.1" r="141.4" fill="none" stroke="#e11d48" stroke-width="1.2" opacity="0.17" />
<circle cx="708.9" cy="206.9" r="70.0" fill="none" stroke="#e11d48" stroke-width="2.2" opacity="0.41" />
<circle cx="949.7" cy="277.8" r="137.5" fill="none" stroke="#f43f5e" stroke-width="2.6" opacity="0.17" />


  <!-- Vignette -->
  <rect width="1200" height="630" fill="url(#bg)" opacity="0.3" />

  <!-- Category badge -->
  <rect x="48" y="40" width="224" height="28" rx="14" fill="#e11d48" opacity="0.9" />
  <text x="60" y="59" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5" text-transform="uppercase" fill="white">DEVELOPER EXPERIENCE</text>

  <!-- Title -->
  <text x="48" y="550" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="white" filter="url(#textShadow)" letter-spacing="-1">
    <tspan x="48" dy="0">MCP Explained: The Universal Adapter</tspan>
    <tspan x="48" dy="50">for AI Tools</tspan>
  </text>

  <!-- spike.land watermark -->
  <text x="1152" y="606" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#fb7185" opacity="0.6" text-anchor="end">spike.land</text>
