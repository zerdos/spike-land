<circle cx="890.9" cy="416.5" r="41.2" fill="#e11d48" opacity="0.12" />
<circle cx="25.5" cy="108.4" r="192.1" fill="#fb7185" opacity="0.13" />
<circle cx="657.1" cy="119.9" r="47.7" fill="#fb7185" opacity="0.13" />
