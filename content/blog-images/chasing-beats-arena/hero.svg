<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0a09" />
      <stop offset="100%" stop-color="#1c1917" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0c0a09" flood-opacity="0.8" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Generative shapes -->
  <ellipse cx="601.0" cy="564.2" rx="83.8" ry="100.8" transform="rotate(93 601.0 564.2)" fill="#6366f1" opacity="0.11" />
<ellipse cx="52.4" cy="21.1" rx="115.9" ry="76.6" transform="rotate(331 52.4 21.1)" fill="#a5b4fc" opacity="0.13" />
<ellipse cx="705.1" cy="300.3" rx="151.0" ry="68.3" transform="rotate(67 705.1 300.3)" fill="#a5b4fc" opacity="0.15" />
<ellipse cx="207.5" cy="623.9" rx="173.5" ry="125.4" transform="rotate(330 207.5 623.9)" fill="#818cf8" opacity="0.08" />
<ellipse cx="1162.0" cy="57.3" rx="277.2" ry="97.9" transform="rotate(198 1162.0 57.3)" fill="#4f46e5" opacity="0.21" />
<ellipse cx="859.1" cy="98.3" rx="126.4" ry="93.5" transform="rotate(310 859.1 98.3)" fill="#a5b4fc" opacity="0.18" />


  <!-- Vignette -->
  <rect width="1200" height="630" fill="url(#bg)" opacity="0.3" />

  <!-- Category badge -->
  <rect x="48" y="40" width="174" height="28" rx="14" fill="#4f46e5" opacity="0.9" />
  <text x="60" y="59" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5" text-transform="uppercase" fill="white">SCIENCE &amp; ARENA</text>

  <!-- Title -->
  <text x="48" y="550" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="white" filter="url(#textShadow)" letter-spacing="-1">
    <tspan x="48" dy="0">Chasing Beats: A 138 BPM Math Arena</tspan>
    <tspan x="48" dy="50">Session</tspan>
  </text>

  <!-- spike.land watermark -->
  <text x="1152" y="606" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#818cf8" opacity="0.6" text-anchor="end">spike.land</text>
</svg>