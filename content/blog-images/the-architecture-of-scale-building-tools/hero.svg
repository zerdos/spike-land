<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1917" />
      <stop offset="100%" stop-color="#292524" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#1c1917" flood-opacity="0.8" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Generative shapes -->
  <ellipse cx="1049.3" cy="203.5" rx="137.3" ry="208.3" transform="rotate(84 1049.3 203.5)" fill="#fcd34d" opacity="0.18" />
<ellipse cx="589.6" cy="70.2" rx="238.4" ry="165.2" transform="rotate(190 589.6 70.2)" fill="#fcd34d" opacity="0.07" />
<ellipse cx="507.7" cy="389.5" rx="203.4" ry="67.2" transform="rotate(318 507.7 389.5)" fill="#fbbf24" opacity="0.08" />
<ellipse cx="1041.8" cy="139.9" rx="137.3" ry="193.9" transform="rotate(59 1041.8 139.9)" fill="#fcd34d" opacity="0.07" />
<ellipse cx="791.6" cy="565.0" rx="181.8" ry="79.9" transform="rotate(272 791.6 565.0)" fill="#fbbf24" opacity="0.06" />
<ellipse cx="398.9" cy="136.1" rx="138.8" ry="97.0" transform="rotate(152 398.9 136.1)" fill="#f59e0b" opacity="0.14" />


  <!-- Vignette -->
  <rect width="1200" height="630" fill="url(#bg)" opacity="0.3" />

  <!-- Category badge -->
  <rect x="48" y="40" width="124" height="28" rx="14" fill="#d97706" opacity="0.9" />
  <text x="60" y="59" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5" text-transform="uppercase" fill="white">AI &amp; TOOLS</text>

  <!-- Title -->
  <text x="48" y="550" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="white" filter="url(#textShadow)" letter-spacing="-1">
    <tspan x="48" dy="0">The Architecture of Scale: How I Made</tspan>
    <tspan x="48" dy="50">My MCP Tools Agent-Writable</tspan>
  </text>

  <!-- spike.land watermark -->
  <text x="1152" y="606" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#fbbf24" opacity="0.6" text-anchor="end">spike.land</text>
</svg>