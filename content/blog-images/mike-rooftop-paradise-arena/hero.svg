<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1917" />
      <stop offset="100%" stop-color="#27272a" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#1c1917" flood-opacity="0.8" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Generative shapes -->
  <circle cx="810.9" cy="104.1" r="161.0" fill="#fb7185" opacity="0.22" />
<circle cx="549.7" cy="269.2" r="207.3" fill="#f43f5e" opacity="0.22" />
<circle cx="189.6" cy="368.0" r="142.9" fill="#e11d48" opacity="0.27" />
<circle cx="1149.5" cy="124.2" r="78.1" fill="#e11d48" opacity="0.08" />
<circle cx="902.7" cy="306.2" r="179.7" fill="#fda4af" opacity="0.16" />
