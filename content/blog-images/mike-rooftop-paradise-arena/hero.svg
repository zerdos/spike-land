<circle cx="835.6" cy="17.9" r="121.5" fill="#fda4af" opacity="0.18" />
<circle cx="1064.1" cy="79.4" r="148.7" fill="#fb7185" opacity="0.16" />
<circle cx="985.9" cy="440.1" r="70.0" fill="#f43f5e" opacity="0.26" />
<circle cx="64.0" cy="54.9" r="203.7" fill="#f43f5e" opacity="0.15" />
<circle cx="815.3" cy="598.5" r="43.3" fill="#e11d48" opacity="0.13" />
<circle cx="1058.4" cy="86.3" r="92.5" fill="#f43f5e" opacity="0.21" />
<circle cx="286.7" cy="507.0" r="112.7" fill="none" stroke="#f43f5e" stroke-width="2.2" opacity="0.29" />
<circle cx="112.8" cy="472.9" r="142.1" fill="none" stroke="#e11d48" stroke-width="1.7" opacity="0.17" />
<circle cx="79.0" cy="216.3" r="70.9" fill="none" stroke="#e11d48" stroke-width="1.0" opacity="0.44" />
