  <!-- Category badge -->
  <rect x="48" y="40" width="174" height="28" rx="14" fill="#e11d48" opacity="0.9" />
  <text x="60" y="59" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5" text-transform="uppercase" fill="white">SCIENCE &amp; ARENA</text>

  <!-- Title -->
  <text x="48" y="550" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="white" filter="url(#textShadow)" letter-spacing="-1">
    <tspan x="48" dy="0">Mike&apos;s Rooftop Paradise: A</tspan>
    <tspan x="48" dy="50">Weval-Inspired Arena Session</tspan>
  </text>

  <!-- spike.land watermark -->
  <text x="1152" y="606" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#fb7185" opacity="0.6" text-anchor="end">spike.land</text>
