<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080818"/>
      <stop offset="100%" stop-color="#0a0a20"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e63946"/>
      <stop offset="50%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#e63946"/>
    </linearGradient>
    <linearGradient id="legal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ecdc4"/>
      <stop offset="100%" stop-color="#2a9d8f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines (legal paper effect) -->
  <g opacity="0.03">
    <line x1="100" y1="0" x2="100" y2="630" stroke="#e63946" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="1200" y2="80" stroke="#fff" stroke-width="0.3"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#fff" stroke-width="0.3"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke="#fff" stroke-width="0.3"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="0.3"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#fff" stroke-width="0.3"/>
    <line x1="0" y1="280" x2="1200" y2="280" stroke="#fff" stroke-width="0.3"/>
    <line x1="0" y1="320" x2="1200" y2="320" stroke="#fff" stroke-width="0.3"/>
    <line x1="0" y1="360" x2="1200" y2="360" stroke="#fff" stroke-width="0.3"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="0.3"/>
    <line x1="0" y1="440" x2="1200" y2="440" stroke="#fff" stroke-width="0.3"/>
    <line x1="0" y1="480" x2="1200" y2="480" stroke="#fff" stroke-width="0.3"/>
    <line x1="0" y1="520" x2="1200" y2="520" stroke="#fff" stroke-width="0.3"/>
    <line x1="0" y1="560" x2="1200" y2="560" stroke="#fff" stroke-width="0.3"/>
  </g>

  <!-- Document fragment effect - torn paper pieces -->
  <g opacity="0.06">
    <rect x="200" y="100" width="300" height="400" fill="#fff" transform="rotate(-5 350 300)"/>
    <rect x="700" y="80" width="280" height="420" fill="#fff" transform="rotate(3 840 290)"/>
    <rect x="450" y="150" width="250" height="350" fill="#fff" transform="rotate(-2 575 325)"/>
  </g>

  <!-- SECTION 8 large watermark -->
  <text x="600" y="350" text-anchor="middle" font-family="monospace" font-size="200" font-weight="900" fill="#e63946" opacity="0.04">S.8</text>

  <!-- Heartbeat line running through -->
  <polyline fill="none" stroke="url(#pulse)" stroke-width="2" filter="url(#glow)" opacity="0.6"
    points="0,315 100,315 150,315 170,315 180,280 190,360 200,300 210,330 220,315 280,315 350,315 370,315 380,280 390,360 400,300 410,330 420,315 500,315 600,315 620,315 630,275 640,370 650,290 660,340 670,315 750,315 850,315 870,315 880,270 890,375 900,285 910,345 920,315 1000,315 1100,315 1120,315 1130,280 1140,360 1150,300 1160,330 1170,315 1200,315"/>

  <!-- Title -->
  <text x="600" y="200" text-anchor="middle" font-family="monospace" font-size="52" font-weight="900" fill="#e63946" filter="url(#glow2)">THE SECTION 8</text>

  <!-- Subtitle -->
  <text x="600" y="240" text-anchor="middle" font-family="monospace" font-size="14" fill="#4ecdc4" letter-spacing="8" opacity="0.7">MATH ARENA DECONSTRUCTION</text>

  <!-- Status boxes -->
  <g font-family="monospace" font-size="11" letter-spacing="2">
    <rect x="150" y="440" width="180" height="30" rx="4" fill="none" stroke="#e63946" stroke-width="1" opacity="0.4"/>
    <text x="240" y="460" text-anchor="middle" fill="#e63946" opacity="0.7">GROUND 12: DISCRETIONARY</text>

    <rect x="370" y="440" width="180" height="30" rx="4" fill="none" stroke="#e63946" stroke-width="1" opacity="0.4"/>
    <text x="460" y="460" text-anchor="middle" fill="#e63946" opacity="0.7">GROUND 14: DISCRETIONARY</text>

    <rect x="590" y="440" width="180" height="30" rx="4" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
    <text x="680" y="460" text-anchor="middle" fill="#FFD700" opacity="0.7">STATUS: SECTIONED</text>

    <rect x="810" y="440" width="180" height="30" rx="4" fill="none" stroke="#4ecdc4" stroke-width="1" opacity="0.4"/>
    <text x="900" y="460" text-anchor="middle" fill="#4ecdc4" opacity="0.7">OUTCOME: NOT YET DECIDED</text>
  </g>

  <!-- Bottom line -->
  <text x="600" y="550" text-anchor="middle" font-family="monospace" font-size="13" fill="#4ecdc4" opacity="0.5" letter-spacing="3">DISCRETIONARY MEANS DISCRETIONARY</text>
  <text x="600" y="575" text-anchor="middle" font-family="monospace" font-size="10" fill="#ffffff" opacity="0.2" letter-spacing="4">THE COURT WILL HEAR YOUR SIDE</text>
</svg>
