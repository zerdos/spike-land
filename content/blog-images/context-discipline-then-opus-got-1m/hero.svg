<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#042f2e" />
      <stop offset="100%" stop-color="#134e4a" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#042f2e" flood-opacity="0.8" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Generative shapes -->
  <circle cx="705.3" cy="480.1" r="162.8" fill="#5eead4" opacity="0.12" />
<circle cx="1118.2" cy="399.6" r="52.2" fill="#0d9488" opacity="0.14" />
<circle cx="36.7" cy="546.0" r="72.9" fill="#2dd4bf" opacity="0.20" />
<circle cx="793.2" cy="262.9" r="144.5" fill="#5eead4" opacity="0.15" />
<circle cx="1131.3" cy="376.1" r="128.8" fill="#0d9488" opacity="0.25" />
<circle cx="716.0" cy="79.7" r="188.9" fill="#14b8a6" opacity="0.14" />
<circle cx="96.8" cy="113.2" r="147.9" fill="#5eead4" opacity="0.11" />
<circle cx="873.0" cy="373.3" r="66.8" fill="#5eead4" opacity="0.09" />
<circle cx="816.3" cy="61.1" r="69.1" fill="#14b8a6" opacity="0.13" />
<circle cx="556.4" cy="207.2" r="45.1" fill="#14b8a6" opacity="0.09" />
<circle cx="129.1" cy="560.9" r="134.6" fill="#2dd4bf" opacity="0.21" />
<circle cx="607.8" cy="219.9" r="110.2" fill="#0d9488" opacity="0.21" />
<circle cx="388.4" cy="612.9" r="93.0" fill="none" stroke="#0d9488" stroke-width="2.8" opacity="0.15" />
<circle cx="1135.2" cy="322.3" r="146.6" fill="none" stroke="#14b8a6" stroke-width="1.7" opacity="0.15" />
<circle cx="910.4" cy="323.2" r="129.5" fill="none" stroke="#0d9488" stroke-width="1.4" opacity="0.23" />
<circle cx="499.1" cy="180.3" r="107.3" fill="none" stroke="#14b8a6" stroke-width="1.0" opacity="0.35" />
<circle cx="924.5" cy="544.2" r="80.0" fill="none" stroke="#0d9488" stroke-width="2.9" opacity="0.16" />


  <!-- Vignette -->
  <rect width="1200" height="630" fill="url(#bg)" opacity="0.3" />

  <!-- Category badge -->
  <rect x="48" y="40" width="124" height="28" rx="14" fill="#0d9488" opacity="0.9" />
  <text x="60" y="59" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5" text-transform="uppercase" fill="white">AI &amp; TOOLS</text>

  <!-- Title -->
  <text x="48" y="550" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="white" filter="url(#textShadow)" letter-spacing="-1">
    <tspan x="48" dy="0">We Said Context Discipline Beats</tspan>
    <tspan x="48" dy="50">Context Size. Then Opus Got 1M.</tspan>
  </text>

  <!-- spike.land watermark -->
  <text x="1152" y="606" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#2dd4bf" opacity="0.6" text-anchor="end">spike.land</text>
