<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#042f2e" />
      <stop offset="100%" stop-color="#134e4a" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#042f2e" flood-opacity="0.8" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Generative shapes -->
  <circle cx="1106.4" cy="624.3" r="194.4" fill="#2dd4bf" opacity="0.12" />
<circle cx="1184.5" cy="448.6" r="149.0" fill="#14b8a6" opacity="0.19" />
<circle cx="332.4" cy="461.6" r="150.8" fill="#14b8a6" opacity="0.23" />
<circle cx="528.5" cy="508.0" r="42.8" fill="#14b8a6" opacity="0.20" />
<circle cx="135.9" cy="281.4" r="130.8" fill="#2dd4bf" opacity="0.10" />
<circle cx="798.2" cy="504.2" r="52.4" fill="#0d9488" opacity="0.17" />
<circle cx="525.7" cy="500.4" r="197.1" fill="#5eead4" opacity="0.19" />
<circle cx="616.8" cy="410.2" r="196.5" fill="#5eead4" opacity="0.20" />
<circle cx="195.6" cy="88.0" r="159.4" fill="#2dd4bf" opacity="0.22" />
<circle cx="776.8" cy="301.9" r="202.1" fill="#0d9488" opacity="0.19" />
<circle cx="624.6" cy="160.0" r="91.3" fill="#2dd4bf" opacity="0.21" />
<circle cx="1095.2" cy="127.1" r="106.9" fill="#5eead4" opacity="0.19" />
<circle cx="237.6" cy="169.0" r="143.6" fill="none" stroke="#0d9488" stroke-width="2.0" opacity="0.16" />
<circle cx="891.1" cy="417.7" r="53.2" fill="none" stroke="#14b8a6" stroke-width="1.5" opacity="0.25" />
<circle cx="730.1" cy="482.4" r="77.5" fill="none" stroke="#14b8a6" stroke-width="2.3" opacity="0.42" />
<circle cx="993.9" cy="122.4" r="115.1" fill="none" stroke="#0d9488" stroke-width="3.0" opacity="0.17" />
<circle cx="1177.1" cy="233.5" r="148.5" fill="none" stroke="#14b8a6" stroke-width="2.5" opacity="0.39" />


  <!-- Vignette -->
  <rect width="1200" height="630" fill="url(#bg)" opacity="0.3" />

  <!-- Category badge -->
  <rect x="48" y="40" width="64" height="28" rx="14" fill="#0d9488" opacity="0.9" />
  <text x="60" y="59" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5" text-transform="uppercase" fill="white">LIFE</text>

  <!-- Title -->
  <text x="48" y="550" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="white" filter="url(#textShadow)" letter-spacing="-1">
    <tspan x="48" dy="0">The Russian Girl</tspan>
  </text>

  <!-- spike.land watermark -->
  <text x="1152" y="606" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#2dd4bf" opacity="0.6" text-anchor="end">spike.land</text>
</svg>