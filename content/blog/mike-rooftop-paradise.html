<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mike's Rooftop Paradise</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#0a0a1a;--mike:#e8a87c;--arnold:#d4956b;--zoltan:#7eb8c9;--peter:#a8d4a0;
    --gold:#FFD700;--panel:rgba(255,255,255,.04);--border:rgba(255,255,255,.08);
    --text:rgba(255,255,255,.7);--teal:#2a9d8f;
  }
  html{scroll-behavior:smooth}
  body{background:linear-gradient(180deg,#0a0a1a 0%,#1a1230 30%,#1e1535 60%,#12121e 100%);
    color:#eee;font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;top:0;left:0;right:0;height:50vh;
    background:linear-gradient(180deg,rgba(232,168,124,.06) 0%,rgba(126,184,201,.03) 50%,transparent 100%);
    pointer-events:none;z-index:0}

  .app{position:relative;z-index:3;max-width:600px;margin:0 auto;padding:1rem}

  .header{text-align:center;padding:1.5rem 0 0.5rem}
  .header h1{
    font-family:'Orbitron',sans-serif;font-size:clamp(1.4rem,7vw,2.2rem);font-weight:900;
    background:linear-gradient(135deg,var(--mike),var(--zoltan),var(--peter),var(--arnold));
    background-size:400% 400%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;animation:warmShimmer 10s ease infinite;
  }
  .header .sub{font-size:0.75rem;color:var(--mike);opacity:0.5;margin-top:0.2rem;font-weight:300}
  .header .place{font-size:0.6rem;color:var(--zoltan);opacity:0.35;margin-top:0.15rem;letter-spacing:2px}
  @keyframes warmShimmer{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

  .transport{display:flex;align-items:center;justify-content:center;gap:0.8rem;margin:1rem 0}
  .play-btn{
    width:64px;height:64px;border-radius:50%;border:2px solid var(--mike);background:rgba(232,168,124,.06);
    color:var(--mike);font-size:1.6rem;display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:all .3s;touch-action:manipulation;
  }
  .play-btn:active{transform:scale(0.9);background:rgba(232,168,124,.2)}
  .play-btn.on{border-color:var(--zoltan);color:var(--zoltan);background:rgba(126,184,201,.06);animation:breathe 4s ease infinite}
  @keyframes breathe{0%,100%{box-shadow:0 0 0 0 rgba(126,184,201,.15)}50%{box-shadow:0 0 24px 6px rgba(126,184,201,.1)}}

  .skip-btn{
    width:44px;height:44px;border-radius:50%;border:1px solid var(--border);background:transparent;
    color:var(--text);font-size:1.1rem;display:flex;align-items:center;justify-content:center;
    cursor:pointer;touch-action:manipulation;transition:all .2s;
  }
  .skip-btn:active{transform:scale(0.9);background:rgba(255,255,255,.04)}

  .transport-info{font-size:0.65rem;color:var(--zoltan);opacity:0.4;text-align:center;letter-spacing:1px;margin-top:0.3rem}

  .rounds{display:flex;justify-content:center;gap:5px;margin:0.6rem 0}
  .rdot{width:20px;height:20px;border-radius:50%;border:1px solid var(--border);transition:all .3s;
    cursor:pointer;touch-action:manipulation;display:flex;align-items:center;justify-content:center;
    font-size:0.45rem;color:rgba(255,255,255,.15)}
  .rdot:active{transform:scale(1.3)}
  .rdot.done{background:var(--teal);border-color:var(--teal);box-shadow:0 0 4px rgba(42,157,143,.3);color:transparent}
  .rdot.now{background:var(--gold);border-color:var(--gold);box-shadow:0 0 8px rgba(255,215,0,.4);transform:scale(1.2);color:transparent}

  .personas-strip{display:flex;justify-content:center;gap:0.5rem;margin:0.5rem 0;flex-wrap:wrap}
  .ps{font-size:0.6rem;padding:4px 10px;border-radius:8px;border:1px solid var(--border);color:rgba(255,255,255,.3);transition:all .3s}
  .ps.active{color:#fff;font-weight:600}
  .ps.mike.active{border-color:var(--mike);color:var(--mike);background:rgba(232,168,124,.08)}
  .ps.arnold.active{border-color:var(--arnold);color:var(--arnold);background:rgba(212,149,107,.08)}
  .ps.zoltan.active{border-color:var(--zoltan);color:var(--zoltan);background:rgba(126,184,201,.08)}
  .ps.peter.active{border-color:var(--peter);color:var(--peter);background:rgba(168,212,160,.08)}

  .bin-chooser{display:flex;justify-content:center;gap:0.4rem;margin:0.8rem 0;flex-wrap:wrap}
  .bin-btn{
    font-size:0.6rem;padding:6px 12px;border-radius:10px;border:1px solid var(--border);
    color:rgba(255,255,255,.35);cursor:pointer;touch-action:manipulation;transition:all .2s;
  }
  .bin-btn:active{transform:scale(0.95)}
  .bin-btn.sel{border-color:var(--teal);color:var(--teal);background:rgba(42,157,143,.06)}
  .bin-label{font-size:0.55rem;color:var(--teal);opacity:0.4;text-align:center;margin-bottom:0.3rem;letter-spacing:2px}

  .anno{
    padding:1rem;background:var(--panel);border:1px solid var(--border);border-radius:14px;
    margin:0.8rem 0;font-size:0.85rem;line-height:1.8;color:var(--text);animation:fadeIn .4s ease;
    min-height:60px;
  }
  .anno .who{font-weight:600;font-size:0.7rem;margin-bottom:0.3rem;letter-spacing:1px}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

  .vis{display:flex;justify-content:center;align-items:flex-end;gap:2px;height:40px;margin:0.5rem 0}
  .vis-bar{width:6px;border-radius:3px 3px 0 0;background:var(--zoltan);opacity:0.3;transition:height .15s,opacity .15s}
  .vis-bar.active{opacity:0.7}

  .footer{text-align:center;padding:2rem 0 3rem;border-top:1px solid var(--border);margin-top:1.5rem}
  .footer .tag{font-size:0.85rem;color:var(--zoltan);font-weight:300;line-height:1.5}
  .footer .cr{font-size:0.55rem;color:rgba(255,255,255,.12);letter-spacing:2px;margin-top:0.4rem}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const {useState,useCallback,useRef,useEffect}=React;

// ========================================================================
// MIKE'S ROOFTOP PARADISE — 8 rounds, 4 personas, dreamy/melancholic
// ========================================================================

const BPM=96, BEAT=60/BPM, STEP=BEAT/4;
const TOTAL_ROUNDS=8, BARS_PER_ROUND=4, STEPS_PER_BAR=16;
const TOTAL_BARS=TOTAL_ROUNDS*BARS_PER_ROUND; // 32
const H=8,Q=4,E=2,S=1;

// Dreamy bittersweet chords — major 7ths + sus4
const CHORDS={
  Cmaj7: [48,60,64,67,71],   // C3 C4 E4 G4 B4
  Am9:   [45,57,60,64,71],   // A2 A3 C4 E4 B4
  Fmaj7: [41,53,60,65,69],   // F2 F3 C4 F4 A4
  Gsus4: [43,55,60,65,67],   // G2 G3 C4 F4 G4
};
const PROG=['Cmaj7','Am9','Fmaj7','Gsus4'];

// === PERSONA MELODIES ===

// Mike — warm, simple, root-fifth pad movement
const MIKE_A=[[60,H],[67,H],[64,Q],[60,Q],[0,H]];          // C--G--E-C-....
const MIKE_B=[[60,H],[65,H],[64,H],[0,H]];                 // C--F--E--....

// Arnold — deep, powerful, octave bass hits with space
const ARNOLD_A=[[36,H],[0,Q],[43,Q],[36,H],[0,H]];         // C2---.G2-C2---....
const ARNOLD_B=[[36,Q],[36,E],[0,E],[41,H],[43,Q],[0,Q]];  // C2-C2..F2---G2-....

// Zoltan — floating bells, high register, sparse
const ZOLTAN_A=[[79,H+Q],[0,E],[76,E],[72,H],[0,H]];       // G5----.E5.C5--....
const ZOLTAN_B=[[84,H],[0,Q],[81,Q],[79,Q],[76,Q],[0,H]];  // C6---.A5-G5-E5-....

// Peter — bouncy, playful plucks
const PETER_A=[[72,E],[0,E],[76,E],[74,E],[72,Q],[69,E],[67,E],[0,Q]]; // C..E.D.C-A.G.....
const PETER_B=[[74,E],[76,E],[79,Q],[76,E],[72,E],[0,Q],[69,Q]];       // D.E.G--E.C...A-

const AABA=[0,0,1,0]; // phrase form index

const BINAURAL_MODES=[
  {name:'OFF',hz:0,desc:'disabled',lFreq:0,rFreq:0},
  {name:'ALPHA',hz:10,desc:'10Hz \u2014 calm focus',lFreq:200,rFreq:210},
  {name:'THETA',hz:6,desc:'6Hz \u2014 deep relax',lFreq:200,rFreq:206},
  {name:'DELTA',hz:2,desc:'2Hz \u2014 deep sleep',lFreq:200,rFreq:202},
  {name:'BETA',hz:15,desc:'15Hz \u2014 alert',lFreq:200,rFreq:215},
];

const PERSONAS=[
  {id:'mike',name:'MIKE',color:'var(--mike)',icon:'\u{1F3D7}'},
  {id:'arnold',name:'ARNOLD',color:'var(--arnold)',icon:'\u{1F3D4}'},
  {id:'zoltan',name:'ZOLT\u00C1N',color:'var(--zoltan)',icon:'\u{1F319}'},
  {id:'peter',name:'PETER',color:'var(--peter)',icon:'\u{1F33F}'},
];

// 8 rounds — each defines which layers are active
const ROUNDS=[
  {p:'mike',   layers:['mikePad'],
   note:'A single chord. Warmth rising from the rooftop tiles. Mike lays the foundation \u2014 everything starts here.'},
  {p:'zoltan', layers:['mikePad','zoltanBell'],
   note:'Floating bell tones appear above the pad like stars switching on at dusk. Zolt\u00e1n\u2019s notes hang in the air and dissolve.'},
  {p:'peter',  layers:['mikePad','zoltanBell','peterPluck','kick'],
   note:'Peter brings the rhythm. Playful, syncopated, like footsteps on a rooftop. The kick is a heartbeat underneath.'},
  {p:'arnold', layers:['mikePad','arnoldBass','zoltanBell','peterPluck','kick'],
   note:'Arnold\u2019s bass drops in \u2014 deep, thick, grounding. You feel it in your chest. The four voices are now complete.'},
  {p:'zoltan', layers:['mikePad','mikePadDouble','arnoldBass','zoltanBell','zoltanPad','peterPluck','kick','hat'],
   note:'Everything opens. The delay spreads each note into infinity. Double pads shimmer. This is the sunset moment \u2014 golden, wide, euphoric.'},
  {p:'peter',  layers:['mikePad','peterPluck'],
   note:'Strip it back. Just the pad and Peter\u2019s pluck. The bittersweet moment \u2014 knowing something beautiful is temporary.'},
  {p:'arnold', layers:['mikePad','arnoldBass','zoltanBell','peterPluck','kick'],
   note:'Everything returns, gently. Arnold\u2019s bass is the friend who says "I\u2019m still here." The warmth rebuilds.'},
  {p:'mike',   layers:['mikePad','zoltanBell'],
   note:'Fading back to where we started. Pad and bells. The rooftop at night. The city below. It loops because the rooftop is forever.'},
];

// Intensity per round
const INTENSITY=[0.2, 0.35, 0.5, 0.7, 1.0, 0.25, 0.65, 0.2];

function useRooftopEngine(){
  const ctxRef=useRef(null);
  const masterRef=useRef(null);
  const compRef=useRef(null);
  const filterRef=useRef(null);
  const delayRef=useRef(null);
  const delayFbRef=useRef(null);
  const binLRef=useRef(null);
  const binRRef=useRef(null);
  const binGainRef=useRef(null);
  const playingRef=useRef(false);
  const schedRef=useRef(null);
  const stepRef=useRef(-1);
  const startRef=useRef(0);

  const midi2freq=useCallback((n)=>440*Math.pow(2,(n-69)/12),[]);

  const init=useCallback(()=>{
    if(ctxRef.current)return;
    const c=new(AudioContext||webkitAudioContext)();ctxRef.current=c;

    const comp=c.createDynamicsCompressor();comp.threshold.value=-12;comp.ratio.value=4;comp.connect(c.destination);compRef.current=comp;

    const filt=c.createBiquadFilter();filt.type='lowpass';filt.frequency.value=4000;filt.Q.value=0.5;filterRef.current=filt;

    const del=c.createDelay(1.5);del.delayTime.value=BEAT*0.75;delayRef.current=del;
    const dfb=c.createGain();dfb.gain.value=0;delayFbRef.current=dfb;
    const dFilt=c.createBiquadFilter();dFilt.type='lowpass';dFilt.frequency.value=2000;
    del.connect(dFilt);dFilt.connect(dfb);dfb.connect(del);del.connect(comp);

    const m=c.createGain();m.gain.value=0.4;m.connect(filt);filt.connect(comp);filt.connect(del);masterRef.current=m;

    // Binaural — independent
    const bg=c.createGain();bg.gain.value=0;binGainRef.current=bg;
    const merger=c.createChannelMerger(2);
    const oL=c.createOscillator();oL.type='sine';oL.frequency.value=200;binLRef.current=oL;
    const oR=c.createOscillator();oR.type='sine';oR.frequency.value=210;binRRef.current=oR;
    const gL=c.createGain();gL.gain.value=1;const gR=c.createGain();gR.gain.value=1;
    oL.connect(gL);gL.connect(merger,0,0);oR.connect(gR);gR.connect(merger,0,1);
    merger.connect(bg);bg.connect(c.destination);
    oL.start();oR.start();
  },[]);

  const setBinaural=useCallback((mode)=>{
    if(!ctxRef.current){
      const c=new(AudioContext||webkitAudioContext)();ctxRef.current=c;
      if(!binGainRef.current){
        const bg=c.createGain();bg.gain.value=0;binGainRef.current=bg;
        const merger=c.createChannelMerger(2);
        const oL=c.createOscillator();oL.type='sine';oL.frequency.value=200;binLRef.current=oL;
        const oR=c.createOscillator();oR.type='sine';oR.frequency.value=210;binRRef.current=oR;
        const gL=c.createGain();gL.gain.value=1;const gR=c.createGain();gR.gain.value=1;
        oL.connect(gL);gL.connect(merger,0,0);oR.connect(gR);gR.connect(merger,0,1);
        merger.connect(bg);bg.connect(c.destination);
        oL.start();oR.start();
      }
    }
    const c=ctxRef.current;
    if(c.state==='suspended')c.resume();
    if(!binLRef.current||!binGainRef.current)return;
    const bm=BINAURAL_MODES[mode]||BINAURAL_MODES[0];
    const t=c.currentTime;
    if(bm.hz===0){
      binGainRef.current.gain.setTargetAtTime(0,t,0.3);
    }else{
      binLRef.current.frequency.setTargetAtTime(bm.lFreq,t,0.3);
      binRRef.current.frequency.setTargetAtTime(bm.rFreq,t,0.3);
      binGainRef.current.gain.setTargetAtTime(0.05,t,0.3);
    }
  },[]);

  // === MIKE'S INSTRUMENTS ===

  // Mike Pad — warm sine+triangle, LP 800, slow attack
  const mikePad=useCallback((t,notes,dur)=>{
    const c=ctxRef.current;if(!c)return;
    notes.forEach(n=>{
      if(n<30)return; // skip very low notes for pad
      const o=c.createOscillator();o.type='sine';o.frequency.value=midi2freq(n);
      const o2=c.createOscillator();o2.type='triangle';o2.frequency.value=midi2freq(n)*1.003;
      const g=c.createGain();g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.035,t+1.0);
      g.gain.setValueAtTime(0.035,t+dur-1.2);
      g.gain.linearRampToValueAtTime(0,t+dur);
      const f=c.createBiquadFilter();f.type='lowpass';f.frequency.value=800;f.Q.value=0.5;
      o.connect(f);o2.connect(f);f.connect(g).connect(masterRef.current);
      o.start(t);o.stop(t+dur+0.1);o2.start(t);o2.stop(t+dur+0.1);
    });
  },[midi2freq]);

  // Arnold Bass — thick detuned sawtooth, LP 600, deep
  const arnoldBass=useCallback((t,note,dur)=>{
    const c=ctxRef.current;if(!c)return;
    const freq=midi2freq(note);
    const o=c.createOscillator();o.type='sawtooth';o.frequency.value=freq;
    const o2=c.createOscillator();o2.type='sawtooth';o2.frequency.value=freq*1.006; // 8 cents detune
    const o3=c.createOscillator();o3.type='sine';o3.frequency.value=freq*0.5; // sub octave
    const g=c.createGain();g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.18,t+0.08);
    g.gain.setValueAtTime(0.18,t+dur*0.4);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    const f=c.createBiquadFilter();f.type='lowpass';f.frequency.value=600;f.Q.value=0.7;
    o.connect(f);o2.connect(f);o3.connect(f);f.connect(g).connect(masterRef.current);
    o.start(t);o.stop(t+dur+0.1);o2.start(t);o2.stop(t+dur+0.1);o3.start(t);o3.stop(t+dur+0.1);
  },[midi2freq]);

  // Zoltan Bell — sine + FM, bandpass 2000, long release
  const zoltanBell=useCallback((t,note,dur)=>{
    if(!note||note===0)return;
    const c=ctxRef.current;if(!c)return;
    const freq=midi2freq(note);
    const mod=c.createOscillator();mod.type='sine';mod.frequency.value=freq*2.01; // FM ratio ~2
    const modG=c.createGain();modG.gain.value=freq*0.8; // FM depth
    mod.connect(modG);
    const o=c.createOscillator();o.type='sine';o.frequency.value=freq;
    modG.connect(o.frequency); // FM synthesis
    const g=c.createGain();g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.07,t+0.08);
    g.gain.setValueAtTime(0.07,t+dur*0.3);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur+1.5); // very long release
    const f=c.createBiquadFilter();f.type='bandpass';f.frequency.value=2000;f.Q.value=2.5;
    o.connect(f);f.connect(g).connect(masterRef.current);
    o.start(t);o.stop(t+dur+1.6);mod.start(t);mod.stop(t+dur+1.6);
  },[midi2freq]);

  // Zoltan Pad — stereo detuned sine, ethereal shimmer
  const zoltanPad=useCallback((t,notes,dur)=>{
    const c=ctxRef.current;if(!c)return;
    notes.forEach(n=>{
      if(n<50)return;
      const freq=midi2freq(n);
      const o=c.createOscillator();o.type='sine';o.frequency.value=freq*0.996; // -7 cents
      const o2=c.createOscillator();o2.type='sine';o2.frequency.value=freq*1.004; // +7 cents
      // Slow wobble LFO
      const lfo=c.createOscillator();lfo.type='sine';lfo.frequency.value=0.3;
      const lfoG=c.createGain();lfoG.gain.value=2;
      lfo.connect(lfoG).connect(o.frequency);
      const g=c.createGain();g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.025,t+1.5);
      g.gain.setValueAtTime(0.025,t+dur-1.5);
      g.gain.linearRampToValueAtTime(0,t+dur);
      const f=c.createBiquadFilter();f.type='lowpass';f.frequency.value=1600;f.Q.value=0.5;
      o.connect(f);o2.connect(f);f.connect(g).connect(masterRef.current);
      o.start(t);o.stop(t+dur+0.1);o2.start(t);o2.stop(t+dur+0.1);lfo.start(t);lfo.stop(t+dur+0.1);
    });
  },[midi2freq]);

  // Peter Pluck — square wave, LP 4500, fast attack/decay (marimba-like)
  const peterPluck=useCallback((t,note,dur)=>{
    if(!note||note===0)return;
    const c=ctxRef.current;if(!c)return;
    const freq=midi2freq(note);
    const o=c.createOscillator();o.type='square';o.frequency.value=freq;
    const o2=c.createOscillator();o2.type='square';o2.frequency.value=freq*1.005;
    const g=c.createGain();
    g.gain.setValueAtTime(0.06,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+Math.min(dur,0.35));
    const f=c.createBiquadFilter();f.type='lowpass';f.frequency.value=4500;f.Q.value=1.5;
    o.connect(f);o2.connect(f);f.connect(g).connect(masterRef.current);
    o.start(t);o.stop(t+0.4);o2.start(t);o2.stop(t+0.4);
  },[midi2freq]);

  // Soft kick
  const kick=useCallback((t)=>{
    const c=ctxRef.current;if(!c)return;
    const o=c.createOscillator();const g=c.createGain();
    o.frequency.setValueAtTime(100,t);o.frequency.exponentialRampToValueAtTime(35,t+0.15);
    g.gain.setValueAtTime(0.4,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
    o.connect(g).connect(compRef.current);o.start(t);o.stop(t+0.4);
  },[]);

  // Soft hat
  const hat=useCallback((t)=>{
    const c=ctxRef.current;if(!c)return;
    const buf=c.createBuffer(1,c.sampleRate*0.015,c.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,6)*0.15;
    const src=c.createBufferSource();src.buffer=buf;
    const g=c.createGain();g.gain.value=0.025;
    const hp=c.createBiquadFilter();hp.type='highpass';hp.frequency.value=8000;
    src.connect(hp).connect(g).connect(masterRef.current);src.start(t);src.stop(t+0.02);
  },[]);

  // === phraseSteps helper ===
  function phraseSteps(phrase){
    const steps=[];let cum=0;
    for(const [note,dur] of phrase){steps.push({note,dur,start:cum});cum+=dur;}
    return steps;
  }

  // === SCHEDULER ===
  const schedule=useCallback(()=>{
    if(!playingRef.current)return;
    const c=ctxRef.current;
    const now=c.currentTime,elapsed=now-startRef.current;
    const sn=Math.floor(elapsed/STEP);
    if(sn<=stepRef.current){schedRef.current=setTimeout(schedule,8);return}
    stepRef.current=sn;
    const t=startRef.current+sn*STEP;
    const pos=sn%STEPS_PER_BAR;
    const bar=Math.floor(sn/STEPS_PER_BAR);
    const loopBar=bar%TOTAL_BARS;
    const round=Math.floor(loopBar/BARS_PER_ROUND);
    const barInRound=loopBar%BARS_PER_ROUND;
    const formIdx=AABA[barInRound]; // 0=A phrase, 1=B phrase

    const cfg=ROUNDS[round];
    const layers=cfg.layers;
    const intens=INTENSITY[round];

    // Chord for this bar
    const chordName=PROG[barInRound];
    const chord=CHORDS[chordName];
    const bassRoot=chord[0]; // lowest note in voicing

    // Master volume — smooth, never silent
    if(masterRef.current){
      const vol=0.25+intens*0.2;
      masterRef.current.gain.setTargetAtTime(vol,t,0.5);
    }

    // Filter follows intensity
    if(filterRef.current){
      filterRef.current.frequency.setTargetAtTime(1500+intens*5000,t,0.3);
    }

    // Delay feedback — opens at higher intensity
    if(delayFbRef.current){
      delayFbRef.current.gain.setTargetAtTime(intens>0.6?0.2+intens*0.15:0.05,t,0.3);
    }

    // === PAD (Mike) ===
    if(layers.includes('mikePad')&&pos===0&&barInRound===0){
      const padNotes=chord.filter(n=>n>=48); // skip bass notes for pad
      mikePad(t,padNotes,STEP*STEPS_PER_BAR*BARS_PER_ROUND);
    }

    // === DOUBLE PAD (Mike shimmer) ===
    if(layers.includes('mikePadDouble')&&pos===0&&barInRound===0){
      const padNotes=chord.filter(n=>n>=48).map(n=>n+0.15);
      mikePad(t,padNotes,STEP*STEPS_PER_BAR*BARS_PER_ROUND);
    }

    // === BASS (Arnold) ===
    if(layers.includes('arnoldBass')&&pos===0){
      const phrases=[ARNOLD_A,ARNOLD_B];
      const phrase=phrases[formIdx];
      const steps=phraseSteps(phrase);
      for(const s of steps){
        if(0===s.start){
          // Schedule all notes in this bar's phrase
          for(const ns of steps){
            if(ns.note&&ns.note>0){
              arnoldBass(t+ns.start*STEP,ns.note,STEP*ns.dur*0.9);
            }
          }
          break;
        }
      }
    }

    // === BELL (Zoltan) ===
    if(layers.includes('zoltanBell')){
      const phrases=[ZOLTAN_A,ZOLTAN_B];
      const phrase=phrases[formIdx];
      const steps=phraseSteps(phrase);
      for(const s of steps){
        if(pos===s.start){
          zoltanBell(t,s.note,STEP*s.dur*0.95);
        }
      }
    }

    // === ETHEREAL PAD (Zoltan) ===
    if(layers.includes('zoltanPad')&&pos===0&&barInRound===0){
      const padNotes=chord.filter(n=>n>=55);
      zoltanPad(t,padNotes,STEP*STEPS_PER_BAR*BARS_PER_ROUND);
    }

    // === PLUCK (Peter) ===
    if(layers.includes('peterPluck')){
      const phrases=[PETER_A,PETER_B];
      const phrase=phrases[formIdx];
      const steps=phraseSteps(phrase);
      for(const s of steps){
        if(pos===s.start){
          peterPluck(t,s.note,STEP*s.dur);
        }
      }
    }

    // === KICK ===
    if(layers.includes('kick')){
      if(pos===0||pos===8)kick(t);
    }

    // === HAT ===
    if(layers.includes('hat')){
      if(pos%4===2&&Math.random()<0.5)hat(t);
      if(pos%2===0&&Math.random()<0.3)hat(t);
    }

    // Round 8 (index 7) fade for seamless loop
    if(round===7&&barInRound>=2){
      const fade=1-((barInRound-2)/2)*0.3;
      if(masterRef.current)masterRef.current.gain.setTargetAtTime(Math.max(0.15,0.3*fade),t,0.5);
    }

    schedRef.current=setTimeout(schedule,8);
    return{round,pos,bar:loopBar,intens};
  },[mikePad,arnoldBass,zoltanBell,zoltanPad,peterPluck,kick,hat,midi2freq]);

  // Skip to specific round
  const skipToRound=useCallback((targetRound)=>{
    if(!ctxRef.current)return;
    const c=ctxRef.current;
    const targetStep=targetRound*BARS_PER_ROUND*STEPS_PER_BAR;
    const now=c.currentTime;
    startRef.current=now-(targetStep*STEP);
    stepRef.current=targetStep-1;
  },[]);

  const toggle=useCallback(()=>{
    init();
    const c=ctxRef.current;if(c.state==='suspended')c.resume();
    if(!playingRef.current){
      playingRef.current=true;
      startRef.current=c.currentTime+0.05;
      stepRef.current=-1;
      schedule();return true;
    }else{
      playingRef.current=false;
      if(schedRef.current)clearTimeout(schedRef.current);return false;
    }
  },[init,schedule]);

  const stop=useCallback(()=>{
    playingRef.current=false;
    if(schedRef.current)clearTimeout(schedRef.current);
  },[]);

  return{toggle,stop,setBinaural,skipToRound,ctxRef,startRef,stepRef,playingRef};
}

// ========================================================================
// APP
// ========================================================================
function App(){
  const [binMode,setBinMode]=useState(0);
  const engine=useRooftopEngine();
  const [playing,setPlaying]=useState(false);
  const [round,setRound]=useState(0);

  useEffect(()=>{
    if(!playing)return;
    const iv=setInterval(()=>{
      if(!engine.ctxRef.current||!engine.playingRef.current)return;
      const elapsed=engine.ctxRef.current.currentTime-engine.startRef.current;
      const bar=Math.floor(elapsed/(STEP*STEPS_PER_BAR));
      const loopBar=bar%TOTAL_BARS;
      const r=Math.floor(loopBar/BARS_PER_ROUND);
      setRound(r);
    },200);
    return()=>clearInterval(iv);
  },[playing,engine]);

  const activePersona=ROUNDS[round]?.p||'mike';
  const pObj=PERSONAS.find(p=>p.id===activePersona);

  // Simple visualizer bars
  const visBars=16;

  return <div className="app">
    <div className="header">
      <h1>ROOFTOP PARADISE</h1>
      <div className="sub">Mike &bull; Arnold &bull; Zolt&aacute;n &bull; Peter</div>
      <div className="place">THE MUSIC ARENA &bull; 8 ROUNDS</div>
    </div>

    <div className="transport">
      <div className={`play-btn${playing?' on':''}`} onClick={()=>{const p=engine.toggle();setPlaying(p);if(!p)setRound(0);}}>
        {playing?'\u23F8':'\u25B6'}
      </div>
      <div className="skip-btn" onClick={()=>{
        if(!playing)return;
        const next=(round+1)%TOTAL_ROUNDS;
        engine.skipToRound(next);
        setRound(next);
      }}>{'\u23ED'}</div>
    </div>
    <div className="transport-info">
      {playing?`ROUND ${round+1}/${TOTAL_ROUNDS} \u2022 ${ROUNDS[round]?.layers.length} layers \u2022 ${BPM} BPM`:'TAP TO PLAY \u2022 DREAMY \u2022 MELANCHOLIC \u2022 HAPPY'}
    </div>

    {/* Visualizer */}
    {playing && <div className="vis">
      {Array.from({length:visBars},(_,i)=>{
        const h=5+Math.random()*25*INTENSITY[round];
        return <div key={i} className={`vis-bar${i%4===round%4?' active':''}`}
          style={{height:`${h}px`,background:`var(--${activePersona})`}}/>;
      })}
    </div>}

    {/* Round dots — tappable for fast forward */}
    <div className="rounds">
      {Array.from({length:TOTAL_ROUNDS},(_,i)=>
        <div key={i} className={`rdot${i<round?' done':''}${i===round?' now':''}`}
          onClick={()=>{
            if(!playing)return;
            engine.skipToRound(i);
            setRound(i);
          }}>{i+1}</div>
      )}
    </div>

    <div className="personas-strip">
      {PERSONAS.map(p=><span key={p.id} className={`ps ${p.id}${activePersona===p.id?' active':''}`}>
        {p.icon} {p.name}
      </span>)}
    </div>

    {/* Binaural chooser */}
    <div className="bin-label">BINAURAL BEATS</div>
    <div className="bin-chooser">
      {BINAURAL_MODES.map((bm,i)=>
        <div key={i} className={`bin-btn${binMode===i?' sel':''}`}
          onClick={()=>{setBinMode(i);engine.setBinaural(i);}}>
          {bm.name}<br/><span style={{fontSize:'0.5rem',opacity:0.5}}>{bm.hz===0?'off':bm.desc}</span>
        </div>
      )}
    </div>

    {/* Round annotation */}
    {playing && <div className="anno">
      <div className="who" style={{color:pObj?.color||'var(--mike)'}}>
        {pObj?.icon} {pObj?.name} &mdash; Round {round+1}
      </div>
      {ROUNDS[round]?.note}
    </div>}

    <div className="footer">
      <div className="tag">Four voices. One rooftop.<br/>The music doesn't end.</div>
      <div className="cr">MIKE &bull; ARNOLD &bull; ZOLT&Aacute;N &bull; PETER &bull; ROOFTOP PARADISE &bull; 2026</div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
