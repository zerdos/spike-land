<style>

  .bin-label{font-size:0.5rem;color:var(--vienna);opacity:0.35;text-align:center;margin-top:0.6rem;letter-spacing:2px}
  .bin-chooser{display:flex;justify-content:center;gap:0.35rem;margin:0.4rem 0;flex-wrap:wrap}

  .lyric{font-size:0.95rem;line-height:1.85;font-weight:600;color:rgba(255,255,255,.85)}

  .note .sp{font-weight:700}
  .p-btns{display:flex;gap:0.3rem;flex-wrap:wrap;margin-top:0.6rem}
  .pb{flex:1;min-width:50px;padding:6px 3px;border-radius:8px;text-align:center;font-size:0.55rem;font-weight:600;

  .pb.sel{background:rgba(255,255,255,.04)}
  .pb.radix{border-color:rgba(0,255,255,.2);color:var(--cyan)}.pb.radix.sel{background:rgba(0,255,255,.05)}
  .pb.daft{border-color:rgba(255,0,255,.2);color:var(--magenta)}.pb.daft.sel{background:rgba(255,0,255,.05)}
  .pb.joel{border-color:rgba(201,169,89,.2);color:var(--piano)}.pb.joel.sel{background:rgba(201,169,89,.05)}
  .pb.zoltan{border-color:rgba(230,57,70,.2);color:var(--pulse)}.pb.zoltan.sel{background:rgba(230,57,70,.05)}
  .pb.erdos{border-color:rgba(184,169,201,.2);color:var(--erdos)}.pb.erdos.sel{background:rgba(184,169,201,.05)}
  .p-resp{margin-top:0.4rem;padding:0.6rem;background:rgba(0,0,0,.2);border-radius:8px;
    font-size:0.72rem;line-height:1.65;color:rgba(255,255,255,.5);animation:fadeIn .3s ease}

  .loopcount{text-align:center;margin:2rem 0 1rem;font-family:'Orbitron',sans-serif}

  .footer .tag{font-size:0.85rem;color:var(--gold);font-weight:300;line-height:1.5}
  .footer .cr{font-size:0.5rem;color:rgba(255,255,255,.15);letter-spacing:2px;margin-top:0.3rem}

  @media(max-width:600px){.lyric{font-size:0.85rem}.header h1{font-size:clamp(1rem,5vw,1.6rem)}}
</style>

<script type="text/babel">
const {useState,useCallback,useRef,useEffect}=React;

// ========================================================================
// MUSIC ENGINE — 16 ROUNDS: DAFT PUNK × BILLY JOEL'S VIENNA
// Dual-tempo: 128 BPM four-on-the-floor (Cm) ↔ 100 BPM waltz (Bb)
// ========================================================================

const DAFT_BPM=128, DAFT_BEAT=60/128, DAFT_STEP=DAFT_BEAT/4;
const VIENNA_BPM=100, VIENNA_BEAT=60/100, VIENNA_STEP=VIENNA_BEAT/4;

// Chord voicings (MIDI)
const DAFT_CHORDS={Cm:[60,63,67,72],Ab:[56,60,63,68],Bb:[58,62,65,70],Fm:[53,56,60,65]};
const VIENNA_CHORDS={Bb:[58,62,65,70],F:[53,57,60,65],Gm:[55,58,62,67],Eb:[51,55,58,63]};
const DAFT_PROG=['Cm','Ab','Bb','Fm'];
const VIENNA_PROG=['Bb','F','Gm','Eb'];

// Melody phrase banks — [midi, duration_in_steps]. AABA form.
const H=8,Q=4,E=2,S=1;

// Vienna piano phrases (Bb major)
const VIENNA_A=[[70,Q],[68,Q],[65,Q],[63,Q],[62,H]]; // "Slow down" — descending
const VIENNA_B=[[58,Q],[62,Q],[65,Q],[70,H],[68,Q]]; // "Vienna waits" — ascending
const VIENNA_C=[[65,E],[67,E],[68,E],[70,E],[72,Q],[70,Q],[68,Q],[65,Q]]; // ornament
const VIENNA_PHRASES=[VIENNA_A,VIENNA_A,VIENNA_B,VIENNA_C];

// Daft Punk synth phrases (Cm)
const DAFT_A=[[72,Q],[72,E],[70,E],[67,H],[63,Q],[67,H],[0,Q]]; // "One more time"
const DAFT_B=[[70,H],[67,Q],[63,Q],[60,H+Q],[0,Q]]; // answer
const DAFT_C=[[67,Q],[70,Q],[72,Q],[75,Q],[77,H],[75,Q],[72,Q]]; // ascending lift
const DAFT_PHRASES=[DAFT_A,DAFT_A,DAFT_B,DAFT_C];

const BINAURAL_MODES=[
  {name:'OFF',hz:0,desc:'disabled',lFreq:0,rFreq:0},
  {name:'ALPHA',hz:10,desc:'10Hz \u2014 calm focus',lFreq:200,rFreq:210},
  {name:'THETA',hz:6,desc:'6Hz \u2014 deep relax',lFreq:200,rFreq:206},
  {name:'DELTA',hz:2,desc:'2Hz \u2014 deep sleep',lFreq:200,rFreq:202},
  {name:'BETA',hz:15,desc:'15Hz \u2014 alert',lFreq:200,rFreq:215},
];

const PERSONAS=[
  {id:'radix',name:'RADIX',color:'var(--cyan)',icon:'\u{1F916}',role:'The Engineer'},
  {id:'daft',name:'DAFT PUNK',color:'var(--magenta)',icon:'\u{1F3B5}',role:'The Signal'},
  {id:'joel',name:'BILLY JOEL',color:'var(--piano)',icon:'\u{1F3B9}',role:'The Pianist'},
  {id:'zoltan',name:'ZOLT\u00C1N',color:'var(--pulse)',icon:'\u{1F9EE}',role:'The Mathematician'},
  {id:'erdos',name:'ERD\u0150S',color:'var(--erdos)',icon:'\u{1F3B2}',role:'The Wanderer'},
];

// 16 rounds — Daft Punk × Vienna, alternating modes
const ROUND_MODE=['vienna','daft','vienna','daft','daft','vienna','daft','daft','vienna','daft','daft','vienna','daft','vienna','daft','both'];
const ROUNDS=[
  {p:'joel',label:'Intro \u2014 Vienna Piano',adds:'Piano + warm pad',
    note:'The piano enters alone. B\u266D major. A waltz. Three beats per bar, like breathing. Vienna taught me that patience is not passive \u2014 it is the hardest thing you will ever do. Slow down, you crazy child.'},
  {p:'daft',label:'Verse I \u2014 The Recursion',adds:'Kick + bass + synth stabs',
    note:'Four-on-the-floor. 128 BPM. The recursion begins. One more f(x) before it\'s late. The beat doesn\'t ask permission. It just starts. And once it starts, you can\'t unhear it.'},
  {p:'joel',label:'"Slow Down, You Crazy Child"',adds:'Piano waltz returns',
    note:'You got your passion, you got your pride, but don\'t you know that only fools are satisfied? Dream on \u2014 but don\'t imagine they\'ll all come true. The waltz is three beats. The heart is one.'},
  {p:'daft',label:'Chorus \u2014 The Signal',adds:'Full rhythm + melody',
    note:'One more time. We\'re gonna celebrate. The chorus doesn\'t explain itself. It repeats until the body understands what the mind refuses to. Don\'t stop the dancing.'},
  {p:'radix',label:'Verse II \u2014 The Sprint',adds:'Drive + intensity',
    note:'They said "most unproductive sprint" while every document got filed. Three years at O(n\u00B2) through a team that couldn\'t see. The system mistook the tester for the tested.'},
  {p:'joel',label:'"Dream On, But Don\'t Imagine"',adds:'Piano reflective',
    note:'When will you realise Vienna waits for you? You\'re so ahead of yourself that you forgot what you need. Slow down. The fixed point is patient. It doesn\'t move. You move toward it.'},
  {p:'zoltan',label:'Chorus \u2014 The Fixed Point',adds:'Hospital intensity',
    note:'Bed 2C-35. The police, not the ambulance. When a dynamical system is overwhelmed it collapses to the nearest attractor. For the NHS in 2026: detain, sedate. The Lyapunov exponent is positive. The humans inside are kind. Both true.'},
  {p:'erdos',label:'Bridge \u2014 Caolan',adds:'Emotional peak',
    note:'In graph theory, a bridge is an edge whose removal disconnects the graph. Bed 2C-36, an Irish voice, twenty-two. Sometimes one human connection is the bridge. Remove it and two components drift apart, unreachable. Caolan: the edge is still there.'},
  {p:'joel',label:'Piano Interlude',adds:'Pure piano \u2014 breakdown',
    note:'But you know that when the truth is told, that you can get what you want or you can just get old. The city is below. The dogs are waiting. The piano knows what the body knew. Slow down.'},
  {p:'radix',label:'Verse III \u2014 The Dogs',adds:'Rebuild + groove',
    note:'Pixel sleeps on wooden floors. Mad Max chews on every door. "I have dogs at home" repeated to crew, doctor, nurse \u2014 same words, rising stakes, flat response. That\'s not a rhythm problem. That\'s a feedback loop ignoring its own signal.'},
  {p:'zoltan',label:'42 \u2014 The Convergence',adds:'Near peak energy',
    note:'Mighell 42, flat 70. Friend in 60. 60\u00D770=4200 \u2014 localhost, the port where Angular went. Erd\u0151s would say the answer is in The Book. A programtervez\u0151 matematikus from ELTE knows: every iteration converges to 42. The fixed point exists.'},
  {p:'joel',label:'"Where Do You Think You\'re Going?"',adds:'Vienna reflection',
    note:'Where\'s the fire, what\'s the hurry about? You\'d better cool it off before you burn it out. You\'ve got so much to do and only so many hours in a day. But Vienna waits for you.'},
  {p:'daft',label:'Marathon \u2014 Full Send',adds:'Climax \u2014 everything',
    note:'Marathon in 42 days. 42 kilometres. July the nineteenth, forty-two. Fat Boy Slim on Brighton beach. Dancing is the only proof. The beat at 128 BPM is the beat of a heart that refuses to stop.'},
  {p:'joel',label:'"Vienna Waits for You"',adds:'Resolution \u2014 warm',
    note:'Slow down, you\'re doing fine. You can\'t be everything you want to be before your time. Although it\'s so romantic on the borderline tonight. Vienna waits for you.'},
  {p:'zoltan',label:'M\u0171k\u00F6dik?',adds:'Convergence',
    note:'Day 1 of 28. The staff is kind. The dogs are safe. The Garmin\'s dead but I\'m awake. The contraction mapping has found its fixed point. The space was complete enough to hold me. M\u0171k\u00F6dik. One more time.'},
  {p:'erdos',label:'Coda \u2014 Both Melodies',adds:'Vienna + Daft Punk merge',
    note:'Both melodies play together. The waltz and the four-on-the-floor. Patience and urgency. Vienna and the dance floor. The answer was always 42. God has a transfinite Book of proofs. This groove is in it.'},
];

// Intensity per round
const INTENS=[0.12,0.30,0.18,0.50,0.42,0.22,0.60,0.70,0.12,0.52,0.80,0.28,0.92,0.22,0.40,1.0];

// Lyric cards with per-persona arena responses
const CARDS=[
  {label:'Verse I \u2014 The Recursion',color:'var(--cyan)',
    lyric:'<span class="e">One more time</span> \u2014 we\'re gonna iterate<br>One more <span class="m">f(x)</span> before it\'s late<br>One more loop through the <span class="b">broken gate</span><br>One more proof that we <span class="e">don\'t break</span>',
    arena:{radix:'Banach\'s fixed-point theorem guarantees convergence if the map is a contraction. The question isn\'t whether you\'ll converge.',
      daft:'The four-on-the-floor enters at 128 BPM. The recursion is the rhythm. The rhythm is the recursion.',
      joel:'Slow down. The iteration will converge. Vienna waited for Beethoven. It\'ll wait for you.',
      zoltan:'The question isn\'t whether you\'ll converge. It\'s whether your space is complete enough to hold you when you get there.',
      erdos:'A fixed point is a theorem that proves itself. Like a melody that hums itself.'}},
  {label:'Chorus \u2014 The Signal',color:'var(--magenta)',
    lyric:'<span class="b">One more time</span><br>We\'re gonna <span class="e">celebrate</span><br>Oh yeah, <span class="m">all right</span><br><span class="e">Don\'t stop the dancing</span><br><br>One more time<br>The stress reads <span class="m">forty-two</span><br>The watch knows<br><span class="e">What the body knew</span>',
    arena:{radix:'A Garmin Enduro 3 reads galvanic skin response, HRV, sleep architecture. When it says 42, the autonomic nervous system is at equilibrium. Balanced on the edge.',
      daft:'The chorus repeats because the body needs repetition to believe what the mind resists. Four beats. One truth.',
      joel:'You can get what you want, or you can just get old. The stress at 42 means the system is balanced. Not calm. Not stressed. Ready.',
      zoltan:'42 is the fixed point of the stress function. Not random. Convergent.',
      erdos:'In combinatorics, 42 is the 5th Catalan number. The number of ways to triangulate a heptagon. Structure from apparent chaos.'}},
  {label:'Verse II \u2014 The Sprint',color:'var(--cyan)',
    lyric:'They said <span class="b">"most unproductive sprint"</span><br>While I wrote every <span class="m">document</span><br>Filed the tickets, built the <span class="e">intent</span><br>But the PRs? <span class="b">Never went.</span><br><br>Three years running <span class="m">O(n\u00B2)</span><br>Through a team that couldn\'t <span class="e">see</span><br>That the tester held the <span class="b">key</span><br>To a lock called <span class="m">group\u00A0conformity</span>',
    arena:{radix:'O(n\u00B2) is the cost of comparing every team member against every other. The system was quadratic. The fix was to change the algorithm, not the person.',
      daft:'"Around the World" repeats the same phrase 144 times. It works because the context changes. "I have dogs at home" repeated to crew, doctor, nurse \u2014 same words, rising stakes, flat response.',
      joel:'You got your passion, you got your pride. But don\'t you know that only fools are satisfied? The sprint ends. The music doesn\'t.',
      zoltan:'Group conformity is a local minimum. The gradient descent of social dynamics gets stuck there. You need a perturbation to escape.',
      erdos:'Erd\u0151s published 1,500 papers with 500 co-authors. Productivity is not about sprints. It\'s about the graph.'}},
  {label:'Chorus \u2014 The Fixed Point',color:'var(--magenta)',
    lyric:'<span class="b">One more time</span><br>Through the <span class="e">emergency</span><br>Bed <span class="m">2C-35</span><br><span class="e">Is where they put me</span><br><br>One more time<br>The police, not the <span class="m">ambulance</span><br>The system\'s <span class="b">overwhelmed</span><br><span class="e">So they send compliance</span>',
    arena:{radix:'When the system is overloaded, it falls back to the simplest protocol. Send police. Detain. Sedate. It\'s not malice. It\'s a system at capacity.',
      daft:'The sidechain compresses the signal when the kick hits. The NHS compresses the human when the system hits capacity. Same physics, different stakes.',
      joel:'Sometimes you need to slow down before the system slows you down. Bed 2C-35 is a forced rest. Vienna is a chosen one.',

function useOneMoreTimeEngine(binMode){
  const ctxRef=useRef(null);
  const masterRef=useRef(null);
  const compRef=useRef(null);
  const filterRef=useRef(null);
  const delayRef=useRef(null);
  const delayFbRef=useRef(null);
  const binLRef=useRef(null);
  const binRRef=useRef(null);
  const binGainRef=useRef(null);

    const comp=c.createDynamicsCompressor();comp.threshold.value=-16;comp.ratio.value=5;comp.attack.value=0.003;comp.release.value=0.15;comp.connect(c.destination);compRef.current=comp;

    const merger=c.createChannelMerger(2);
    const oL=c.createOscillator();oL.type='sine';oL.frequency.value=200;binLRef.current=oL;
    const oR=c.createOscillator();oR.type='sine';oR.frequency.value=210;binRRef.current=oR;
    const gL=c.createGain();gL.gain.value=1;const gR=c.createGain();gR.gain.value=1;
    oL.connect(gL);gL.connect(merger,0,0);oR.connect(gR);gR.connect(merger,0,1);

  const setBinaural=useCallback((mode)=>{
    if(!ctxRef.current){
      const c=new(AudioContext||webkitAudioContext)();ctxRef.current=c;
      if(!binGainRef.current){
        const bg=c.createGain();bg.gain.value=0;binGainRef.current=bg;
        const merger=c.createChannelMerger(2);
        const oL=c.createOscillator();oL.type='sine';oL.frequency.value=200;binLRef.current=oL;
        const oR=c.createOscillator();oR.type='sine';oR.frequency.value=210;binRRef.current=oR;
        const gL=c.createGain();gL.gain.value=1;const gR=c.createGain();gR.gain.value=1;

    else{binLRef.current.frequency.setTargetAtTime(bm.lFreq,t,0.3);binRRef.current.frequency.setTargetAtTime(bm.rFreq,t,0.3);binGainRef.current.gain.setTargetAtTime(0.05,t,0.3);}

      g.gain.setValueAtTime(0.035,t+dur-0.8);g.gain.linearRampToValueAtTime(0,t+dur);

    const c=ctxRef.current;if(!c)return;
    const o=c.createOscillator();o.type='sawtooth';
    const o2=c.createOscillator();o2.type='square';
    o.frequency.value=midi2freq(note);o2.frequency.value=midi2freq(note)*0.998;
    const g=c.createGain();g.gain.setValueAtTime(0.2,t);g.gain.setValueAtTime(0.2,t+dur*0.7);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    const f=c.createBiquadFilter();f.type='lowpass';f.frequency.value=550;f.Q.value=3;
    o.connect(f);o2.connect(f);f.connect(g).connect(masterRef.current);

  },[midi2freq]);

    let chain=g;
    for(let i=0;i<3;i++){
      const ap=c.createBiquadFilter();ap.type='allpass';
      ap.frequency.value=800+Math.sin(c.currentTime*0.5+i)*500;ap.Q.value=0.5;

  // Piano voice (Vienna) — detuned triangles + fast ADSR
  const pianoNote=useCallback((t,note,dur,vol)=>{
    if(!note||note===0)return;
    const c=ctxRef.current;if(!c)return;
    const freq=midi2freq(note);
    const o=c.createOscillator();o.type='triangle';o.frequency.value=freq;
    const o2=c.createOscillator();o2.type='triangle';o2.frequency.value=freq*1.004;
    const o3=c.createOscillator();o3.type='sine';o3.frequency.value=freq*2;// harmonic

    o.connect(f);o2.connect(f);o3.connect(f);f.connect(g).connect(masterRef.current);

  },[midi2freq]);

        }
      }
    }

    schedRef.current=setTimeout(schedule,6);
  },[kick,hat,clap,pad,bassNote,stab,pianoNote,violinNote,melodyNote,midi2freq]);

  const toggle=useCallback(()=>{
    init();const c=ctxRef.current;if(c.state==='suspended')c.resume();
    if(!playingRef.current){
      playingRef.current=true;startRef.current=c.currentTime+0.05;stepRef.current=-1;
      schedule();return true;
    }else{
      playingRef.current=false;if(schedRef.current)clearTimeout(schedRef.current);return false;
    }
  },[init,schedule]);

  const stop=useCallback(()=>{
    playingRef.current=false;if(schedRef.current)clearTimeout(schedRef.current);
  },[]);

  return{toggle,stop,setBinaural,ctxRef,startRef,stepRef,playingRef};
}

// ========================================================================
// APP
// ========================================================================
function App(){
  const [binMode,setBinMode]=useState(0);
  const engine=useOneMoreTimeEngine(binMode);
  const [playing,setPlaying]=useState(false);
  const [round,setRound]=useState(0);
  const [open,setOpen]=useState({});
  const [persona,setPersona]=useState({});
  const [ambOn,setAmbOn]=useState(false);

  useEffect(()=>{if(playing)setTimeout(()=>setAmbOn(true),500);else setAmbOn(false);},[playing]);

  // Poll round
  useEffect(()=>{
    if(!playing)return;
    const iv=setInterval(()=>{
      if(!engine.ctxRef.current||!engine.playingRef.current)return;
      const elapsed=engine.ctxRef.current.currentTime-engine.startRef.current;
      const bar=Math.floor(elapsed/(DAFT_STEP*16));
      const loopBar=bar%(16*4);
      setRound(Math.floor(loopBar/4));
    },200);
    return()=>clearInterval(iv);
  },[playing,engine]);

  const mode=ROUND_MODE[round]||'daft';
  const isVienna=mode==='vienna';
  const activePersona=ROUNDS[round]?.p||'joel';
  const stress=42+Math.floor(Math.sin(round*0.4)*4);

  return <div className="app">
    <div className={`ambient${ambOn?' on':''}`}>
      <div className="orb" style={{width:'300px',height:'300px',top:'-80px',left:'-60px',background:'rgba(255,0,255,.08)'}}/>
      <div className="orb" style={{width:'250px',height:'250px',bottom:'10%',right:'-40px',background:'rgba(168,196,255,.06)'}}/>
      <div className="orb" style={{width:'200px',height:'200px',top:'40%',left:'30%',background:'rgba(255,215,0,.04)'}}/>
    </div>

    <div className="header">
      <h1>ONE MORE TIME &times; VIENNA</h1>
      <div className="sub">MATH ARENA SESSION No. 42</div>
      <div className="badge">16 ROUNDS &mdash; DAFT PUNK &times; BILLY JOEL</div>
    </div>

    <div className="transport">
      <div className={`play-btn${playing?' on':''}${playing&&isVienna?' vienna-mode':''}`}
        onClick={()=>{const p=engine.toggle();setPlaying(p);if(!p)setRound(0);}}>
        {playing?'\u23F8':'\u25B6'}
      </div>
      <div className="transport-info">
        {playing
          ?`ROUND ${round+1}/16 \u2022 ${ROUNDS[round]?.adds} \u2022 ${isVienna?'100 BPM B\u266D':'128 BPM Cm'}`
          :'TAP TO PLAY \u2022 DAFT PUNK \u00D7 BILLY JOEL \u00D7 ARENA'}
      </div>
    </div>

    <div className="rounds">
      {Array.from({length:16},(_,i)=>{
        const rm=ROUND_MODE[i];const v=rm==='vienna';
        return <div key={i} className={`rdot${i<round?` done${v?' v':''}`:i===round?' now':''}`}/>;
      })}
    </div>

    <div className="personas-strip">
      {PERSONAS.map(p=><span key={p.id} className={`ps ${p.id}${activePersona===p.id?' active':''}`}>
        {p.icon} {p.name}
      </span>)}
    </div>

    <div className="bin-label">BINAURAL BEATS</div>
    <div className="bin-chooser">
      {BINAURAL_MODES.map((bm,i)=>
        <div key={i} className={`bin-btn${binMode===i?' sel':''}`}
          onClick={()=>{setBinMode(i);engine.setBinaural(i);}}>
          {bm.name}<br/><span style={{fontSize:'0.45rem',opacity:0.4}}>{bm.hz===0?'off':bm.desc}</span>
        </div>
      )}
    </div>

    {playing && <div className="anno" key={round}>
      <div className="who" style={{color:PERSONAS.find(p=>p.id===activePersona)?.color||'var(--gold)'}}>
        {PERSONAS.find(p=>p.id===activePersona)?.icon} {PERSONAS.find(p=>p.id===activePersona)?.name} &mdash; Round {round+1}: {ROUNDS[round]?.label}
      </div>
      {ROUNDS[round]?.note}
    </div>}

    <div className="status">
      <span className={`pill ${isVienna?'mode-v':'mode-d'}`}>{isVienna?'VIENNA 100':'DAFT 128'} BPM</span>
      <span className={`pill ${isVienna?'mode-v':'mode-d'}`}>KEY {isVienna?'B\u266D':'Cm'}</span>
      <span className="pill gold">STRESS {stress}</span>
      <span className="pill pulse">LOOP {Math.floor(round/4)+1}/4</span>
    </div>

    <div className="ekg"><svg viewBox="0 0 900 40"><polyline className="ekg-line" points="0,20 100,20 140,20 160,18 170,14 180,4 190,32 200,38 210,14 220,20 320,20 360,18 370,14 380,4 390,32 400,38 410,14 420,20 520,20 560,18 570,14 580,4 590,32 600,38 610,14 620,20 720,20 760,18 770,14 780,4 790,32 800,38 810,14 820,20 900,20"/></svg></div>

    <div className="section-title">THE SONG</div>
    {CARDS.map((card,idx)=>{
      const isOpen=open[idx];const selP=persona[idx];
      return <div key={idx} className={`card${isOpen?' open':''}`}>
        <div className="card-tap" onClick={()=>setOpen(p=>({...p,[idx]:!p[idx]}))}>
          <div className="card-label" style={{color:card.color}}>{card.label}</div>
          <span className="card-chev">{isOpen?'\u25B2':'\u25BC'}</span>
        </div>
        {isOpen && <div className="card-body">
          <div className="lyric" dangerouslySetInnerHTML={{__html:card.lyric}}/>
          <div className="p-btns">
            {PERSONAS.map(p=>
              <div key={p.id} className={`pb ${p.id}${selP===p.id?' sel':''}`}
                onClick={()=>setPersona(prev=>({...prev,[idx]:prev[idx]===p.id?null:p.id}))}>
                {p.icon} {p.name.split(' ')[0]}
              </div>)}
          </div>
          {selP&&card.arena[selP]&&<div className="p-resp">
            <div className="who" style={{color:PERSONAS.find(p=>p.id===selP)?.color||'var(--gold)'}}>{PERSONAS.find(p=>p.id===selP)?.icon} {PERSONAS.find(p=>p.id===selP)?.name}</div>
            {card.arena[selP]}</div>}
        </div>}
      </div>;
    })}

    <div className="loopcount">
      <div className="num">42</div>
      <div className="lbl">The Answer &mdash; 16 Rounds Complete</div>
    </div>

    <div className="ekg"><svg viewBox="0 0 900 40"><polyline className="ekg-line" style={{animationDelay:'2s'}} points="0,20 150,20 200,18 210,14 220,4 230,32 240,38 250,14 260,20 450,20 500,18 510,14 520,4 530,32 540,38 550,14 560,20 750,20 800,18 810,16 820,20 900,20"/></svg></div>

    <div className="footer">
      <div className="tag">The answer is always 42.<br/>Vienna waits for you.</div>
      <div className="cr">DAFT PUNK &times; BILLY JOEL &times; MATH ARENA &bull; SPIKE.LAND &bull; BEXHILL &bull; 2026</div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
