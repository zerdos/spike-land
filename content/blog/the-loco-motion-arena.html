<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Loco-Motion — Arena Remix</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300..900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#08060e;--gold:#f7c948;--gold-dim:rgba(247,201,72,.2);
    --sung:rgba(247,201,72,.55);--upcoming:rgba(255,255,255,.11);
    --active-glow:0 0 24px rgba(247,201,72,.2),0 0 48px rgba(247,201,72,.06);
    --kylie:#ff4da6;--daft:#00d4ff;--zoltan:#f7c948;
    --kylie-dim:rgba(255,77,166,.2);--daft-dim:rgba(0,212,255,.2);
  }
  html,body{height:100%;overflow:hidden}
  body{
    background:var(--bg);color:#eee;
    font-family:'Rubik',system-ui,sans-serif;
    display:flex;flex-direction:column;
    user-select:none;-webkit-user-select:none;
  }

  .app{display:flex;flex-direction:column;height:100%;position:relative;overflow:hidden}

  .ambient{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0;transition:opacity 2s}
  .ambient.on{opacity:1}
  .ambient .orb{position:absolute;border-radius:50%;filter:blur(100px)}

  /* === LYRICS === */
  .lyrics-wrap{
    flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;
    overflow:hidden;position:relative;z-index:1;padding:1rem;
  }
  .lyrics-scroll{
    display:flex;flex-direction:column;align-items:center;gap:.6rem;
    transition:transform .45s cubic-bezier(.25,.46,.45,.94);
  }
  .line{
    text-align:center;line-height:1.25;letter-spacing:-.01em;
    transition:opacity .3s,transform .3s;
    opacity:.12;transform:scale(.92);
    display:flex;flex-wrap:wrap;justify-content:center;gap:0 .28em;
  }
  .line.active{opacity:1;transform:scale(1)}
  .line.sung{opacity:.35;transform:scale(.95)}
  .line.next{opacity:.25;transform:scale(.96)}

  .syl{
    display:inline-block;position:relative;
    transition:color .15s,font-variation-settings .2s;
    font-variation-settings:'wght' 350;
  }
  .syl.active{
    font-variation-settings:'wght' 800;
    filter:drop-shadow(0 0 8px currentColor);
  }
  .syl.active::after{
    content:'';position:absolute;bottom:-.08em;left:0;height:2.5px;
    background:currentColor;border-radius:2px;
    animation:sweep .35s ease-out forwards;
  }
  @keyframes sweep{from{width:0}to{width:100%}}
  .syl.sung{font-variation-settings:'wght' 500}

  /* Persona colors */
  .p-kylie .syl{color:var(--upcoming)}
  .p-kylie .syl.active{color:var(--kylie)}
  .p-kylie .syl.sung{color:rgba(255,77,166,.55)}

  .p-daft .syl{color:var(--upcoming)}
  .p-daft .syl.active{color:var(--daft)}
  .p-daft .syl.sung{color:rgba(0,212,255,.45)}

  .p-zoltan .syl{color:var(--upcoming)}
  .p-zoltan .syl.active{color:var(--zoltan)}
  .p-zoltan .syl.sung{color:rgba(247,201,72,.45)}

  .p-all .syl{color:var(--upcoming)}
  .p-all .syl.active{color:#fff;text-shadow:0 0 12px var(--kylie),0 0 24px var(--daft),0 0 36px var(--zoltan)}
  .p-all .syl.sung{color:rgba(255,255,255,.4)}

  .persona-tag{
    font-size:.5em;letter-spacing:.08em;text-transform:uppercase;
    opacity:.4;margin-right:.3em;font-variation-settings:'wght' 400;
  }
  .line.active .persona-tag{opacity:.7}

  .sz-s{font-size:clamp(1.1rem,3vw,1.4rem)}
  .sz-m{font-size:clamp(1.4rem,4vw,1.8rem)}
  .sz-l{font-size:clamp(1.8rem,5vw,2.4rem)}
  .sz-xl{font-size:clamp(2.2rem,6vw,3rem)}
  .sz-xxl{font-size:clamp(2.6rem,7vw,3.6rem)}

  /* === PITCH BAR === */
  .pitch-bar{
    height:28px;position:relative;z-index:1;margin:0 1rem;
    background:rgba(255,255,255,.03);border-radius:14px;overflow:hidden;
  }
  .pitch-dot{
    position:absolute;width:6px;height:6px;border-radius:50%;
    background:rgba(247,201,72,.15);top:50%;transform:translateY(-50%);
  }
  .pitch-dot.active{background:var(--gold);box-shadow:0 0 8px var(--gold)}
  .pitch-dot.sung{background:var(--sung)}
  .pitch-head{
    position:absolute;top:0;bottom:0;width:2px;background:var(--gold);
    opacity:.5;transition:left .08s linear;
  }

  /* === BPM PULSE === */
  @keyframes bpm-pulse{
    0%,100%{opacity:.03}
    50%{opacity:.08}
  }
  .bpm-ring{
    position:fixed;top:50%;left:50%;width:60vmin;height:60vmin;
    border-radius:50%;border:1px solid rgba(247,201,72,.05);
    transform:translate(-50%,-50%);pointer-events:none;z-index:0;
  }
  .bpm-ring.on{animation:bpm-pulse .4878s ease-in-out infinite} /* 123 BPM */

  /* === CONTROLS === */
  .controls{
    display:flex;align-items:center;gap:.75rem;
    padding:.75rem 1rem;z-index:2;
    background:rgba(0,0,0,.5);backdrop-filter:blur(12px);
  }
  .play-btn{
    width:48px;height:48px;border-radius:50%;border:none;
    background:linear-gradient(135deg,var(--kylie),var(--daft));
    color:var(--bg);cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:1.1rem;flex-shrink:0;
    transition:transform .15s;
  }
  .play-btn:active{transform:scale(.92)}

  .seek-wrap{flex:1;display:flex;flex-direction:column;gap:.2rem}
  .seek{
    width:100%;height:6px;-webkit-appearance:none;appearance:none;
    background:rgba(255,255,255,.08);border-radius:3px;cursor:pointer;outline:none;
  }
  .seek::-webkit-slider-thumb{
    -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
    background:var(--gold);border:none;cursor:pointer;
  }
  .time-label{font-size:.65rem;color:rgba(255,255,255,.3);display:flex;justify-content:space-between}

  .bin-btn{
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
    color:rgba(255,255,255,.4);border-radius:8px;padding:.3rem .6rem;
    font-size:.6rem;cursor:pointer;white-space:nowrap;font-family:inherit;
    transition:border-color .2s,color .2s;
  }
  .bin-btn.on{border-color:var(--gold);color:var(--gold)}

  .credit{
    font-size:.55rem;padding:.3rem 1rem .5rem;
    color:rgba(247,201,72,.2);text-align:center;
  }
</style>

  [.75,.78,.80,.82,.85,.88,.90,.95],
  [.70,.72,.68,.65],
  [.75,.78,.80,.82,.85,.88,.90,.92],
  // R9 — Vocoder interlude
  [.50,.52,.55,.60],
  [.55,.58,.60,.55,.50],
  // R10 — Zoltán rap
  [.42,.45,.48,.50,.52],
  [.50,.52,.55,.58,.60],
  [.48,.50,.55,.58,.60],
  [.55,.58,.62,.65,.68],
  // R11 — Call & response
  [.65,.68,.65,.62],
  [.70,.75,.80],
  [.62,.65,.68,.70,.72,.75],
  [.70,.72,.75,.78],
  // R12 — Breakdown
  [.35,.38,.40,.42,.45],
  [.40,.35,.32,.30],
  [.35,.40,.45,.48,.50],
  [.25,.25,.25],
  // R13 — MCP verse
  [.48,.50,.52,.55],
  [.50,.52,.55,.58,.60],
  [.52,.55,.58,.60,.62],
  [.55,.58,.62,.65,.68,.72],
  // R14 — Daft anthem
  [.55,.58,.62],
  [.58,.60,.62,.65,.68,.72],
  [.65,.70,.75,.78,.80],
  [.75],
  // R15 — Final chorus
  [.80,.82,.85,.88],
  [.85,.88,.90],
  [.88,.90,.93,.95],
  [.82,.85,.88],
  [.90,.92,.93,.95,.97,.99],
  [.85,.88,.90,.92],
  [.90,.92,.95,.95,.97,.99],
  [.85,.88,.90,.92],
  [.92,.95,.97,.99],
  // R16 — Outro
  [.50,.48,.45,.42,.38,.35],
  [.35,.32,.30,.28],
  [.40,.38,.35,.32,.28,.25],
  [.20,.15,.10],
];

// Binaural presets
const BIN=[
  {n:'OFF',l:0,r:0},
  {n:'THETA 6Hz',l:200,r:206},
  {n:'DELTA 2Hz',l:200,r:202},
];

// Section labels for round markers
const SECTIONS = {
  0: 'ROUND 1 — VOCODER INIT',
  2: 'ROUND 2 — KYLIE ENTERS',
  4: 'ROUND 3 — ZOLTÁN',
  6: 'ROUND 4 — FILTER DROP',
  8: 'ROUND 5 — THE INVITATION',
  10: 'ROUND 6 — TWO DOGS',
  12: 'ROUND 7 — THE BRIDGE',
  14: 'ROUND 8 — CHORUS I',
  17: 'ROUND 9 — DIGITAL LOVE',
  19: 'ROUND 10 — THE CODE',
  23: 'ROUND 11 — CALL & RESPONSE',
  27: 'ROUND 12 — BREAKDOWN',
  31: 'ROUND 13 — MCP',
  35: 'ROUND 14 — HUMAN AFTER ALL',
  39: 'ROUND 15 — FINAL CHORUS',
  48: 'ROUND 16 — E PLURIBUS UNUM',
};

// ========================================================================
// APP
// ========================================================================
const R=React,{useState,useCallback,useRef,useEffect}=R;

function App(){
  const [playing,setPlaying]=useState(false);
  const [time,setTime]=useState(0);
  const [binIdx,setBinIdx]=useState(0);
  const [autoPlay,setAutoPlay]=useState(false);
  const audioRef=useRef(null);
  const binCtxRef=useRef(null);
  const binLRef=useRef(null);
  const binRRef=useRef(null);
  const binGainRef=useRef(null);
  const rafRef=useRef(null);
  const totalDur = 172;
  const [dur,setDur]=useState(totalDur);

  // Audio element (if source exists)
  useEffect(()=>{
    if(!AUDIO_SRC) return;
    const a=new Audio(AUDIO_SRC);
    a.preload='auto';
    a.addEventListener('loadedmetadata',()=>{if(a.duration&&Number.isFinite(a.duration))setDur(a.duration)});
    a.addEventListener('ended',()=>{setPlaying(false)});
    audioRef.current=a;
    return()=>{a.pause();a.src=''}
  },[]);

  // Auto-play mode (no audio — simulate playback with timer)
  useEffect(()=>{
    if(!AUDIO_SRC && autoPlay){
      const start=performance.now()-time*1000;
      function tick(){
        const elapsed=(performance.now()-start)/1000;
        if(elapsed>=totalDur){setAutoPlay(false);setPlaying(false);return}
        setTime(elapsed);
        rafRef.current=requestAnimationFrame(tick);
      }
      rafRef.current=requestAnimationFrame(tick);
      return()=>cancelAnimationFrame(rafRef.current);
    }
  },[autoPlay]);

  // RAF loop for audio mode
  useEffect(()=>{
    if(!audioRef.current) return;
    function tick(){
      if(audioRef.current)setTime(audioRef.current.currentTime);
      rafRef.current=requestAnimationFrame(tick);
    }
    if(playing){rafRef.current=requestAnimationFrame(tick)}
    else{cancelAnimationFrame(rafRef.current)}
    return()=>cancelAnimationFrame(rafRef.current);
  },[playing]);

  // BPM ring pulse
  useEffect(()=>{
    const ring=document.getElementById('bpmRing');
    if(ring){ring.className='bpm-ring'+(playing||autoPlay?' on':'')}
  },[playing,autoPlay]);

  // Binaural
  useEffect(()=>{
    const b=BIN[binIdx];
    if(b.l===0){
      if(binCtxRef.current){binGainRef.current.gain.setValueAtTime(0,binCtxRef.current.currentTime)}
      return;
    }
    if(!binCtxRef.current){
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      const gain=ctx.createGain();gain.gain.value=0.07;gain.connect(ctx.destination);
      const oL=ctx.createOscillator();oL.type='sine';
      const oR=ctx.createOscillator();oR.type='sine';
      const mL=ctx.createStereoPanner();mL.pan.value=-1;
      const mR=ctx.createStereoPanner();mR.pan.value=1;
      oL.connect(mL);mL.connect(gain);
      oR.connect(mR);mR.connect(gain);
      oL.start();oR.start();
      binCtxRef.current=ctx;binLRef.current=oL;binRRef.current=oR;binGainRef.current=gain;
    }
    binLRef.current.frequency.setValueAtTime(b.l,binCtxRef.current.currentTime);
    binRRef.current.frequency.setValueAtTime(b.r,binCtxRef.current.currentTime);
    binGainRef.current.gain.setValueAtTime(0.07,binCtxRef.current.currentTime);
  },[binIdx]);

  const toggle=useCallback(()=>{
    if(AUDIO_SRC){
      const a=audioRef.current;if(!a)return;
      if(playing){a.pause();setPlaying(false)}
      else{a.play().then(()=>setPlaying(true)).catch(()=>{})}
    } else {
      if(autoPlay){setAutoPlay(false);setPlaying(false)}
      else{setAutoPlay(true);setPlaying(true)}
    }
  },[playing,autoPlay]);

  const seek=useCallback(e=>{
    const v=parseFloat(e.target.value);
    if(audioRef.current){audioRef.current.currentTime=v}
    setTime(v);
  },[]);

  const fmt=s=>{const m=Math.floor(s/60);const sec=Math.floor(s%60);return `${m}:${sec<10?'0':''}${sec}`};

  // Find active line
  let activeLine=-1;
  for(let i=LYRICS.length-1;i>=0;i--){
    if(time>=LYRICS[i].t-0.3){activeLine=i;break}
  }

  // Current section label
  let currentSection='';
  for(let i=activeLine;i>=0;i--){
    if(SECTIONS[i]){currentSection=SECTIONS[i];break}
  }

  const isPlaying = playing || autoPlay;

  return R.createElement('div',{className:'app'},
    // Ambient glow — triple color for arena
    R.createElement('div',{className:`ambient${isPlaying?' on':''}`},
      R.createElement('div',{className:'orb',style:{width:'40vw',height:'40vw',left:'-10vw',top:'8%',background:'radial-gradient(circle,rgba(255,77,166,.08),transparent 70%)'}}),
      R.createElement('div',{className:'orb',style:{width:'35vw',height:'35vw',right:'-8vw',top:'15%',background:'radial-gradient(circle,rgba(0,212,255,.06),transparent 70%)'}}),
      R.createElement('div',{className:'orb',style:{width:'38vw',height:'38vw',left:'20%',bottom:'5%',background:'radial-gradient(circle,rgba(247,201,72,.06),transparent 70%)'}})
    ),

    // Lyrics
    R.createElement('div',{className:'lyrics-wrap'},
      R.createElement('div',{className:'lyrics-scroll',style:{transform:`translateY(${-activeLine*3.2}rem)`}},
        LYRICS.map((line,li)=>{
          let cls=`line ${line.sz} p-${line.p}`;
          if(li===activeLine)cls+=' active';
          else if(li<activeLine)cls+=' sung';
          else if(li===activeLine+1)cls+=' next';

          const tag = line.p===P.K?'KYLIE':line.p===P.D?'DAFT PUNK':line.p===P.Z?'ZOLTÁN':'ALL';

          return R.createElement('div',{key:li,className:cls},
            R.createElement('span',{className:'persona-tag'},tag),
            line.syls.map((syl,si)=>{
              let sc='syl';
              const nextSyl=line.syls[si+1];
              const sylEnd=nextSyl?nextSyl.t:(LYRICS[li+1]?LYRICS[li+1].t:syl.t+2);
              if(time>=syl.t&&time<sylEnd&&li===activeLine)sc+=' active';
              else if(time>=sylEnd||li<activeLine)sc+=' sung';
              return R.createElement('span',{key:si,className:sc},syl.w);
            })
          );
        })
      )
    ),

    // Pitch bar
    R.createElement('div',{className:'pitch-bar'},
      activeLine>=0&&PITCHES[activeLine]?
        PITCHES[activeLine].map((p,i)=>{
          const line=LYRICS[activeLine];
          const syl=line.syls[i];
          if(!syl)return null;
          const nextSyl=line.syls[i+1];
          const sylEnd=nextSyl?nextSyl.t:(LYRICS[activeLine+1]?LYRICS[activeLine+1].t:syl.t+2);
          let dc='pitch-dot';
          if(time>=syl.t&&time<sylEnd)dc+=' active';
          else if(time>=sylEnd)dc+=' sung';
          const pct=((i+.5)/PITCHES[activeLine].length)*100;
          return R.createElement('div',{key:i,className:dc,style:{left:`${pct}%`,top:`${85-p*70}%`}});
        }):null,
      R.createElement('div',{className:'pitch-head',style:{left:`${dur>0?(time/dur)*100:0}%`}})
    ),

    // Controls
    R.createElement('div',{className:'controls'},
      R.createElement('button',{className:'play-btn',onClick:toggle},isPlaying?'||':'|>'),
      R.createElement('div',{className:'seek-wrap'},
        R.createElement('input',{type:'range',className:'seek',min:0,max:dur,step:.1,value:time,onChange:seek}),
        R.createElement('div',{className:'time-label'},
          R.createElement('span',null,fmt(time)),
          R.createElement('span',null,currentSection||'THE LOCO-MOTION ARENA'),
          R.createElement('span',null,fmt(dur))
        )
      ),
      R.createElement('button',{
        className:`bin-btn${binIdx>0?' on':''}`,
        onClick:()=>setBinIdx(i=>(i+1)%BIN.length)
      },BIN[binIdx].n)
    ),

    R.createElement('div',{className:'credit'},'The Loco-Motion Arena — Kylie Minogue × Daft Punk × Zoltán — 123 BPM F minor — spike.land')
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(R.createElement(App));
</script>
</body>
</html>
