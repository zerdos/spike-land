<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#0a0a1a;--sunset:#ff6b35;--warm:#ffa07a;--gold:#FFD700;--sky:#1a1a3e;
    --teal:#2a9d8f;--rose:#e63946;--lavender:#b8a9c9;--panel:rgba(255,255,255,.04);
    --border:rgba(255,255,255,.08);--legal:#4ecdc4;--text:rgba(255,255,255,.7);
  }
  html{scroll-behavior:smooth}
  body{background:linear-gradient(180deg,#0a0a1a 0%,#1a1230 30%,#2a1a3e 60%,#1a1a3e 100%);
    color:#eee;font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
  #root{position:relative;z-index:2}

  /* Rooftop gradient overlay */
  body::before{content:'';position:fixed;top:0;left:0;right:0;height:40vh;
    background:linear-gradient(180deg,rgba(255,107,53,.06) 0%,rgba(255,160,122,.03) 50%,transparent 100%);
    pointer-events:none;z-index:0}

  .app{position:relative;z-index:3;max-width:600px;margin:0 auto;padding:1rem}

  /* Header — warm rooftop vibe */
  .header{text-align:center;padding:1.5rem 0 1rem}
  .header h1{
    font-family:'Orbitron',sans-serif;font-size:clamp(1.6rem,7vw,2.5rem);font-weight:900;
    background:linear-gradient(135deg,var(--sunset),var(--warm),var(--gold),var(--lavender));
    background-size:400% 400%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;animation:warmShimmer 10s ease infinite;
  }
  .header .sub{font-size:0.8rem;color:var(--warm);opacity:0.6;margin-top:0.3rem;font-weight:300}
  .header .place{font-size:0.65rem;color:var(--lavender);opacity:0.4;margin-top:0.2rem;letter-spacing:2px}
  @keyframes warmShimmer{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

  /* Music control */
  .music-bar{display:flex;justify-content:center;align-items:center;gap:0.8rem;margin:1rem 0;flex-wrap:wrap}
  .play-btn{
    width:56px;height:56px;border-radius:50%;border:2px solid var(--sunset);background:rgba(255,107,53,.08);
    color:var(--sunset);font-size:1.4rem;display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:all .3s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
  }
  .play-btn:active{transform:scale(0.92);background:rgba(255,107,53,.2)}
  .play-btn.playing{border-color:var(--teal);color:var(--teal);background:rgba(42,157,143,.08);animation:breathe 4s ease infinite}
  @keyframes breathe{0%,100%{box-shadow:0 0 0 0 rgba(42,157,143,.2)}50%{box-shadow:0 0 20px 4px rgba(42,157,143,.15)}}
  .music-label{font-size:0.65rem;color:var(--lavender);opacity:0.5;letter-spacing:1px}

  /* Status pills */
  .status{display:flex;justify-content:center;gap:0.5rem;flex-wrap:wrap;margin:0.8rem 0}
  .pill{font-size:0.6rem;padding:4px 10px;border-radius:12px;border:1px solid var(--border);color:var(--text);letter-spacing:1px}
  .pill.warn{border-color:var(--rose);color:var(--rose)}
  .pill.ok{border-color:var(--legal);color:var(--legal)}
  .pill.gold{border-color:var(--gold);color:var(--gold)}

  .section-title{font-family:'Orbitron',sans-serif;font-size:0.7rem;letter-spacing:3px;
    color:var(--sunset);text-align:center;margin:2rem 0 1rem;opacity:0.7}

  .card{
    background:var(--panel);border:1px solid var(--border);border-radius:16px;
    padding:1.2rem;margin-bottom:1rem;transition:all .3s;
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);

  .card-tap{
    display:flex;justify-content:space-between;align-items:center;
    min-height:44px;cursor:pointer;touch-action:manipulation;
    -webkit-tap-highlight-color:transparent;
  }

  .p-btn.radix{border-color:rgba(230,57,70,.3);color:var(--rose)}.p-btn.radix.sel{background:rgba(230,57,70,.08)}
  .p-btn.erdos{border-color:rgba(184,169,201,.3);color:var(--lavender)}.p-btn.erdos.sel{background:rgba(184,169,201,.08)}
  .p-btn.zoltan{border-color:rgba(42,157,143,.3);color:var(--teal)}.p-btn.zoltan.sel{background:rgba(42,157,143,.08)}
  .p-btn.daft{border-color:rgba(255,107,53,.3);color:var(--sunset)}.p-btn.daft.sel{background:rgba(255,107,53,.08)}

  .p-resp{margin-top:0.8rem;padding:1rem;background:rgba(0,0,0,.2);border-radius:10px;
    font-size:0.8rem;line-height:1.8;color:rgba(255,255,255,.55);animation:fadeIn .3s ease}

  /* Textarea */
  .answer{margin-top:1rem}

  .act-text .phone{color:var(--gold);font-weight:600}
  .act-text .urg{color:var(--rose);font-weight:600;font-size:0.65rem;letter-spacing:1px}

  .export-btn{

<script type="text/babel">
const {useState,useCallback,useRef,useEffect}=React;

// ========================================================================
// WEVAL-STYLE AUDIO ENGINE — warm deep house, rooftop paradise
// ========================================================================

function useRooftopAudio(){
  const ctxRef=useRef(null);
  const masterRef=useRef(null);
  const playingRef=useRef(false);
  const schedRef=useRef(null);
  const stepRef=useRef(-1);
  const startRef=useRef(0);

  const BPM=108; // Weval tempo — slower, warmer
  const STEP=60/BPM/4;

  const init=useCallback(()=>{
    if(ctxRef.current)return;
    const c=new(AudioContext||webkitAudioContext)();ctxRef.current=c;

    // Master -> compressor -> destination
    const comp=c.createDynamicsCompressor();comp.threshold.value=-12;comp.ratio.value=4;
    comp.connect(c.destination);

    const m=c.createGain();m.gain.value=0.4;m.connect(comp);masterRef.current=m;

    // Binaural (keep the therapeutic element)
    const bg=c.createGain();bg.gain.value=0.04;
    const merger=c.createChannelMerger(2);
    const oL=c.createOscillator();oL.type='sine';oL.frequency.value=200;
    const oR=c.createOscillator();oR.type='sine';oR.frequency.value=210;
    const gL=c.createGain();gL.gain.value=1;const gR=c.createGain();gR.gain.value=1;
    oL.connect(gL);gL.connect(merger,0,0);oR.connect(gR);gR.connect(merger,0,1);
    merger.connect(bg);bg.connect(c.destination);
    oL.start();oR.start();
  },[]);

  // Warm pad — Weval signature
  const pad=useCallback((t,notes)=>{
    const c=ctxRef.current;if(!c)return;
    notes.forEach((note,i)=>{
      const freq=440*Math.pow(2,(note-69)/12);
      const o=c.createOscillator();o.type='sine';
      o.frequency.value=freq;
      const o2=c.createOscillator();o2.type='triangle';
      o2.frequency.value=freq*1.002;
      const g=c.createGain();
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.06,t+0.8);
      g.gain.setValueAtTime(0.06,t+STEP*14);
      g.gain.linearRampToValueAtTime(0,t+STEP*16);
      const f=c.createBiquadFilter();f.type='lowpass';f.frequency.value=1200;f.Q.value=0.5;
      o.connect(f);o2.connect(f);f.connect(g).connect(masterRef.current);
      o.start(t);o.stop(t+STEP*16+0.1);o2.start(t);o2.stop(t+STEP*16+0.1);
    });
  },[]);

  // Deep kick — soft, round
  const kick=useCallback((t)=>{
    const c=ctxRef.current;if(!c)return;
    const o=c.createOscillator();const g=c.createGain();
    o.frequency.setValueAtTime(120,t);o.frequency.exponentialRampToValueAtTime(40,t+0.15);
    g.gain.setValueAtTime(0.6,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
    o.connect(g).connect(masterRef.current);o.start(t);o.stop(t+0.45);
  },[]);

  // Rimshot — gentle
  const rim=useCallback((t)=>{
    const c=ctxRef.current;if(!c)return;
    const buf=c.createBuffer(1,c.sampleRate*0.015,c.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,6);
    const src=c.createBufferSource();src.buffer=buf;
    const g=c.createGain();g.gain.value=0.12;
    const bp=c.createBiquadFilter();bp.type='bandpass';bp.frequency.value=800;bp.Q.value=2;
    src.connect(bp).connect(g).connect(masterRef.current);src.start(t);src.stop(t+0.02);
    const o=c.createOscillator();o.type='triangle';o.frequency.value=300;
    const og=c.createGain();og.gain.setValueAtTime(0.08,t);og.gain.exponentialRampToValueAtTime(0.001,t+0.03);
    o.connect(og).connect(masterRef.current);o.start(t);o.stop(t+0.04);
  },[]);

  // Soft hat
  const hat=useCallback((t)=>{
    const c=ctxRef.current;if(!c)return;
    const buf=c.createBuffer(1,c.sampleRate*0.02,c.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,5)*0.3;
    const src=c.createBufferSource();src.buffer=buf;
    const g=c.createGain();g.gain.value=0.04;
    const hp=c.createBiquadFilter();hp.type='highpass';hp.frequency.value=9000;
    src.connect(hp).connect(g).connect(masterRef.current);src.start(t);src.stop(t+0.025);
  },[]);

  // Deep bass note
  const bass=useCallback((t,note)=>{
    const c=ctxRef.current;if(!c)return;
    const freq=440*Math.pow(2,(note-69)/12);
    const o=c.createOscillator();o.type='sine';o.frequency.value=freq;
    const g=c.createGain();g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+STEP*3.5);
    const f=c.createBiquadFilter();f.type='lowpass';f.frequency.value=400;
    o.connect(f).connect(g).connect(masterRef.current);o.start(t);o.stop(t+STEP*4);
  },[]);

  // Am progression — warm Weval chords
  const CHORDS=[[57,60,64,69],[55,60,64,67],[53,57,60,65],[52,55,60,64]]; // Am, C, F, Dm
  const BASS_LINE=[45,48,53,52]; // bass roots
  const chordRef=useRef(0);

  const schedule=useCallback(()=>{
    if(!playingRef.current)return;
    const c=ctxRef.current;
    const now=c.currentTime,elapsed=now-startRef.current;
    const stepNum=Math.floor(elapsed/STEP);
    if(stepNum<=stepRef.current){schedRef.current=setTimeout(schedule,8);return}
    stepRef.current=stepNum;
    const t=startRef.current+stepNum*STEP;
    const pos=stepNum%16;
    const bar=Math.floor(stepNum/16);

    // Kick: 1 and 3 (soft 4-on-floor but sparser)
    if(pos===0||pos===8)kick(t);

    // Rim: offbeat
    if(pos===4||pos===12)rim(t);

    // Hats: gentle shuffle
    if(pos%2===0&&Math.random()<0.6)hat(t);

    // Pad: every 4 bars, change chord
    if(pos===0&&bar%4===0){
      const ci=chordRef.current%CHORDS.length;
      pad(t,CHORDS[ci]);
      chordRef.current++;
    }

    // Bass: every bar on beat 1
    if(pos===0){
      const bi=(bar)%BASS_LINE.length;
      bass(t,BASS_LINE[bi]);
    }

    schedRef.current=setTimeout(schedule,8);
  },[kick,rim,hat,pad,bass]);

  const toggle=useCallback(()=>{
    init();
    const c=ctxRef.current;
    if(c.state==='suspended')c.resume();
    if(!playingRef.current){
      playingRef.current=true;
      startRef.current=c.currentTime+0.05;
      stepRef.current=-1;
      chordRef.current=0;
      schedule();
      return true;
    }else{
      playingRef.current=false;
      if(schedRef.current)clearTimeout(schedRef.current);
      return false;
    }
  },[init,schedule]);

  return{toggle,playingRef};
}

// ========================================================================
// APP
// ========================================================================

function App(){
  const audio=useRooftopAudio();
  const [playing,setPlaying]=useState(false);
  const [open,setOpen]=useState({});
  const [persona,setPersona]=useState({});
  const [answers,setAnswers]=useState({});
  const [checked,setChecked]=useState(new Set());

  const toggleCard=useCallback((id)=>setOpen(p=>({...p,[id]:!p[id]})),[]);
  const toggleP=useCallback((cid,p)=>setPersona(prev=>({...prev,[cid]:prev[cid]===p?null:p})),[]);
  const setAns=useCallback((id,v)=>setAnswers(p=>({...p,[id]:v})),[]);
  const toggleCheck=useCallback((i)=>setChecked(p=>{const n=new Set(p);n.has(i)?n.delete(i):n.add(i);return n}),[]);

  const doExport=useCallback(()=>{
    let t='SECTION 8 DEFENCE NOTES \u2014 Zolt\u00e1n Erdos\n'+new Date().toISOString().slice(0,10)+'\n\n';
    CLAIMS.forEach(cl=>{t+=cl.ground+': '+cl.text+'\nMY RESPONSE: '+(answers[cl.id]||'[pending]')+'\n\n'});
    t+='\nDEFENCES:\n';DEFS.forEach((d,i)=>t+=(i+1)+'. '+d+'\n');
    t+='\nACTIONS:\n';ACTIONS.forEach((a,i)=>t+=(checked.has(i)?'[x]':'[ ]')+' '+a.text+(a.phone?' '+a.phone:'')+'\n');
    const blob=new Blob([t],{type:'text/plain'});const u=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=u;a.download='section-8-defence.txt';a.click();URL.revokeObjectURL(u);
  },[answers,checked]);

  return <div className="app">
    <div className="header">
      <h1>ROOFTOP PARADISE</h1>
      <div className="sub">The Section 8 Arena</div>
      <div className="place">42 MIGHELL STREET &bull; BRIGHTON</div>
    </div>

    <div className="music-bar">
      <div className={`play-btn${playing?' playing':''}`} onClick={()=>{
        const p=audio.toggle();setPlaying(p);
      }}>
        {playing?'\u23F8':'\u25B6'}
      </div>
      <div className="music-label">{playing?'ROOFTOP VIBES \u2022 108 BPM \u2022 BINAURAL':'TAP TO PLAY'}</div>
    </div>

    <div className="status">
      <span className="pill warn">GROUNDS 12 & 14</span>
      <span className="pill ok">DISCRETIONARY</span>
      <span className="pill gold">COURT: 31 MAR</span>
      <span className="pill warn">SECTIONED</span>
    </div>

    <div className="section-title">THEIR CLAIMS</div>

    {CLAIMS.map(cl=>{
      const isOpen=open[cl.id];
      const selP=persona[cl.id];
      return <div key={cl.id} className={`card${isOpen?' open':''}`}>
        <div className="card-tap" onClick={()=>toggleCard(cl.id)}>
          <div>
            <div className="card-ground">{cl.ground}</div>
            <div style={{fontSize:'0.7rem',color:'var(--text)',marginTop:'2px',maxWidth:'250px'}}>{cl.text.slice(0,60)}...</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:'0.5rem'}}>
            <span className="card-badge">{cl.type}</span>
            <span className="card-chevron">{isOpen?'\u25B2':'\u25BC'}</span>
          </div>
        </div>

        {isOpen && <div className="card-body">
          <strong>They allege:</strong> {cl.text}
          <div className="card-clauses">{cl.clauses}</div>
          {cl.context && <div className="card-ctx">{cl.context}</div>}

          {cl.showDogs && <div className="dog-photo">
            <img src="/content/PXL_20260120_131042766.jpg" alt="Pixel and Mad Max"
              onError={e=>{e.target.style.display='none'}}/>
            <div className="cap">Pixel & Mad Max — the dogs the building nearly killed</div>
          </div>}

          <div className="personas">
            {[['radix','RADIX'],['erdos','ERD\u0150S'],['zoltan','ZOLT\u00C1N'],['daft','DAFT PUNK']].map(([k,label])=>
              <div key={k} className={`p-btn ${k}${selP===k?' sel':''}`} onClick={()=>toggleP(cl.id,k)}>{label}</div>
            )}
          </div>

          {selP && cl.arena[selP] && <div className="p-resp">
            <div className="who" style={{color:selP==='radix'?'var(--rose)':selP==='erdos'?'var(--lavender)':selP==='zoltan'?'var(--teal)':'var(--sunset)'}}>
              {selP==='erdos'?'ERD\u0150S':selP==='daft'?'DAFT PUNK':selP.toUpperCase()}
            </div>
            {cl.arena[selP]}
          </div>}

          <div className="answer">
            <label>YOUR WORDS</label>
            <textarea value={answers[cl.id]||''} onChange={e=>setAns(cl.id,e.target.value)}
              placeholder="What actually happened? Write your side..."/>
          </div>
        </div>}
      </div>;
    })}

    <div className="section-title">YOUR DEFENCES</div>
    <div className="def-card">
      {DEFS.map((d,i)=><div key={i} className="def-item"><span className="def-num">{i+1}.</span>{d}</div>)}
    </div>

    <div className="section-title">DO THIS NOW</div>
    {ACTIONS.map((a,i)=>
      <div key={i} className={`act${checked.has(i)?' done':''}`} onClick={()=>toggleCheck(i)}>
        <div className="dot">{checked.has(i)?'\u2713':''}</div>
        <div className="act-text">
          <span className="urg">[{a.urg}]</span>{' '}
          {a.href?<a href={a.href} style={{color:'inherit',textDecoration:'none'}} onClick={e=>e.stopPropagation()}>
            {a.text}{a.phone && <span className="phone"> {a.phone}</span>}
          </a>:<span>{a.text}{a.phone && <span className="phone"> {a.phone}</span>}</span>}
        </div>
      </div>
    )}

    <button className="export-btn" onClick={doExport}>EXPORT DEFENCE NOTES</button>

    <div className="footer">
      <div className="tag">Discretionary means discretionary.<br/>The court will hear your side.</div>
      <div className="cr">MATH ARENA &bull; SPIKE.LAND &bull; ROOFTOP PARADISE &bull; 2026</div>
      <div className="warn">Not legal advice. Call Shelter: 0808 800 4444</div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
