<title>If I Can Dream — Karaoke</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300..900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#08080f;--gold:#FFD700;--gold-dim:rgba(255,215,0,.25);
    --blue:#4466cc;--blue-dim:rgba(68,102,204,.15);
    --sung:rgba(255,215,0,.65);--upcoming:rgba(255,255,255,.13);
    --active-glow:0 0 24px rgba(255,215,0,.25),0 0 48px rgba(255,215,0,.08);
  }
  html,body{height:100%;overflow:hidden}
  body{
    background:var(--bg);color:#eee;
    font-family:'Rubik',system-ui,sans-serif;
    display:flex;flex-direction:column;
    user-select:none;-webkit-user-select:none;
  }

  /* === LAYOUT — fullscreen karaoke === */
  .app{display:flex;flex-direction:column;height:100%;position:relative;overflow:hidden}

  /* Gentle ambient glow that breathes */
  .ambient{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0;transition:opacity 2s}
  .ambient.on{opacity:1}
  .ambient .orb{position:absolute;border-radius:50%;filter:blur(100px)}
  .orb-1{width:50vw;height:50vw;top:-10vw;left:-10vw;background:var(--blue);opacity:.04}
  .orb-2{width:40vw;height:40vw;bottom:-5vw;right:-5vw;background:var(--gold);opacity:.03}

  /* Top bar — minimal */
  .top{
    flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
    padding:.6rem 1rem;z-index:2;
  }
  .title{font-size:.7rem;font-weight:600;color:rgba(255,255,255,.2);letter-spacing:2px}
  .time{font-size:.65rem;font-weight:400;color:rgba(255,255,255,.15);font-variant-numeric:tabular-nums}

  /* === LYRICS — the main event === */
  .lyrics-area{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:1rem 1.5rem;z-index:1;position:relative;gap:.8rem;
    overflow:hidden;
  }

  /* Previous line — fading out */
  .prev-line{
    font-size:clamp(.8rem,2.5vw,1rem);
    color:rgba(255,255,255,.06);font-weight:300;
    text-align:center;min-height:1.4em;
    transition:opacity .5s;
  }

  /* Current line container */
  .current-line{
    text-align:center;padding:0 .25rem;
    display:flex;flex-wrap:wrap;justify-content:center;align-items:baseline;
    gap:0;line-height:1.4;min-height:3em;
  }

  /* Syllables — dyslexia-friendly: big, high contrast, clear spacing */
  .syl{
    display:inline-block;position:relative;
    transition:color .12s,transform .12s,text-shadow .25s;
    padding:0 1px;
  }
  .syl.upcoming{color:var(--upcoming);font-weight:400}
  .syl.sung{color:var(--sung);font-weight:500}
  .syl.active{
    color:var(--gold);font-weight:700;
    transform:scale(1.08);
    text-shadow:var(--active-glow);
  }
  /* Underline sweep on active syllable */
  .syl.active::after{
    content:'';position:absolute;bottom:-.08em;left:0;right:0;height:3px;
    background:var(--gold);border-radius:2px;
    animation:sweepIn .15s ease-out forwards;
  }
  @keyframes sweepIn{from{transform:scaleX(0);transform-origin:left}to{transform:scaleX(1);transform-origin:left}}

  .spc{display:inline-block;width:.4em}
  .br{flex-basis:100%;height:0}

  /* Size variants — big and readable */
  .sz-m .syl{font-size:clamp(1.2rem,4vw,1.6rem)}
  .sz-l .syl{font-size:clamp(1.5rem,5.5vw,2.2rem)}
  .sz-xl .syl{font-size:clamp(1.8rem,7vw,2.8rem)}
  .sz-xxl .syl{font-size:clamp(2.2rem,8.5vw,3.4rem)}

  /* Next line — preview */
  .next-line{
    font-size:clamp(.75rem,2.2vw,.95rem);
    color:rgba(255,255,255,.07);font-weight:300;
    text-align:center;min-height:1.4em;
    transition:opacity .5s;
  }

  /* Pitch guide — simple dots showing melody contour */
  .pitch-bar{
    width:min(100%,400px);height:32px;position:relative;
    border-radius:8px;background:rgba(255,255,255,.015);
    overflow:hidden;margin-top:.3rem;
  }
  .pitch-dot{
    position:absolute;width:8px;height:8px;border-radius:50%;
    background:var(--upcoming);transition:background .15s,box-shadow .15s;
  }
  .pitch-dot.sung{background:var(--sung);opacity:.5}
  .pitch-dot.active{background:var(--gold);box-shadow:0 0 10px rgba(255,215,0,.4);width:12px;height:12px;margin:-2px}
  .pitch-head{
    position:absolute;top:0;bottom:0;width:2px;
    background:linear-gradient(180deg,rgba(255,215,0,.3),transparent);
    transition:left .12s linear;
  }

  /* === CONTROLS — bottom === */
  .controls{
    flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:.5rem;
    padding:.5rem 1rem 1.2rem;z-index:2;
  }

  /* Progress */
  .progress{width:min(100%,360px);height:4px;background:rgba(255,255,255,.05);border-radius:2px;cursor:pointer;position:relative}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--gold));border-radius:2px;transition:width .2s linear;pointer-events:none}

  .play-btn{
    width:56px;height:56px;border-radius:50%;border:2px solid var(--gold-dim);
    background:rgba(255,215,0,.03);color:var(--gold);font-size:1.3rem;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:all .2s;touch-action:manipulation;
    font-family:'Rubik',system-ui,sans-serif;
  }
  .play-btn:active{transform:scale(.92);background:rgba(255,215,0,.08)}
  .play-btn.on{border-color:var(--blue-dim);color:var(--blue);animation:pulse 4s ease infinite}
  @keyframes pulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 20px rgba(68,102,204,.08)}}

  .hint{font-size:.55rem;color:rgba(255,255,255,.1);letter-spacing:1px;text-align:center}

  /* Binaural toggle — tiny, out of the way */
  .bin-row{display:flex;gap:.25rem;justify-content:center}
  .bin-btn{
    font-size:.5rem;padding:3px 8px;border-radius:6px;
    border:1px solid rgba(255,255,255,.05);color:rgba(255,255,255,.15);
    cursor:pointer;font-family:'Rubik',system-ui,sans-serif;background:none;transition:all .2s;
  }
  .bin-btn.sel{border-color:var(--blue-dim);color:var(--blue)}

  /* Section label */
  .sec-label{
    font-size:.45rem;letter-spacing:3px;text-transform:uppercase;
    color:rgba(68,102,204,.25);text-align:center;
  }

  const binLRef=useRef(null);
  const binRRef=useRef(null);
  const binGainRef=useRef(null);
  const rafRef=useRef(null);

  // Create audio element once
  useEffect(()=>{
    const a=new Audio(AUDIO_SRC);
    a.preload='auto';
    a.loop=true;
    audioRef.current=a;
    return ()=>{a.pause();a.src=''}
  },[]);

  // Animation frame loop for smooth updates
  const tick=useCallback(()=>{
    if(audioRef.current){
      setTime(audioRef.current.currentTime%TOTAL);
    }
    rafRef.current=requestAnimationFrame(tick);
  },[]);

  const toggle=useCallback(()=>{
    const a=audioRef.current;if(!a)return;
    if(playing){
      a.pause();
      cancelAnimationFrame(rafRef.current);
      setPlaying(false);
    }else{
      a.play().then(()=>{
        rafRef.current=requestAnimationFrame(tick);
        setPlaying(true);
      }).catch(()=>{});
    }
  },[playing,tick]);

  // Binaural — separate from music
  const setBin=useCallback(i=>{
    setBinIdx(i);
    const b=BIN[i];
    if(!b.l){
      if(binGainRef.current)binGainRef.current.gain.setTargetAtTime(0,binCtxRef.current.currentTime,0.3);
      return;
    }
    if(!binCtxRef.current){
      const c=new(AudioContext||webkitAudioContext)();binCtxRef.current=c;
      const bg=c.createGain();bg.gain.value=0;binGainRef.current=bg;
      const m=c.createChannelMerger(2);
      const oL=c.createOscillator();oL.type='sine';oL.frequency.value=200;binLRef.current=oL;
      const oR=c.createOscillator();oR.type='sine';oR.frequency.value=206;binRRef.current=oR;
      const gL=c.createGain();gL.gain.value=1;const gR=c.createGain();gR.gain.value=1;
      oL.connect(gL);gL.connect(m,0,0);oR.connect(gR);gR.connect(m,0,1);
      m.connect(bg);bg.connect(c.destination);oL.start();oR.start();
    }
    const c=binCtxRef.current;if(c.state==='suspended')c.resume();
    const t=c.currentTime;
    binLRef.current.frequency.setTargetAtTime(b.l,t,0.3);
    binRRef.current.frequency.setTargetAtTime(b.r,t,0.3);
    binGainRef.current.gain.setTargetAtTime(0.045,t,0.3);
  },[]);

  // Seek on progress bar click
  const seek=useCallback(e=>{
    const a=audioRef.current;if(!a)return;
    const r=e.currentTarget.getBoundingClientRect();
    const pct=(e.clientX-r.left)/r.width;
    a.currentTime=pct*TOTAL;
    setTime(pct*TOTAL);
  },[]);

  // Find current line
  const li=L.findIndex(l=>time>=l.t&&time<l.end);
  const cur=li>=0?L[li]:L[0];
  const prev=li>0?L[li-1]:null;
  const next=li<L.length-1?L[li+1]:null;

  // Time display
  const mm=Math.floor(time/60);
  const ss=Math.floor(time%60);
  const ts=mm+':'+(ss<10?'0':'')+ss;

  // Flatten syls for prev/next display
  const flat=l=>l?l.syls.filter(s=>s[0]!=='|'&&s[0]!=='\u266A').map(s=>s[0].replace(/^-/,'')).join(' '):'';

  return R.createElement('div',{className:'app'},
    // Ambient
    R.createElement('div',{className:'ambient'+(playing?' on':'')},
      R.createElement('div',{className:'orb orb-1'}),
      R.createElement('div',{className:'orb orb-2'}),
    ),

    // Top bar
    R.createElement('div',{className:'top'},
      R.createElement('span',{className:'title'},'IF I CAN DREAM'),
      R.createElement('span',{className:'time'},ts),
    ),

    // Lyrics area
    R.createElement('div',{className:'lyrics-area'},
      // Previous line
      R.createElement('div',{className:'prev-line'},flat(prev)),

      // Current line with syllable highlighting
      R.createElement(SylLine,{line:cur,time:time}),

      // Next line
      R.createElement('div',{className:'next-line'},flat(next)),

      // Pitch bar
      R.createElement(PitchBar,{line:cur,time:time}),

      // Section label
      cur.section?R.createElement('div',{className:'sec-label'},cur.section):null,
    ),

    // Controls
    R.createElement('div',{className:'controls'},
      R.createElement('div',{className:'progress',onClick:seek},
        R.createElement('div',{className:'progress-fill',style:{width:(time/TOTAL*100)+'%'}}),
      ),
      R.createElement('button',{className:'play-btn'+(playing?' on':''),onClick:toggle},
        playing?'\u275A\u275A':'\u25B6'
      ),
      !playing?R.createElement('div',{className:'hint'},'TAP TO PLAY \u00B7 SING ALONG \u00B7 ELVIS WILL LIP-SYNC'):null,
      R.createElement('div',{className:'bin-row'},
        BIN.map((b,i)=>R.createElement('button',{
          key:i,className:'bin-btn'+(binIdx===i?' sel':''),onClick:()=>setBin(i)
        },b.n))
      ),
    ),
  );
}

// Syllable line renderer
function SylLine({line,time}){
  if(!line)return null;
  const sc='sz-'+(line.size||'l');
  const els=line.syls.map(([txt,st,dur,mid],i)=>{
    if(txt==='|')return R.createElement('div',{key:i,className:'br'});
    if(txt==='\u266A')return R.createElement('span',{key:i,className:'syl '+(time>=st?'sung':'upcoming'),
      style:{fontSize:'clamp(1.5rem,5vw,2.5rem)',opacity:.15}},txt);
    const active=time>=st&&time<st+dur;
    const sung=time>=st+dur;
    const cls='syl '+(active?'active':sung?'sung':'upcoming');
    const needSpc=i<line.syls.length-1&&line.syls[i+1][0]!=='|'&&!txt.endsWith('-')&&!txt.startsWith('-')&&line.syls[i+1][0]!=='-'&&txt!=='\u266A';
    return R.createElement(R.Fragment,{key:i},
      R.createElement('span',{className:cls},txt.replace(/^-/,'')),
      needSpc?R.createElement('span',{className:'spc'}):null,
    );
  });
  return R.createElement('div',{className:'current-line '+sc},els);
}

// Pitch visualization bar
function PitchBar({line,time}){
  if(!line)return null;
  const syls=line.syls.filter(s=>s[3]>0);
  if(!syls.length)return R.createElement('div',{className:'pitch-bar'});
  const lo=Math.min(...syls.map(s=>s[3]))-2;
  const hi=Math.max(...syls.map(s=>s[3]))+2;
  const range=hi-lo||1;
  const dur=line.end-line.t;

  const dots=syls.map(([txt,st,d,mid],i)=>{
    const x=((st-line.t)/dur)*100;
    const y=((mid-lo)/range)*70+10;
    const active=time>=st&&time<st+d;
    const sung=time>=st+d;
    return R.createElement('div',{key:i,className:'pitch-dot'+(active?' active':sung?' sung':''),
      style:{left:x+'%',bottom:y+'%'}});
  });

  const headX=Math.max(0,Math.min(100,((time-line.t)/dur)*100));

  return R.createElement('div',{className:'pitch-bar'},
    dots,
    R.createElement('div',{className:'pitch-head',style:{left:headX+'%'}}),
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(R.createElement(App));
</script>
</body>
