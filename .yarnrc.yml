nodeLinker: node-modules
yarnPath: .yarn/releases/yarn-4.12.0.cjs
enableGlobalCache: false
enableTelemetry: false
tsEnableAutoTypes: true

# Audit exemptions (from spike.land)
npmAuditIgnoreAdvisories:
  - 1111867

# Multi-platform support for CI (Linux) + local dev (macOS)
supportedArchitectures:
  cpu:
    - x64
    - arm64
  libc:
    - glibc
    - musl
  os:
    - linux
    - darwin
    - win32

# Package extensions for compatibility
packageExtensions:
  "@prisma/client@*":
    dependencies:
      "@prisma/engines": "*"
  "@acemir/cssom@*":
    dependencies:
      cssstyle: "*"
  vite@*:
    dependencies:
      ms: "*"
  mz@*:
    dependencies:
      graceful-fs: "*"
